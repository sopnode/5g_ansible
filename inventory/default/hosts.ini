[webshell]
localhost ansible_connection=local

[core_node]
sopnode-f1 ansible_user=root nic_interface=ens2f1 ip=172.28.2.76 storage=sda1

[ran_node]
sopnode-f3 ansible_user=root nic_interface=ens15f1 ip=172.28.2.95 storage=sdb2 boot_mode=live

[monitor_node]
sopnode-f2 ansible_user=root nic_interface=ens2f1 ip=172.28.2.77 storage=sda1

[iperf_server_node]
sopnode-w3 ansible_user=root nic_interface=enp59s0f1np1 ip=172.28.2.71 storage=sda1

[faraday]
faraday.inria.fr ansible_user=inria_pepr03

[qhats]
qhat01 ansible_host=qhat01 ansible_user=root ansible_ssh_common_args='-o ProxyJump=inria_pepr03@faraday.inria.fr' mode=mbim
qhat02 ansible_host=qhat02 ansible_user=root ansible_ssh_common_args='-o ProxyJump=inria_pepr03@faraday.inria.fr' mode=mbim
qhat03 ansible_host=qhat03 ansible_user=root ansible_ssh_common_args='-o ProxyJump=inria_pepr03@faraday.inria.fr' mode=mbim

#[fit_nodes]
#fit02 ansible_host=fit02 ansible_user=root ansible_ssh_common_args='-o ProxyJump=inria_pepr03@faraday.inria.fr' fit_number=2 fit_usrp=b210

[sopnodes:children]
core_node
ran_node
monitor_node
iperf_server_node

[k8s_workers:children]
ran_node
monitor_node

[all:vars]
# ---- CORE / RAN type ----
core="open5gs"
ran="oai"

# ---- Node aliases ----
core_node_name="sopnode-f1"
ran_node_name="sopnode-f3"
monitor_node_name="sopnode-f2"
iperf_server_node_name="sopnode-w3"
faraday_node_name="faraday.inria.fr"

# ---- RRU information ----
rru="jaguar"

# ---- RRU families ----
fhi72=false
aw2s=true

# ---- hosts variants for RAN ----
f3_ran=true

# ---- Other boolean parameters
# bridge_enabled is true if OVS bridge required between core_node and ran_node
bridge_enabled=true
monitoring_enabled=true
monarch=true
