---
- name: Initialize latency validation run
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_remote_tmp: "/tmp/.ansible-{{ lookup('env', 'USER') | default('controller', true) }}/tmp"
    validation_default_required_ues:
      - qhat01
      - qhat02
  tasks:
    - name: Set validation run id
      ansible.builtin.set_fact:
        validation_run_id: "{{ validation_run_id | default(lookup('pipe', 'date +%Y%m%d_%H%M%S')) }}"

    - name: Set validation defaults
      ansible.builtin.set_fact:
        validation_results_dir: "{{ validation_results_dir | default(playbook_dir + '/../results/latency-validation-' + validation_run_id) }}"
        validation_target_server_host: "{{ target_server_host | default(validation_target_server_host | default('sopnode-w3')) }}"
        validation_base_port: "{{ validation_base_port | default(5201) }}"
        validation_duration: "{{ validation_duration | default(paper_duration | default(120)) }}"
        validation_async_grace: "{{ validation_async_grace | default(180) }}"
        validation_pause_between_scenarios: "{{ validation_pause_between_scenarios | default(120) }}"
        validation_scenario_names: "{{ validation_scenario_names | default('all') }}"
        validation_disconnect_ues: "{{ validation_disconnect_ues | default(false) }}"
        validation_capture_pcaps: "{{ validation_capture_pcaps | default(true) }}"
        validation_pcap_mode: "{{ validation_pcap_mode | default('pod') | lower }}"
        validation_pcap_scope: "{{ validation_pcap_scope | default('direction') | lower }}"
        validation_pcap_capture_seconds: "{{ validation_pcap_capture_seconds | default(15) }}"
        validation_extract_pcap_rtt: "{{ validation_extract_pcap_rtt | default(false) }}"
        validation_collect_bpftool: "{{ validation_collect_bpftool | default(true) }}"
        validation_bpftool_enable_stats: "{{ validation_bpftool_enable_stats | default(true) }}"
        validation_bpftool_probe_container_regex: "{{ validation_bpftool_probe_container_regex | default('^ebpf-latency-probe') }}"
        validation_install_tshark: "{{ validation_install_tshark | default(false) }}"
        validation_install_tcpdump_in_pods: "{{ validation_install_tcpdump_in_pods | default(true) }}"
        validation_pod_capture_tool: "{{ validation_pod_capture_tool | default('auto') }}"
        validation_compress_pcaps: "{{ validation_compress_pcaps | default(true) }}"
        validation_collect_prometheus: "{{ validation_collect_prometheus | default(true) }}"
        validation_prometheus_step: "{{ validation_prometheus_step | default('1s') }}"
        validation_prometheus_queries_json: "{{ validation_prometheus_queries_json | default(playbook_dir + '/../scripts/validation/paper_prometheus_queries.json') }}"
        validation_discover_metrics_regex: "{{ validation_discover_metrics_regex | default('(?i)(mcs|bler|harq|rounds|cqi|rsrp|rsrq|sinr|snr|mac_throughput|slice_throughput|prach|saturation|number_ues|i0_noise|prb|gtp_tcp|tcp_)') }}"
        validation_discover_metrics_limit: "{{ validation_discover_metrics_limit | default(80) }}"
        validation_query_padding_seconds: "{{ validation_query_padding_seconds | default(30) }}"
        validation_local_timezone: "{{ validation_local_timezone | default(lookup('env', 'TZ') | default('Europe/Paris', true)) }}"
        validation_split_prometheus_by_timeline: "{{ validation_split_prometheus_by_timeline | default(true) }}"
        validation_split_window_types: "{{ validation_split_window_types | default('scenario,step,direction') }}"
        validation_split_padding_seconds: "{{ validation_split_padding_seconds | default(0) }}"
        validation_split_compress: "{{ validation_split_compress | default(true) }}"
        validation_create_notebooks: "{{ validation_create_notebooks | default(true) }}"
        validation_create_paper_figures: "{{ validation_create_paper_figures | default(true) }}"
        validation_compress_prometheus_csv: "{{ validation_compress_prometheus_csv | default(true) }}"
        validation_pcap_iface: "{{ validation_pcap_iface | default('any') }}"
        validation_pcap_pod_iface: "{{ validation_pcap_pod_iface | default(validation_pcap_iface | default('any')) }}"
        validation_pcap_snaplen: "{{ validation_pcap_snaplen | default(192) }}"
        validation_pcap_filter: "{{ validation_pcap_filter | default('udp port 2152') }}"
        validation_enable_netem: "{{ validation_enable_netem | default(true) }}"
        validation_prepare_iperf_server: >-
          {{
            validation_prepare_iperf_server | default(
              (validation_scenario_names | default('all') | string | lower | trim) != 'v02_icmp_ping_correctness'
            )
          }}
        validation_ping_count: "{{ validation_ping_count | default(60) }}"
        validation_ping_interval: "{{ validation_ping_interval | default(1) }}"
        validation_ping_timeout: "{{ validation_ping_timeout | default(2) }}"
        validation_ping_size: "{{ validation_ping_size | default(56) }}"
        validation_mtu_ping_size: "{{ validation_mtu_ping_size | default(1472) }}"
        validation_ping_pcap_capture_seconds: "{{ validation_ping_pcap_capture_seconds | default(30) }}"
        validation_tcp_bitrate: "{{ validation_tcp_bitrate | default('30Mb') }}"
        validation_ping_upf_namespace: "{{ validation_ping_upf_namespace | default(validation_core_namespace | default(core | default('open5gs'))) }}"
        validation_ping_upf_iface: "{{ validation_ping_upf_iface | default('ogstun') }}"
        validation_ping_upf_pod_name_regex: "{{ validation_ping_upf_pod_name_regex | default('upf') }}"
        validation_ping_upf_container_regex: "{{ validation_ping_upf_container_regex | default('upf') }}"
        validation_ping_upf_pod_selectors: "{{ validation_ping_upf_pod_selectors | default(['nf=upf', 'app=open5gs,nf=upf', 'app.kubernetes.io/name=open5gs-upf']) }}"
        validation_ping_upf_pod_regex: "{{ validation_ping_upf_pod_regex | default(validation_netem_upf_pod_regex | default(validation_netem_target_pod_regex | default(''))) }}"
        validation_netem_delay_ms: "{{ validation_netem_delay_ms | default(200) }}"
        validation_netem_method: "{{ validation_netem_method | default('pod_ifb_redirect') }}"
        validation_netem_ifb: "{{ validation_netem_ifb | default('ifb5gval') }}"
        validation_netem_host: "{{ validation_netem_host | default(groups['core_node'][0]) }}"
        validation_netem_namespace: "{{ validation_netem_namespace | default(validation_core_namespace | default(core | default('open5gs'))) }}"
        validation_netem_pod_iface: "{{ validation_netem_pod_iface | default('n3') }}"
        validation_netem_pod_name_regex: "{{ validation_netem_pod_name_regex | default('upf') }}"
        validation_netem_pod_container_regex: "{{ validation_netem_pod_container_regex | default('upf') }}"
        validation_netem_pod_selectors: "{{ validation_netem_pod_selectors | default(['nf=upf', 'app=open5gs,nf=upf', 'app.kubernetes.io/name=open5gs-upf']) }}"
        validation_netem_target_pod_regex: "{{ validation_netem_target_pod_regex | default('') }}"
        validation_netem_upf_pod_regex: "{{ validation_netem_upf_pod_regex | default(validation_netem_target_pod_regex | default('')) }}"
        validation_netem_filter_prio: "{{ validation_netem_filter_prio | default(49152) }}"
        validation_netem_cleanup_filter: "{{ validation_netem_cleanup_filter | default(true) }}"
        validation_netem_cleanup_ifb: "{{ validation_netem_cleanup_ifb | default(false) }}"
        validation_tc_pass_filter_prio: "{{ validation_tc_pass_filter_prio | default(49153) }}"
        validation_tc_pass_install_deps: "{{ validation_tc_pass_install_deps | default(true) }}"
        validation_netem_ran_host: "{{ validation_netem_ran_host | default(groups['ran_node'][0] if (groups['ran_node'] | default([]) | length > 0) else groups['core_node'][0]) }}"
        validation_netem_ran_namespace: "{{ validation_netem_ran_namespace | default(validation_ran_namespace | default(core | default('open5gs'))) }}"
        validation_netem_ran_pod_iface: "{{ validation_netem_ran_pod_iface | default(validation_netem_pod_iface | default('n3')) }}"
        validation_required_ues: "{{ validation_required_ues | default(validation_default_required_ues) }}"
        validation_kubeconfig: "{{ validation_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
        validation_core_namespace_effective: "{{ validation_core_namespace | default(core | default('open5gs')) }}"
        validation_ran_namespace_effective: "{{ validation_ran_namespace | default(core | default('open5gs')) }}"

    - name: Normalize validation TCP bitrate
      ansible.builtin.set_fact:
        validation_tcp_bitrate_raw: "{{ validation_tcp_bitrate | string | trim }}"
        validation_tcp_bitrate_effective: >-
          {{
            ''
            if (validation_tcp_bitrate | string | trim) in ['', '0']
            else (
              (validation_tcp_bitrate | string | trim) ~ 'Mb'
              if ((validation_tcp_bitrate | string | trim) | regex_replace('^[0-9]+([.][0-9]+)?$', '')) == ''
              else (
                (validation_tcp_bitrate | string | trim) ~ 'b'
                if ((validation_tcp_bitrate | string | trim) | regex_replace('^[0-9]+([.][0-9]+)?[kKmMgGtT]$', '')) == ''
                else (validation_tcp_bitrate | string | trim)
              )
            )
          }}

    - name: Set validation pod capture target defaults
      ansible.builtin.set_fact:
        validation_pcap_pod_targets: "{{ validation_pcap_pod_targets | default(validation_default_pcap_pod_targets) }}"
      vars:
        validation_default_pcap_pod_targets:
          - role: upf
            namespace: "{{ validation_core_namespace_effective }}"
            selectors:
              - "nf=upf"
              - "app=open5gs,nf=upf"
              - "app.kubernetes.io/name=open5gs-upf"
            name_regex: "upf"
            container_regex: "upf"
          - role: ran
            namespace: "{{ validation_ran_namespace_effective }}"
            selectors:
              - "app=oai-gnb"
              - "app.kubernetes.io/name=oai-gnb"
              - "app.kubernetes.io/name=oai-du"
              - "app.kubernetes.io/name=oai-cu-up"
              - "app.kubernetes.io/name=oai-cuup"
            name_regex: "gnb|du|cu-up|cuup"
            container_regex: "gnb|oai-gnb|nr-gnb|du|cu-up|cuup"

    - name: Ensure target server is in inventory
      ansible.builtin.fail:
        msg: >
          Target server {{ validation_target_server_host }} is not in the inventory.
          Add sopnode-w3 as an iperf_server_node or pass -e target_server_host=<host>.
      when: validation_target_server_host not in hostvars

    - name: Create validation results directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ validation_results_dir }}"
        - "{{ validation_results_dir }}/pcaps"
        - "{{ validation_results_dir }}/bpftool"

    - name: Initialize validation timeline event log
      ansible.builtin.copy:
        dest: "{{ validation_results_dir }}/timeline_events.jsonl"
        mode: "0644"
        content: ""

    - name: Set validation start epoch
      ansible.builtin.set_fact:
        validation_start_epoch: "{{ lookup('pipe', 'date +%s') }}"

    - name: Record validation campaign start
      ansible.builtin.include_tasks: ../tasks/record_paper_timeline_event.yml
      vars:
        paper_run_id: "{{ validation_run_id }}"
        paper_results_dir: "{{ validation_results_dir }}"
        paper_local_timezone: "{{ validation_local_timezone }}"
        paper_timeline_event:
          level: "campaign"
          phase: "start"
          name: "latency-validation"
          kind: "latency-validation"
          scenario_selector: "{{ validation_scenario_names }}"
          target_server_host: "{{ validation_target_server_host }}"
          duration_seconds: "{{ validation_duration | int }}"

    - name: Show validation run plan
      ansible.builtin.debug:
        msg:
          - "Run id: {{ validation_run_id }}"
          - "Results: {{ validation_results_dir }}"
          - "Target iperf server: {{ validation_target_server_host }}"
          - "Prepare iperf server: {{ validation_prepare_iperf_server }}"
          - "Scenario selector: {{ validation_scenario_names }}"
          - "Duration per direction: {{ validation_duration }} seconds"
          - "Capture pcaps: {{ validation_capture_pcaps }}"
          - "Pcap mode: {{ validation_pcap_mode }}"
          - "Pcap scope: {{ validation_pcap_scope }}"
          - "Default pcap capture seconds: {{ validation_pcap_capture_seconds }}"
          - "Collect bpftool BPF runtime stats: {{ validation_collect_bpftool }}"
          - "Extract pcap RTT during playbook on controller: {{ validation_extract_pcap_rtt }}"
          - "Install tshark if missing during playbook extraction: {{ validation_install_tshark }}"
          - "Note: notebooks and create_validation_paper_figures.py can reconstruct pcap RTT later on a local machine with tshark."
          - "Install tcpdump/tshark in pods if missing: {{ validation_install_tcpdump_in_pods }}"
          - "Compress fetched pcaps after collection: {{ validation_compress_pcaps }}"
          - "Compress full Prometheus CSV after window split: {{ validation_compress_prometheus_csv }}"
          - "Create paper-ready validation figures: {{ validation_create_paper_figures }}"
          - "Collect Prometheus: {{ validation_collect_prometheus }}"
          - "ICMP ping validation: count={{ validation_ping_count }}, interval={{ validation_ping_interval }}s, size={{ validation_ping_size }} bytes"
          - "MTU-sized ICMP parallel validation: ping payload={{ validation_mtu_ping_size }} bytes, IPv4 packet ~= {{ validation_mtu_ping_size | int + 28 }} bytes"
          - "Validation TCP bitrate input: {{ validation_tcp_bitrate_raw }}"
          - "Validation TCP bitrate cap: {{ validation_tcp_bitrate_effective }}"
          - "ICMP UPF ping source: namespace={{ validation_ping_upf_namespace }}, iface={{ validation_ping_upf_iface }}, pod_regex={{ validation_ping_upf_pod_regex }}"
          - "Enable controlled-delay netem steps: {{ validation_enable_netem }}"
          - "Controlled-delay netem method: {{ validation_netem_method }} via {{ validation_netem_ifb }}"
          - "Controlled-delay netem host/pod iface: {{ validation_netem_host }} / {{ validation_netem_pod_iface }}"
          - "Controlled-delay UPF pod regex: {{ validation_netem_upf_pod_regex | default('') }}"
          - "Controlled-delay validation filter prio: {{ validation_netem_filter_prio }}"
          - "Controlled-delay cleanup validation filter only: {{ validation_netem_cleanup_filter }}"
          - "Controlled-delay cleanup IFB device: {{ validation_netem_cleanup_ifb }}"
          - "Controlled-delay RAN host/pod iface: {{ validation_netem_ran_host }} / {{ validation_netem_ran_pod_iface }}"
          - "TC pass baseline filter prio: {{ validation_tc_pass_filter_prio }}"
          - "TC pass baseline install deps if missing: {{ validation_tc_pass_install_deps }}"

- name: Prepare iperf server for latency validation
  hosts: "{{ target_server_host | default(validation_target_server_host | default('sopnode-w3')) }}"
  gather_facts: false
  become: true
  vars:
    validation_prepare_iperf_server: "{{ hostvars['localhost'].validation_prepare_iperf_server | default(true) | bool }}"
    target_server_ip: "{{ hostvars[inventory_hostname].ip | default(hostvars[inventory_hostname].ansible_host | default(inventory_hostname)) }}"
    nb_ues: "{{ validation_iperf_server_ports | default(5) }}"
    base_port: "{{ hostvars['localhost'].validation_base_port | int }}"
  roles:
    - role: scenarios/iperf_server
      when: validation_prepare_iperf_server | bool

- name: Start validation N3 pcap captures
  hosts: core_node:ran_node
  gather_facts: false
  become: true
  vars:
    validation_run_id: "{{ hostvars['localhost'].validation_run_id }}"
    validation_capture_pcaps: "{{ hostvars['localhost'].validation_capture_pcaps | bool }}"
    validation_pcap_mode: "{{ hostvars['localhost'].validation_pcap_mode }}"
    validation_pcap_scope: "{{ hostvars['localhost'].validation_pcap_scope }}"
    validation_pcap_iface: "{{ hostvars['localhost'].validation_pcap_iface }}"
    validation_pcap_snaplen: "{{ hostvars['localhost'].validation_pcap_snaplen | int }}"
    validation_pcap_filter: "{{ hostvars['localhost'].validation_pcap_filter }}"
  tasks:
    - name: Create remote pcap directory
      ansible.builtin.file:
        path: "/tmp/{{ validation_run_id }}"
        state: directory
        mode: "0755"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'host'
        - validation_pcap_scope == 'run'

    - name: Start tcpdump for GTP-U capture
      ansible.builtin.shell: |
        set -e
        if command -v tcpdump >/dev/null 2>&1; then
          if [ -f /tmp/{{ validation_run_id }}/tcpdump_{{ inventory_hostname }}.pid ]; then
            kill -INT "$(cat /tmp/{{ validation_run_id }}/tcpdump_{{ inventory_hostname }}.pid)" 2>/dev/null || true
            sleep 1
          fi
          nohup tcpdump \
            -i {{ validation_pcap_iface }} \
            -s {{ validation_pcap_snaplen }} \
            -U \
            -w /tmp/{{ validation_run_id }}/{{ inventory_hostname }}_n3.pcap \
            '{{ validation_pcap_filter }}' \
            > /tmp/{{ validation_run_id }}/{{ inventory_hostname }}_tcpdump.log 2>&1 &
          echo "$!" > /tmp/{{ validation_run_id }}/tcpdump_{{ inventory_hostname }}.pid
        else
          echo "tcpdump not found" > /tmp/{{ validation_run_id }}/{{ inventory_hostname }}_tcpdump.log
        fi
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'host'
        - validation_pcap_scope == 'run'
      changed_when: true

- name: Start validation pod pcap captures
  hosts: core_node
  gather_facts: false
  become: true
  vars:
    validation_run_id: "{{ hostvars['localhost'].validation_run_id }}"
    validation_capture_pcaps: "{{ hostvars['localhost'].validation_capture_pcaps | bool }}"
    validation_pcap_mode: "{{ hostvars['localhost'].validation_pcap_mode }}"
    validation_pcap_scope: "{{ hostvars['localhost'].validation_pcap_scope }}"
    validation_pcap_pod_targets: "{{ hostvars['localhost'].validation_pcap_pod_targets }}"
    validation_pcap_pod_iface: "{{ hostvars['localhost'].validation_pcap_pod_iface }}"
    validation_pcap_snaplen: "{{ hostvars['localhost'].validation_pcap_snaplen | int }}"
    validation_pcap_filter: "{{ hostvars['localhost'].validation_pcap_filter }}"
    validation_install_tcpdump_in_pods: "{{ hostvars['localhost'].validation_install_tcpdump_in_pods | bool }}"
    validation_pod_capture_tool: "{{ hostvars['localhost'].validation_pod_capture_tool }}"
    validation_kubeconfig: "{{ hostvars['localhost'].validation_kubeconfig }}"
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  tasks:
    - name: Create remote pod-capture staging directory
      ansible.builtin.file:
        path: "/tmp/{{ validation_run_id }}"
        state: directory
        mode: "0755"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'

    - name: Discover pod capture targets dynamically
      ansible.builtin.shell: |
        set -eu
        ns="{{ item.namespace }}"
        selectors="{{ item.selectors | default([]) | join(';;') }}"
        matched=""
        old_ifs="$IFS"
        IFS=';;'
        for selector in $selectors; do
          IFS="$old_ifs"
          [ -z "$selector" ] && continue
          pods=$(kubectl -n "$ns" get pods \
            -l "$selector" \
            --field-selector=status.phase=Running \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
          if [ -n "$pods" ]; then
            matched="$(printf '%s\n%s\n' "$matched" "$pods")"
          fi
          IFS=';;'
        done
        IFS="$old_ifs"
        if [ -n "$matched" ]; then
          printf '%s\n' "$matched" | sed '/^[[:space:]]*$/d' | sort -u
          exit 0
        fi
        kubectl -n "$ns" get pods \
          --field-selector=status.phase=Running \
          --no-headers \
          -o custom-columns=NAME:.metadata.name 2>/dev/null \
          | grep -E -i '{{ item.name_regex | default(item.role) }}' \
          | sort -u
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_pod_targets }}"
      loop_control:
        label: "{{ item.role }} in {{ item.namespace }}"
      register: validation_pcap_target_pods
      changed_when: false
      failed_when: false
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'

    - name: Initialize expanded pod capture target list
      ansible.builtin.set_fact:
        validation_pcap_target_pods_expanded: []
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'

    - name: Expand discovered pod capture targets
      ansible.builtin.set_fact:
        validation_pcap_target_pods_expanded: >-
          {{
            validation_pcap_target_pods_expanded
            + [
              {
                'role': item.0.item.role,
                'namespace': item.0.item.namespace,
                'pod': item.1,
                'container': item.0.item.container | default(''),
                'container_regex': item.0.item.container_regex | default(item.0.item.name_regex | default(item.0.item.role)),
                'selectors': item.0.item.selectors | default([]),
                'name_regex': item.0.item.name_regex | default(item.0.item.role)
              }
            ]
          }}
      loop: "{{ validation_pcap_target_pods.results | default([]) | subelements('stdout_lines', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.item.role }}={{ item.1 }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - item.1 | trim | length > 0

    - name: Resolve exact pod container, node, and container id for capture targets
      ansible.builtin.shell: |
        set -eu
        ns="{{ item.namespace }}"
        pod="{{ item.pod }}"
        preferred="{{ item.container | default('') }}"
        regex="{{ item.container_regex | default(item.name_regex | default(item.role)) }}"
        containers=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}')
        node=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{.spec.nodeName}')
        if [ -n "$preferred" ] && printf '%s\n' "$containers" | grep -Fxq "$preferred"; then
          container="$preferred"
          cid=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .status.containerStatuses[*]}{.name}{"="}{.containerID}{"\n"}{end}' | awk -F= -v c="$container" '$1 == c {print $2; exit}')
          cid="${cid#*://}"
          printf '%s|%s|%s\n' "$container" "$node" "$cid"
          exit 0
        fi
        match=$(printf '%s\n' "$containers" | grep -E -i "$regex" | head -n 1 || true)
        if [ -z "$match" ]; then
          match=$(printf '%s\n' "$containers" | head -n 1)
        fi
        cid=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .status.containerStatuses[*]}{.name}{"="}{.containerID}{"\n"}{end}' | awk -F= -v c="$match" '$1 == c {print $2; exit}')
        cid="${cid#*://}"
        printf '%s|%s|%s\n' "$match" "$node" "$cid"
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      register: validation_pcap_target_container_resolution
      changed_when: false
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'

    - name: Rebuild pod capture targets with exact containers
      ansible.builtin.set_fact:
        validation_pcap_target_pods_expanded_resolved: >-
          {{
            (validation_pcap_target_pods_expanded_resolved | default([]))
            + [
              item.item | combine({
                'container': (item.stdout | trim).split('|')[0],
                'node': (item.stdout | trim).split('|')[1] | default(''),
                'container_id': (item.stdout | trim).split('|')[2] | default('')
              })
            ]
          }}
      loop: "{{ validation_pcap_target_container_resolution.results | default([]) }}"
      loop_control:
        label: "{{ item.item.role if item.item is defined else 'unknown' }}={{ item.stdout | default('') | trim }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - item.stdout | default('') | trim | length > 0

    - name: Use exact-container pod capture target list
      ansible.builtin.set_fact:
        validation_pcap_target_pods_expanded: "{{ validation_pcap_target_pods_expanded_resolved }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_target_pods_expanded_resolved | default([]) | length > 0

    - name: Show pod capture targets
      ansible.builtin.debug:
        msg: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'

    - name: Fail if a pod capture target could not be discovered
      ansible.builtin.fail:
        msg: >
          Could not dynamically find pod capture target {{ item.item.role }}
          in namespace {{ item.item.namespace }}.
          Selectors tried: {{ item.item.selectors | default([]) }}.
          Override validation_pcap_pod_targets if your labels differ.
      loop: "{{ validation_pcap_target_pods.results | default([]) }}"
      loop_control:
        label: "{{ item.item.role }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - item.stdout | default('') | trim | length == 0

    - name: Wait for pod capture targets to be Ready
      ansible.builtin.shell: |
        kubectl -n "{{ item.namespace }}" wait \
          --for=condition=Ready \
          "pod/{{ item.pod }}" \
          --timeout=90s
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      changed_when: false
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'

    - name: Ensure a packet capture tool exists in pod capture targets
      ansible.builtin.shell: |
        set -u
        ns="{{ item.namespace }}"
        pod="{{ item.pod }}"
        container="{{ item.container | default('') }}"
        preferred_tool="{{ validation_pod_capture_tool | default('auto') }}"
        container_arg=()
        if [ -n "$container" ]; then
          container_arg=(-c "$container")
        fi
        kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- sh -c '
          preferred_tool="$1"

          have_tool() {
            command -v tcpdump >/dev/null 2>&1 || command -v tshark >/dev/null 2>&1
          }

          install_with_manager() {
            manager="$1"
            if [ "$manager" = "apt-get" ]; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y tcpdump || apt-get install -y tshark
              return $?
            fi
            if [ "$manager" = "dnf" ]; then
              dnf install -y tcpdump || dnf install -y wireshark-cli
              return $?
            fi
            if [ "$manager" = "microdnf" ]; then
              microdnf install -y tcpdump || microdnf install -y wireshark-cli
              return $?
            fi
            if [ "$manager" = "yum" ]; then
              yum install -y tcpdump || yum install -y wireshark-cli
              return $?
            fi
            if [ "$manager" = "apk" ]; then
              apk add --no-cache tcpdump || apk add --no-cache tshark || apk add --no-cache wireshark
              return $?
            fi
            return 1
          }

          if [ "$preferred_tool" = "tcpdump" ] && command -v tcpdump >/dev/null 2>&1; then
            echo tcpdump
            exit 0
          fi
          if [ "$preferred_tool" = "tshark" ] && command -v tshark >/dev/null 2>&1; then
            echo tshark
            exit 0
          fi
          if have_tool; then
            command -v tcpdump >/dev/null 2>&1 && echo tcpdump || echo tshark
            exit 0
          fi

          for manager in apt-get dnf microdnf yum apk; do
            if command -v "$manager" >/dev/null 2>&1; then
              install_with_manager "$manager" || true
              break
            fi
          done

          if have_tool; then
            command -v tcpdump >/dev/null 2>&1 && echo tcpdump || echo tshark
            exit 0
          fi

          echo "no tcpdump/tshark and no supported package manager succeeded" >&2
          exit 42
        ' sh "$preferred_tool"
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      register: validation_pod_tcpdump_install
      changed_when: false
      failed_when: false
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_install_tcpdump_in_pods | bool

    - name: Warn if tcpdump/tshark is missing in a pod capture target
      ansible.builtin.debug:
        msg: >
          Neither tcpdump nor tshark is available in pod {{ item.item.pod }}
          for role {{ item.item.role }} / container {{ item.item.container | default('default') }}
          and neither could be installed.
          The capture start task may fail for this target.
      loop: "{{ validation_pod_tcpdump_install.results | default([]) }}"
      loop_control:
        label: "{{ item.item.role if item.item is defined else 'unknown' }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - item.rc | default(0) != 0

    - name: Start packet capture inside discovered pods
      ansible.builtin.shell: |
        set -eu
        ns="{{ item.namespace }}"
        pod="{{ item.pod }}"
        role="{{ item.role }}"
        container="{{ item.container | default('') }}"
        container_arg=()
        if [ -n "$container" ]; then
          container_arg=(-c "$container")
        fi
        kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- sh -c '
          run_dir="$1"
          role="$2"
          iface="$3"
          snaplen="$4"
          capture_filter="$5"
          mkdir -p "$run_dir"
          pid_file="$run_dir/capture_${role}.pid"
          if [ -f "$pid_file" ]; then
            kill -INT "$(cat "$pid_file")" 2>/dev/null || true
            sleep 1
          fi
          if command -v tcpdump >/dev/null 2>&1; then
            echo "capture_tool=tcpdump" > "$run_dir/${role}_tcpdump.log"
            nohup tcpdump \
              -i "$iface" \
              -s "$snaplen" \
              -U \
              -w "$run_dir/${role}_n3.pcap" \
              "$capture_filter" \
              >> "$run_dir/${role}_tcpdump.log" 2>&1 &
          elif command -v tshark >/dev/null 2>&1; then
            echo "capture_tool=tshark" > "$run_dir/${role}_tcpdump.log"
            nohup tshark \
              -i "$iface" \
              -s "$snaplen" \
              -f "$capture_filter" \
              -w "$run_dir/${role}_n3.pcap" \
              >> "$run_dir/${role}_tcpdump.log" 2>&1 &
          else
            echo "no tcpdump/tshark found in capture container" > "$run_dir/${role}_tcpdump.log"
            exit 42
          fi
          echo "$!" > "$pid_file"
        ' sh "/tmp/{{ validation_run_id }}" "$role" "{{ validation_pcap_pod_iface }}" "{{ validation_pcap_snaplen }}" "{{ validation_pcap_filter }}"
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      register: validation_run_pod_pcap_start
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
      changed_when: true
      failed_when: false

    - name: Warn when run-level pod capture could not be started
      ansible.builtin.debug:
        msg:
          - "Could not start run-level pod pcap for {{ item.item.role }} pod {{ item.item.pod }} container {{ item.item.container | default('default') }}."
          - "The validation run will continue without this capture target."
          - "stderr: {{ item.stderr | default('') }}"
          - "stdout: {{ item.stdout | default('') }}"
      loop: "{{ validation_run_pod_pcap_start.results | default([]) }}"
      loop_control:
        label: "{{ item.item.role if item.item is defined else 'unknown' }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
        - item.rc | default(0) != 0

- name: Run latency validation scenarios from R2Lab UEs
  hosts: faraday
  gather_facts: false
  vars:
    paper_run_id: "{{ hostvars['localhost'].validation_run_id }}"
    paper_required_ues: "{{ hostvars['localhost'].validation_required_ues }}"
    paper_target_server_host: "{{ hostvars['localhost'].validation_target_server_host }}"
    paper_target_server_ip: "{{ hostvars[paper_target_server_host].ip | default(hostvars[paper_target_server_host].ansible_host | default(paper_target_server_host)) }}"
    paper_base_port: "{{ hostvars['localhost'].validation_base_port | int }}"
    paper_duration: "{{ hostvars['localhost'].validation_duration | int }}"
    paper_async_grace: "{{ hostvars['localhost'].validation_async_grace | int }}"
    paper_pause_between_scenarios: "{{ hostvars['localhost'].validation_pause_between_scenarios | int }}"
    paper_scenario_names: "{{ hostvars['localhost'].validation_scenario_names }}"
    paper_disconnect_ues: "{{ hostvars['localhost'].validation_disconnect_ues | bool }}"
    paper_results_dir: "{{ hostvars['localhost'].validation_results_dir }}"
    paper_local_timezone: "{{ hostvars['localhost'].validation_local_timezone | default('Europe/Paris') }}"
    validation_enable_netem: "{{ hostvars['localhost'].validation_enable_netem | bool }}"
    validation_ping_count: "{{ hostvars['localhost'].validation_ping_count | int }}"
    validation_ping_interval: "{{ hostvars['localhost'].validation_ping_interval }}"
    validation_ping_timeout: "{{ hostvars['localhost'].validation_ping_timeout | int }}"
    validation_ping_size: "{{ hostvars['localhost'].validation_ping_size | int }}"
    validation_mtu_ping_size: "{{ hostvars['localhost'].validation_mtu_ping_size | int }}"
    validation_ping_pcap_capture_seconds: "{{ hostvars['localhost'].validation_ping_pcap_capture_seconds | int }}"
    validation_tcp_bitrate_effective: "{{ hostvars['localhost'].validation_tcp_bitrate_effective }}"
    validation_ping_upf_namespace: "{{ hostvars['localhost'].validation_ping_upf_namespace }}"
    validation_ping_upf_iface: "{{ hostvars['localhost'].validation_ping_upf_iface }}"
    validation_ping_upf_pod_selectors: "{{ hostvars['localhost'].validation_ping_upf_pod_selectors }}"
    validation_ping_upf_pod_name_regex: "{{ hostvars['localhost'].validation_ping_upf_pod_name_regex }}"
    validation_ping_upf_container_regex: "{{ hostvars['localhost'].validation_ping_upf_container_regex }}"
    validation_ping_upf_pod_regex: "{{ hostvars['localhost'].validation_ping_upf_pod_regex }}"
    validation_netem_delay_ms: "{{ hostvars['localhost'].validation_netem_delay_ms | int }}"
    validation_netem_method: "{{ hostvars['localhost'].validation_netem_method }}"
    validation_netem_ifb: "{{ hostvars['localhost'].validation_netem_ifb }}"
    validation_netem_host: "{{ hostvars['localhost'].validation_netem_host }}"
    validation_netem_namespace: "{{ hostvars['localhost'].validation_netem_namespace }}"
    validation_netem_pod_iface: "{{ hostvars['localhost'].validation_netem_pod_iface }}"
    validation_netem_pod_selectors: "{{ hostvars['localhost'].validation_netem_pod_selectors }}"
    validation_netem_pod_name_regex: "{{ hostvars['localhost'].validation_netem_pod_name_regex }}"
    validation_netem_pod_container_regex: "{{ hostvars['localhost'].validation_netem_pod_container_regex }}"
    validation_netem_target_pod_regex: "{{ hostvars['localhost'].validation_netem_target_pod_regex }}"
    validation_netem_upf_pod_regex: "{{ hostvars['localhost'].validation_netem_upf_pod_regex }}"
    validation_netem_filter_prio: "{{ hostvars['localhost'].validation_netem_filter_prio }}"
    validation_netem_cleanup_filter: "{{ hostvars['localhost'].validation_netem_cleanup_filter }}"
    validation_netem_cleanup_ifb: "{{ hostvars['localhost'].validation_netem_cleanup_ifb }}"
    validation_tc_pass_filter_prio: "{{ hostvars['localhost'].validation_tc_pass_filter_prio }}"
    validation_tc_pass_install_deps: "{{ hostvars['localhost'].validation_tc_pass_install_deps }}"
    validation_netem_ran_host: "{{ hostvars['localhost'].validation_netem_ran_host }}"
    validation_netem_ran_namespace: "{{ hostvars['localhost'].validation_netem_ran_namespace }}"
    validation_netem_ran_pod_iface: "{{ hostvars['localhost'].validation_netem_ran_pod_iface }}"
    validation_capture_pcaps: "{{ hostvars['localhost'].validation_capture_pcaps | bool }}"
    validation_pcap_mode: "{{ hostvars['localhost'].validation_pcap_mode }}"
    validation_pcap_scope: "{{ hostvars['localhost'].validation_pcap_scope }}"
    validation_pcap_capture_seconds: "{{ hostvars['localhost'].validation_pcap_capture_seconds | int }}"
    validation_pcap_iface: "{{ hostvars['localhost'].validation_pcap_iface }}"
    validation_pcap_pod_iface: "{{ hostvars['localhost'].validation_pcap_pod_iface }}"
    validation_pcap_snaplen: "{{ hostvars['localhost'].validation_pcap_snaplen | int }}"
    validation_pcap_filter: "{{ hostvars['localhost'].validation_pcap_filter }}"
    validation_collect_bpftool: "{{ hostvars['localhost'].validation_collect_bpftool | bool }}"
    validation_bpftool_enable_stats: "{{ hostvars['localhost'].validation_bpftool_enable_stats | bool }}"
    validation_bpftool_probe_container_regex: "{{ hostvars['localhost'].validation_bpftool_probe_container_regex }}"
    validation_kubeconfig: "{{ hostvars['localhost'].validation_kubeconfig }}"
    validation_k8s_control_host: "{{ groups['core_node'][0] }}"
    target_server: "{{ paper_target_server_ip }}"
    ignore_task_errors: true
    paper_scenarios:
      - name: "v01_candidate_signal_baseline"
        title: "Packet-level correctness baseline for direct BPF RTT and same-packet pairer"
        include_in_default_all: true
        pause_after: true
        steps:
          - name: "qhat01_qhat02_p1_baseline"
            ues: ["qhat01", "qhat02"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            pcap_capture_seconds: 30
            directions: ["ul", "dl"]

      - name: "v02_icmp_ping_correctness"
        title: "Standalone ICMP ping RTT validation against probe ICMP latency"
        include_in_default_all: true
        pause_after: true
        steps:
          - name: "qhat01_ping_upf_bidirectional"
            traffic_type: "icmp"
            ues: ["qhat01"]
            ping_count: "{{ validation_ping_count }}"
            ping_interval: "{{ validation_ping_interval }}"
            ping_timeout: "{{ validation_ping_timeout }}"
            ping_size: "{{ validation_ping_size }}"
            pcap_capture_seconds: "{{ validation_ping_pcap_capture_seconds }}"
            directions: ["ue_to_upf", "upf_to_ue"]

      - name: "v05_tcp_icmp_parallel_median"
        title: "Parallel downlink TCP iperf and ICMP ping median validation"
        include_in_default_all: true
        pause_after: true
        steps:
          - name: "qhat01_p1_tcp_icmp_parallel_median"
            traffic_type: "tcp_icmp_parallel"
            ues: ["qhat01"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            ping_count: "{{ paper_duration }}"
            ping_interval: "{{ validation_ping_interval }}"
            ping_timeout: "{{ validation_ping_timeout }}"
            ping_size: "{{ validation_ping_size }}"
            pcap_capture_seconds: 60
            directions: ["dl"]

      - name: "v06_tcp_icmp_parallel_mtu_ping"
        title: "Parallel downlink TCP iperf and MTU-sized ICMP ping validation"
        include_in_default_all: true
        pause_after: true
        steps:
          - name: "qhat01_p1_tcp_icmp_parallel_mtu_ping"
            traffic_type: "tcp_icmp_parallel"
            ues: ["qhat01"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            ping_count: "{{ paper_duration }}"
            ping_interval: "{{ validation_ping_interval }}"
            ping_timeout: "{{ validation_ping_timeout }}"
            # ping -s is ICMP payload; 1472 + 8 byte ICMP + 20 byte IPv4 header = 1500 byte IPv4 packet.
            ping_size: "{{ validation_mtu_ping_size }}"
            pcap_capture_seconds: 60
            directions: ["dl"]

      - name: "v03_controlled_delay"
        title: "Controlled {{ validation_netem_delay_ms }} ms pod-level IFB delay validation"
        include_in_default_all: true
        pause_after: true
        steps:
          - name: "qhat01_p1_no_netem_reference"
            ues: ["qhat01"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            pcap_capture_seconds: 30
            directions: ["ul", "dl"]
          - name: "qhat01_p1_upf_netem_{{ validation_netem_delay_ms }}ms"
            ues: ["qhat01"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            netem_delay_ms: "{{ validation_netem_delay_ms }}"
            netem_target_role: "upf"
            netem_host: "{{ validation_netem_host }}"
            netem_namespace: "{{ validation_netem_namespace }}"
            netem_pod_iface: "{{ validation_netem_pod_iface }}"
            netem_pod_selectors: "{{ validation_netem_pod_selectors }}"
            netem_pod_name_regex: "{{ validation_netem_pod_name_regex }}"
            netem_pod_container_regex: "{{ validation_netem_pod_container_regex }}"
            netem_target_pod_regex: "{{ validation_netem_upf_pod_regex }}"
            pcap_capture_seconds: 30
            directions: ["ul", "dl"]
          - name: "qhat01_p1_ran_netem_{{ validation_netem_delay_ms }}ms"
            ues: ["qhat01"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            netem_delay_ms: "{{ validation_netem_delay_ms }}"
            netem_target_role: "ran"
            netem_host: "{{ validation_netem_ran_host }}"
            netem_namespace: "{{ validation_netem_ran_namespace }}"
            netem_pod_iface: "{{ validation_netem_ran_pod_iface }}"
            netem_pod_selectors:
              - "app=oai-gnb"
              - "app.kubernetes.io/name=oai-gnb"
              - "app.kubernetes.io/name=oai-du"
              - "app.kubernetes.io/name=oai-cu-up"
              - "app.kubernetes.io/name=oai-cuup"
            netem_pod_name_regex: "gnb|du|cu-up|cuup"
            netem_pod_container_regex: "gnb|oai-gnb|nr-gnb|du|cu-up|cuup"
            pcap_capture_seconds: 30
            directions: ["ul", "dl"]

      - name: "v04_tc_pass_baseline"
        title: "Minimal TC_ACT_OK eBPF baseline for packet-path overhead"
        include_in_default_all: true
        pause_after: true
        steps:
          - name: "qhat01_p1_tc_pass_ran_baseline"
            ues: ["qhat01"]
            parallel_streams: 1
            bitrate: "{{ validation_tcp_bitrate_effective }}"
            capture_pcap: false
            tc_pass_baseline: true
            tc_pass_host: "{{ validation_netem_ran_host }}"
            tc_pass_namespace: "{{ validation_netem_ran_namespace }}"
            tc_pass_pod_iface: "{{ validation_netem_ran_pod_iface }}"
            tc_pass_pod_selectors:
              - "app=oai-gnb"
              - "app.kubernetes.io/name=oai-gnb"
              - "app.kubernetes.io/name=oai-du"
              - "app.kubernetes.io/name=oai-cu-up"
              - "app.kubernetes.io/name=oai-cuup"
            tc_pass_pod_name_regex: "gnb|du|cu-up|cuup"
            tc_pass_pod_container_regex: "gnb|oai-gnb|nr-gnb|du|cu-up|cuup"
            tc_pass_filter_prio: "{{ validation_tc_pass_filter_prio }}"
            tc_pass_install_deps: "{{ validation_tc_pass_install_deps }}"
            directions: ["ul", "dl"]
  tasks:
    - name: Load active 5G profile
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
        name: fiveg

    - name: Normalize selected validation scenarios
      ansible.builtin.set_fact:
        paper_selected_scenario_names: >-
          {{
            []
            if (paper_scenario_names | default('all') | string | lower | trim) == 'all'
            else (
              paper_scenario_names.split(',')
              | map('trim')
              | reject('equalto', '')
              | list
            )
          }}

    - name: Validate selected validation scenarios
      ansible.builtin.fail:
        msg: >
          Unknown validation scenario(s): {{ paper_selected_scenario_names | difference(paper_scenarios | map(attribute='name') | list) }}.
          Valid names are: all, {{ paper_scenarios | map(attribute='name') | join(', ') }}.
          Note: all includes the TC pass baseline and MTU-sized ICMP parallel validation scenarios.
      when:
        - paper_selected_scenario_names | length > 0
        - (paper_selected_scenario_names | difference(paper_scenarios | map(attribute='name') | list)) | length > 0

    - name: Select validation scenarios to run
      ansible.builtin.set_fact:
        paper_scenarios_to_run: >-
          {{
            paper_scenarios | selectattr('include_in_default_all') | list
            if paper_selected_scenario_names | length == 0
            else (paper_scenarios | selectattr('name', 'in', paper_selected_scenario_names) | list)
          }}

    - name: Build active UE list from selected validation scenarios
      ansible.builtin.set_fact:
        paper_active_ues: "{{ paper_scenarios_to_run | map(attribute='steps') | flatten | map(attribute='ues') | flatten | unique | list }}"

    - name: Validate active UEs are in the inventory qhats group
      ansible.builtin.fail:
        msg: "Missing required UEs from [qhats]: {{ paper_active_ues | difference(groups['qhats'] | default([])) }}"
      when: (paper_active_ues | difference(groups['qhats'] | default([]))) | length > 0

    - name: Validate active UEs are in the 5G profile
      ansible.builtin.fail:
        msg: "Missing required UEs from 5G profile: {{ paper_active_ues | difference(fiveg.ues.keys() | list) }}"
      when: (paper_active_ues | difference(fiveg.ues.keys() | list)) | length > 0

    - name: Build UE-to-port map
      ansible.builtin.set_fact:
        paper_ue_port_map: "{{ paper_ue_port_map | default({}) | combine({ item: (paper_base_port | int) + (ue_port_index | int) }) }}"
      loop: "{{ paper_active_ues }}"
      loop_control:
        index_var: ue_port_index

    - name: Show latency validation run plan
      ansible.builtin.debug:
        msg:
          - "Target server: {{ paper_target_server_host }} ({{ paper_target_server_ip }})"
          - "UEs: {{ paper_active_ues | join(', ') }}"
          - "Ports: {{ paper_ue_port_map }}"
          - "Scenarios: {{ paper_scenarios_to_run | map(attribute='name') | join(', ') }}"
          - "Duration per direction: {{ paper_duration }} seconds"
          - "Pause between scenarios: {{ paper_pause_between_scenarios }} seconds"
          - "Disconnect UEs at end: {{ paper_disconnect_ues }}"
          - "Netem enabled: {{ validation_enable_netem }}"

    - name: Connect UEs, run latency validation scenarios, and collect logs
      block:
        - name: Initialize connected UE IP map
          ansible.builtin.set_fact:
            ue_ips: {}

        - name: Record validation UE connection phase start
          ansible.builtin.include_tasks: ../tasks/record_paper_timeline_event.yml
          vars:
            paper_timeline_event:
              level: "ue_connect"
              phase: "start"
              name: "connect-required-ues"
              ues: "{{ paper_active_ues }}"
              target_server_host: "{{ paper_target_server_host }}"
              target_server_ip: "{{ paper_target_server_ip }}"

        - name: Connect required UEs and add routes to iperf server
          ansible.builtin.include_tasks: ../roles/scenarios/iperf/ue-to-target_server/tasks/connect_ue.yml
          loop: "{{ paper_active_ues }}"
          loop_control:
            loop_var: current_ue
            label: "{{ current_ue }}"
          vars:
            target_server: "{{ paper_target_server_ip }}"
            ignore_task_errors: true

        - name: Compute connected UE list
          ansible.builtin.set_fact:
            paper_connected_ues: "{{ paper_active_ues | select('in', ue_ips.keys() | list) | list }}"

        - name: Compute missing UE list
          ansible.builtin.set_fact:
            validation_missing_ues: "{{ paper_active_ues | difference(paper_connected_ues) }}"

        - name: Record validation UE connection phase end
          ansible.builtin.include_tasks: ../tasks/record_paper_timeline_event.yml
          vars:
            paper_timeline_event:
              level: "ue_connect"
              phase: "end"
              name: "connect-required-ues"
              requested_ues: "{{ paper_active_ues }}"
              connected_ues: "{{ paper_connected_ues }}"
              ue_ips: "{{ ue_ips }}"
              missing_ues: "{{ validation_missing_ues }}"

        - name: Warn if any required UE did not get an IP address
          ansible.builtin.debug:
            msg: "Skipping validation scenario execution because these UEs did not get wwan0 IPs: {{ validation_missing_ues }}"
          when: validation_missing_ues | length > 0

        - name: Prepare per-UE remote log directory
          ansible.builtin.shell: |
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ item }} \
              "rm -rf /tmp/{{ paper_run_id }} && mkdir -p /tmp/{{ paper_run_id }}"
          loop: "{{ paper_connected_ues }}"
          changed_when: false

        - name: Record validation traffic campaign start
          ansible.builtin.include_tasks: ../tasks/record_paper_timeline_event.yml
          vars:
            paper_timeline_event:
              level: "traffic_campaign"
              phase: "start"
              name: "selected-latency-validation-scenarios"
              scenarios: "{{ paper_scenarios_to_run | map(attribute='name') | list }}"
              ues: "{{ paper_connected_ues }}"
          when: validation_missing_ues | length == 0

        - name: Run all latency validation scenarios
          ansible.builtin.include_tasks: ../tasks/run_latency_validation_scenario.yml
          loop: "{{ paper_scenarios_to_run }}"
          loop_control:
            loop_var: paper_scenario
            index_var: paper_scenario_index
            label: "{{ paper_scenario.name }}"
          when: validation_missing_ues | length == 0

        - name: Record validation traffic campaign end
          ansible.builtin.include_tasks: ../tasks/record_paper_timeline_event.yml
          vars:
            paper_timeline_event:
              level: "traffic_campaign"
              phase: "end"
              name: "selected-latency-validation-scenarios"
              scenarios: "{{ paper_scenarios_to_run | map(attribute='name') | list }}"
              ues: "{{ paper_connected_ues }}"
          when: validation_missing_ues | length == 0

      always:
        - name: Archive UE logs on each UE
          ansible.builtin.shell: |
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ item }} \
              "tar -C /tmp -czf /tmp/{{ paper_run_id }}_{{ item }}.tgz {{ paper_run_id }} 2>/dev/null || true"
          loop: "{{ paper_active_ues }}"
          changed_when: false
          ignore_errors: true

        - name: Fetch UE log archives
          ansible.builtin.fetch:
            src: "/tmp/{{ paper_run_id }}_{{ item }}.tgz"
            dest: "{{ paper_results_dir }}/{{ item }}.tgz"
            flat: true
          delegate_to: "{{ item }}"
          loop: "{{ paper_active_ues }}"
          ignore_errors: true

        - name: Stop validation UEs
          ansible.builtin.include_role:
            name: r2lab/ue/stop
          vars:
            ue: "{{ item }}"
          loop: "{{ paper_active_ues }}"
          loop_control:
            label: "{{ item }}"
          when: paper_disconnect_ues | bool
          ignore_errors: true

- name: Stop and fetch validation pcaps
  hosts: core_node:ran_node
  gather_facts: false
  become: true
  vars:
    validation_run_id: "{{ hostvars['localhost'].validation_run_id }}"
    validation_capture_pcaps: "{{ hostvars['localhost'].validation_capture_pcaps | bool }}"
    validation_pcap_mode: "{{ hostvars['localhost'].validation_pcap_mode }}"
    validation_pcap_scope: "{{ hostvars['localhost'].validation_pcap_scope }}"
    validation_results_dir: "{{ hostvars['localhost'].validation_results_dir }}"
  tasks:
    - name: Stop tcpdump capture
      ansible.builtin.shell: |
        if [ -f /tmp/{{ validation_run_id }}/tcpdump_{{ inventory_hostname }}.pid ]; then
          kill -INT "$(cat /tmp/{{ validation_run_id }}/tcpdump_{{ inventory_hostname }}.pid)" 2>/dev/null || true
          sleep 2
        fi
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'host'
        - validation_pcap_scope == 'run'
      changed_when: false
      failed_when: false

    - name: Fetch pcap files
      ansible.builtin.fetch:
        src: "/tmp/{{ validation_run_id }}/{{ inventory_hostname }}_n3.pcap"
        dest: "{{ validation_results_dir }}/pcaps/{{ inventory_hostname }}_n3.pcap"
        flat: true
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'host'
        - validation_pcap_scope == 'run'
      ignore_errors: true

    - name: Fetch tcpdump logs
      ansible.builtin.fetch:
        src: "/tmp/{{ validation_run_id }}/{{ inventory_hostname }}_tcpdump.log"
        dest: "{{ validation_results_dir }}/pcaps/{{ inventory_hostname }}_tcpdump.log"
        flat: true
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'host'
        - validation_pcap_scope == 'run'
      ignore_errors: true

- name: Stop and fetch validation pod pcaps
  hosts: core_node
  gather_facts: false
  become: true
  vars:
    validation_run_id: "{{ hostvars['localhost'].validation_run_id }}"
    validation_capture_pcaps: "{{ hostvars['localhost'].validation_capture_pcaps | bool }}"
    validation_pcap_mode: "{{ hostvars['localhost'].validation_pcap_mode }}"
    validation_pcap_scope: "{{ hostvars['localhost'].validation_pcap_scope }}"
    validation_results_dir: "{{ hostvars['localhost'].validation_results_dir }}"
    validation_kubeconfig: "{{ hostvars['localhost'].validation_kubeconfig }}"
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  tasks:
    - name: Stop packet capture inside discovered pods
      ansible.builtin.shell: |
        set -u
        ns="{{ item.namespace }}"
        pod="{{ item.pod }}"
        role="{{ item.role }}"
        container="{{ item.container | default('') }}"
        container_arg=()
        if [ -n "$container" ]; then
          container_arg=(-c "$container")
        fi
        kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- sh -c '
          run_dir="$1"
          role="$2"
          pid_file="$run_dir/capture_${role}.pid"
          legacy_pid_file="$run_dir/tcpdump_${role}.pid"
          if [ -f "$pid_file" ]; then
            kill -INT "$(cat "$pid_file")" 2>/dev/null || true
            sleep 2
          elif [ -f "$legacy_pid_file" ]; then
            kill -INT "$(cat "$legacy_pid_file")" 2>/dev/null || true
            sleep 2
          fi
        ' sh "/tmp/{{ validation_run_id }}" "$role"
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
      changed_when: false
      failed_when: false

    - name: Copy pod pcap files from pods to core-node staging directory
      ansible.builtin.shell: |
        set -u
        ns="{{ item.namespace }}"
        pod="{{ item.pod }}"
        role="{{ item.role }}"
        container="{{ item.container | default('') }}"
        safe_pod="$(printf '%s' "$pod" | tr -c 'A-Za-z0-9_.-' '_')"
        container_arg=()
        if [ -n "$container" ]; then
          container_arg=(-c "$container")
        fi
        kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- \
          cat "/tmp/{{ validation_run_id }}/${role}_n3.pcap" \
          > "/tmp/{{ validation_run_id }}/${role}_${safe_pod}_n3.pcap"
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
      changed_when: true
      failed_when: false

    - name: Copy pod tcpdump logs from pods to core-node staging directory
      ansible.builtin.shell: |
        set -u
        ns="{{ item.namespace }}"
        pod="{{ item.pod }}"
        role="{{ item.role }}"
        container="{{ item.container | default('') }}"
        safe_pod="$(printf '%s' "$pod" | tr -c 'A-Za-z0-9_.-' '_')"
        container_arg=()
        if [ -n "$container" ]; then
          container_arg=(-c "$container")
        fi
        kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- \
          cat "/tmp/{{ validation_run_id }}/${role}_tcpdump.log" \
          > "/tmp/{{ validation_run_id }}/${role}_${safe_pod}_tcpdump.log"
      args:
        executable: /bin/bash
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
      changed_when: true
      failed_when: false

    - name: Fetch pod pcap files
      ansible.builtin.fetch:
        src: "/tmp/{{ validation_run_id }}/{{ item.role }}_{{ item.pod | regex_replace('[^A-Za-z0-9_.-]', '_') }}_n3.pcap"
        dest: "{{ validation_results_dir }}/pcaps/{{ item.role }}_{{ item.pod | regex_replace('[^A-Za-z0-9_.-]', '_') }}_n3.pcap"
        flat: true
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
      ignore_errors: true

    - name: Fetch pod tcpdump logs
      ansible.builtin.fetch:
        src: "/tmp/{{ validation_run_id }}/{{ item.role }}_{{ item.pod | regex_replace('[^A-Za-z0-9_.-]', '_') }}_tcpdump.log"
        dest: "{{ validation_results_dir }}/pcaps/{{ item.role }}_{{ item.pod | regex_replace('[^A-Za-z0-9_.-]', '_') }}_tcpdump.log"
        flat: true
      loop: "{{ validation_pcap_target_pods_expanded | default([]) }}"
      loop_control:
        label: "{{ item.role }}={{ item.pod }}"
      when:
        - validation_capture_pcaps | bool
        - validation_pcap_mode == 'pod'
        - validation_pcap_scope == 'run'
      ignore_errors: true

- name: Export validation metrics and create notebook
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_remote_tmp: "/tmp/.ansible-{{ lookup('env', 'USER') | default('controller', true) }}/tmp"
    validation_results_dir: "{{ hostvars['localhost'].validation_results_dir }}"
  tasks:
    - name: Set validation end epoch
      ansible.builtin.set_fact:
        validation_end_epoch: "{{ lookup('pipe', 'date +%s') }}"

    - name: Record validation campaign end
      ansible.builtin.include_tasks: ../tasks/record_paper_timeline_event.yml
      vars:
        paper_run_id: "{{ hostvars['localhost'].validation_run_id }}"
        paper_results_dir: "{{ validation_results_dir }}"
        paper_local_timezone: "{{ hostvars['localhost'].validation_local_timezone }}"
        paper_timeline_event:
          level: "campaign"
          phase: "end"
          name: "latency-validation"
          kind: "latency-validation"
          scenario_selector: "{{ hostvars['localhost'].validation_scenario_names }}"

    - name: Resolve monitor host
      ansible.builtin.set_fact:
        validation_monitor_host: "{{ groups['monitor_node'][0] if (groups['monitor_node'] | default([]) | length > 0) else '' }}"

    - name: Resolve Prometheus URL
      ansible.builtin.set_fact:
        validation_prometheus_url_effective: >-
          {{
            validation_prometheus_url | default('')
            if (validation_prometheus_url | default('') | length > 0)
            else (
              'http://' ~ (hostvars[validation_monitor_host].ip | default(hostvars[validation_monitor_host].ansible_host | default(validation_monitor_host))) ~ ':30095'
              if validation_monitor_host | length > 0
              else ''
            )
          }}

    - name: Write validation metadata
      ansible.builtin.copy:
        dest: "{{ validation_results_dir }}/validation_metadata.json"
        mode: "0644"
        content: "{{ validation_metadata | to_nice_json }}"
      vars:
        validation_metadata:
          run_id: "{{ hostvars['localhost'].validation_run_id }}"
          results_dir: "{{ validation_results_dir }}"
          start_epoch: "{{ hostvars['localhost'].validation_start_epoch }}"
          end_epoch: "{{ validation_end_epoch }}"
          target_server_host: "{{ hostvars['localhost'].validation_target_server_host }}"
          target_server_ip: "{{ hostvars[hostvars['localhost'].validation_target_server_host].ip | default(hostvars[hostvars['localhost'].validation_target_server_host].ansible_host | default(hostvars['localhost'].validation_target_server_host)) }}"
          scenario_names: "{{ hostvars['localhost'].validation_scenario_names }}"
          duration: "{{ hostvars['localhost'].validation_duration }}"
          pause_between_scenarios: "{{ hostvars['localhost'].validation_pause_between_scenarios }}"
          capture_pcaps: "{{ hostvars['localhost'].validation_capture_pcaps }}"
          pcap_mode: "{{ hostvars['localhost'].validation_pcap_mode }}"
          pcap_scope: "{{ hostvars['localhost'].validation_pcap_scope }}"
          pcap_capture_seconds_default: "{{ hostvars['localhost'].validation_pcap_capture_seconds }}"
          extract_pcap_rtt_during_playbook: "{{ hostvars['localhost'].validation_extract_pcap_rtt }}"
          create_paper_figures: "{{ hostvars['localhost'].validation_create_paper_figures }}"
          collect_bpftool: "{{ hostvars['localhost'].validation_collect_bpftool }}"
          bpftool_enable_stats: "{{ hostvars['localhost'].validation_bpftool_enable_stats }}"
          bpftool_probe_container_regex: "{{ hostvars['localhost'].validation_bpftool_probe_container_regex }}"
          install_tshark: "{{ hostvars['localhost'].validation_install_tshark }}"
          install_tcpdump_in_pods: "{{ hostvars['localhost'].validation_install_tcpdump_in_pods }}"
          pod_capture_tool: "{{ hostvars['localhost'].validation_pod_capture_tool }}"
          compress_pcaps: "{{ hostvars['localhost'].validation_compress_pcaps }}"
          compress_prometheus_csv: "{{ hostvars['localhost'].validation_compress_prometheus_csv }}"
          pcap_iface: "{{ hostvars['localhost'].validation_pcap_iface }}"
          pcap_pod_iface: "{{ hostvars['localhost'].validation_pcap_pod_iface }}"
          pcap_filter: "{{ hostvars['localhost'].validation_pcap_filter }}"
          pcap_pod_targets: "{{ hostvars['localhost'].validation_pcap_pod_targets }}"
          ping_count: "{{ hostvars['localhost'].validation_ping_count }}"
          ping_interval: "{{ hostvars['localhost'].validation_ping_interval }}"
          ping_timeout: "{{ hostvars['localhost'].validation_ping_timeout }}"
          ping_size: "{{ hostvars['localhost'].validation_ping_size }}"
          mtu_ping_size: "{{ hostvars['localhost'].validation_mtu_ping_size }}"
          mtu_ping_ipv4_packet_bytes: "{{ hostvars['localhost'].validation_mtu_ping_size | int + 28 }}"
          tcp_bitrate: "{{ hostvars['localhost'].validation_tcp_bitrate_effective }}"
          tcp_bitrate_input: "{{ hostvars['localhost'].validation_tcp_bitrate_raw }}"
          tc_pass_filter_prio: "{{ hostvars['localhost'].validation_tc_pass_filter_prio }}"
          tc_pass_install_deps: "{{ hostvars['localhost'].validation_tc_pass_install_deps }}"
          ping_upf_namespace: "{{ hostvars['localhost'].validation_ping_upf_namespace }}"
          ping_upf_iface: "{{ hostvars['localhost'].validation_ping_upf_iface }}"
          ping_upf_pod_regex: "{{ hostvars['localhost'].validation_ping_upf_pod_regex }}"
          prometheus_url: "{{ validation_prometheus_url_effective }}"
          prometheus_step: "{{ hostvars['localhost'].validation_prometheus_step }}"
          prometheus_queries_json: "{{ hostvars['localhost'].validation_prometheus_queries_json }}"
          discover_metrics_regex: "{{ hostvars['localhost'].validation_discover_metrics_regex }}"
          discover_metrics_limit: "{{ hostvars['localhost'].validation_discover_metrics_limit }}"
          netem_enabled: "{{ hostvars['localhost'].validation_enable_netem }}"
          netem_delay_ms: "{{ hostvars['localhost'].validation_netem_delay_ms }}"
          netem_method: "{{ hostvars['localhost'].validation_netem_method }}"
          netem_ifb: "{{ hostvars['localhost'].validation_netem_ifb }}"
          netem_host: "{{ hostvars['localhost'].validation_netem_host }}"
          netem_namespace: "{{ hostvars['localhost'].validation_netem_namespace }}"
          netem_pod_iface: "{{ hostvars['localhost'].validation_netem_pod_iface }}"
          netem_pod_selectors: "{{ hostvars['localhost'].validation_netem_pod_selectors }}"
          netem_target_pod_regex: "{{ hostvars['localhost'].validation_netem_target_pod_regex }}"
          netem_upf_pod_regex: "{{ hostvars['localhost'].validation_netem_upf_pod_regex }}"
          netem_filter_prio: "{{ hostvars['localhost'].validation_netem_filter_prio }}"
          netem_cleanup_filter: "{{ hostvars['localhost'].validation_netem_cleanup_filter }}"
          netem_cleanup_ifb: "{{ hostvars['localhost'].validation_netem_cleanup_ifb }}"
          netem_ran_host: "{{ hostvars['localhost'].validation_netem_ran_host }}"
          netem_ran_namespace: "{{ hostvars['localhost'].validation_netem_ran_namespace }}"
          netem_ran_pod_iface: "{{ hostvars['localhost'].validation_netem_ran_pod_iface }}"
          notes:
            - "mode=core is logical uplink"
            - "mode=ran is logical downlink"
            - "Direct BPF RTT and same-packet pairer are both treated as candidate paper signals."
            - "ICMP ping validation compares UE-visible ping RTT against probe ICMP latency trends; exact equality is not expected because probe measurements are taken at N3 vantage points."
            - "v05_tcp_icmp_parallel_median runs downlink TCP iperf and UPF-to-UE ICMP ping in the same window so median TCP/ping/probe deltas can be compared without the weak uplink matching case."
            - "v06_tcp_icmp_parallel_mtu_ping repeats the parallel TCP/ICMP window with ping -s {{ hostvars['localhost'].validation_mtu_ping_size }}, giving an ICMP IPv4 packet of approximately {{ hostvars['localhost'].validation_mtu_ping_size | int + 28 }} bytes for MTU-sized ICMP comparison against TCP."
            - "v04_tc_pass_baseline attaches a minimal TC_ACT_OK eBPF program to provide a passive TC baseline cost."
            - "Validation scenarios are limited to packet-level correctness, TCP/ICMP agreement, controlled-delay sensitivity, and overhead. Cross-slice, load-ramp, far-UE, and mixed-load behavior belongs to the TCP paper scenario suite."
            - "Prometheus exports include container CPU/memory overhead signals. bpftool packet-path overhead is collected from the running ebpf-latency-probe container when available."

    - name: Export Prometheus validation time series
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/prometheus_range_export.py"
          - "--prometheus-url"
          - "{{ validation_prometheus_url_effective }}"
          - "--start"
          - "{{ ([hostvars['localhost'].validation_start_epoch | int - hostvars['localhost'].validation_query_padding_seconds | int, 0] | max) }}"
          - "--end"
          - "{{ validation_end_epoch | int + hostvars['localhost'].validation_query_padding_seconds | int }}"
          - "--step"
          - "{{ hostvars['localhost'].validation_prometheus_step }}"
          - "--queries-json"
          - "{{ hostvars['localhost'].validation_prometheus_queries_json }}"
          - "--discover-metrics-regex"
          - "{{ hostvars['localhost'].validation_discover_metrics_regex }}"
          - "--discover-metrics-limit"
          - "{{ hostvars['localhost'].validation_discover_metrics_limit | string }}"
          - "--out"
          - "{{ validation_results_dir }}/prometheus_timeseries.csv"
          - "--summary-json"
          - "{{ validation_results_dir }}/prometheus_export_summary.json"
      when:
        - hostvars['localhost'].validation_collect_prometheus | bool
        - validation_prometheus_url_effective | length > 0
      changed_when: true
      failed_when: false

    - name: Finalize validation timeline
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/paper_timeline_finalize.py"
          - "--timeline-jsonl"
          - "{{ validation_results_dir }}/timeline_events.jsonl"
          - "--out-dir"
          - "{{ validation_results_dir }}"
          - "--run-id"
          - "{{ hostvars['localhost'].validation_run_id }}"
          - "--timezone"
          - "{{ hostvars['localhost'].validation_local_timezone }}"
      register: validation_timeline_finalize_output
      changed_when: true
      failed_when: false

    - name: Split validation Prometheus CSV by timeline windows
      ansible.builtin.command:
        argv: "{{ [
          'python3',
          playbook_dir + '/../scripts/validation/split_prometheus_by_timeline.py',
          '--full-csv',
          validation_results_dir + '/prometheus_timeseries.csv',
          '--timeline-json',
          validation_results_dir + '/timeline_summary.json',
          '--out-dir',
          validation_results_dir + '/by_window',
          '--window-types',
          hostvars['localhost'].validation_split_window_types,
          '--padding-seconds',
          hostvars['localhost'].validation_split_padding_seconds | string
        ] + (['--compress'] if (hostvars['localhost'].validation_split_compress | bool) else []) }}"
      register: validation_timeline_split_output
      when: hostvars['localhost'].validation_split_prometheus_by_timeline | bool
      changed_when: true
      failed_when: false

    - name: Compress full validation Prometheus CSV
      ansible.builtin.shell: |
        set -e
        csv="{{ validation_results_dir }}/prometheus_timeseries.csv"
        if [ -f "$csv" ]; then
          gzip -f "$csv"
        fi
      args:
        executable: /bin/bash
      when: hostvars['localhost'].validation_compress_prometheus_csv | bool
      changed_when: true
      failed_when: false

    - name: Check whether tshark is installed on the Ansible controller
      ansible.builtin.command: which tshark
      register: validation_tshark_check
      changed_when: false
      failed_when: false
      when:
        - hostvars['localhost'].validation_extract_pcap_rtt | bool
        - hostvars['localhost'].validation_install_tshark | bool

    - name: Check whether apt-get is available on the Ansible controller
      ansible.builtin.command: which apt-get
      register: validation_apt_get_check
      changed_when: false
      failed_when: false
      when:
        - hostvars['localhost'].validation_extract_pcap_rtt | bool
        - hostvars['localhost'].validation_install_tshark | bool
        - validation_tshark_check.rc is defined
        - validation_tshark_check.rc != 0

    - name: Install tshark on the Ansible controller when missing
      ansible.builtin.apt:
        name: tshark
        state: present
        update_cache: true
      become: true
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: validation_tshark_install
      failed_when: false
      when:
        - hostvars['localhost'].validation_extract_pcap_rtt | bool
        - hostvars['localhost'].validation_install_tshark | bool
        - validation_tshark_check.rc is defined
        - validation_tshark_check.rc != 0
        - validation_apt_get_check.rc is defined
        - validation_apt_get_check.rc == 0

    - name: Warn when tshark could not be auto-installed
      ansible.builtin.debug:
        msg: >
          tshark is not installed and could not be auto-installed on the Ansible controller.
          Pcap RTT extraction will create an empty CSV unless tshark is installed manually
          or validation_extract_pcap_rtt=false is passed.
      when:
        - hostvars['localhost'].validation_extract_pcap_rtt | bool
        - hostvars['localhost'].validation_install_tshark | bool
        - validation_tshark_check.rc is defined
        - validation_tshark_check.rc != 0
        - validation_apt_get_check.rc is defined
        - validation_apt_get_check.rc != 0 or (validation_tshark_install.failed | default(false))

    - name: Reconstruct pcap TCP RTT samples
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/pcap_tcp_rtt_extract.py"
          - "--pcap-dir"
          - "{{ validation_results_dir }}/pcaps"
          - "--out"
          - "{{ validation_results_dir }}/pcap_tcp_rtt.csv"
      when:
        - hostvars['localhost'].validation_extract_pcap_rtt | bool
        - validation_tshark_check.rc is not defined or validation_tshark_check.rc == 0
      changed_when: true
      failed_when: false

    - name: Write pcap RTT local reconstruction note when controller extraction is skipped
      ansible.builtin.copy:
        dest: "{{ validation_results_dir }}/pcap_tcp_rtt_LOCAL_RECONSTRUCTION.md"
        mode: "0644"
        content: |
          # Local PCAP RTT Reconstruction

          The validation run fetched N3 pcaps into `pcaps/`, but pcap TCP RTT
          reconstruction was not run on the Ansible controller.

          This is expected when the controller does not have `tshark` and cannot
          install it. Open `experiment_analysis.ipynb` or
          `latency_validation_analysis.ipynb` locally and run the pcap
          reconstruction cell, or run:

          ```bash
          python3 ../../scripts/validation/pcap_tcp_rtt_extract.py \
            --pcap-dir pcaps \
            --out pcap_tcp_rtt.csv

          python3 ../../scripts/validation/create_validation_paper_figures.py \
            --results-dir . \
            --out-dir paper_figures
          ```

          `create_validation_paper_figures.py` also auto-runs the extractor when
          `pcap_tcp_rtt.csv` is missing or empty and local `tshark` is available.
      when:
        - hostvars['localhost'].validation_capture_pcaps | bool
        - not (hostvars['localhost'].validation_extract_pcap_rtt | bool)
          or (validation_tshark_check.rc is defined and validation_tshark_check.rc != 0)

    - name: Extract ICMP ping RTT samples
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/ping_rtt_extract.py"
          - "--results-dir"
          - "{{ validation_results_dir }}"
          - "--out"
          - "{{ validation_results_dir }}/ping_rtt.csv"
          - "--summary-out"
          - "{{ validation_results_dir }}/ping_rtt_summary.csv"
      changed_when: true
      failed_when: false

    - name: Create ICMP ping-vs-probe comparison plot
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/plot_icmp_ping_probe_comparison.py"
          - "--results-dir"
          - "{{ validation_results_dir }}"
          - "--out-csv"
          - "{{ validation_results_dir }}/icmp_ping_probe_comparison.csv"
          - "--out-plot"
          - "{{ validation_results_dir }}/icmp_ping_probe_comparison.png"
          - "--out-md"
          - "{{ validation_results_dir }}/icmp_ping_probe_comparison.md"
      register: validation_icmp_comparison_output
      changed_when: true
      failed_when: false

    - name: Show ICMP ping-vs-probe comparison output
      ansible.builtin.debug:
        msg: "{{ validation_icmp_comparison_output.stdout_lines | default(['ICMP comparison output unavailable.']) }}"

    - name: Print ICMP ping-vs-probe comparison table
      ansible.builtin.command:
        argv:
          - cat
          - "{{ validation_results_dir }}/icmp_ping_probe_comparison.md"
      register: validation_icmp_comparison_table
      changed_when: false
      failed_when: false

    - name: Show ICMP ping-vs-probe comparison table
      ansible.builtin.debug:
        msg: "{{ validation_icmp_comparison_table.stdout_lines | default(['ICMP comparison table unavailable.']) }}"

    - name: Compress fetched validation pcap files
      ansible.builtin.shell: |
        set -e
        find "{{ validation_results_dir }}/pcaps" \
          -type f \
          \( -name "*.pcap" -o -name "*.pcapng" \) \
          -size +0c \
          -print0 \
          | while IFS= read -r -d '' pcap_file; do
              gzip -f "$pcap_file"
            done
      args:
        executable: /bin/bash
      when: hostvars['localhost'].validation_compress_pcaps | bool
      changed_when: true
      failed_when: false

    - name: Summarize bpftool packet-path overhead
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/bpftool_overhead_summary.py"
          - "--bpftool-dir"
          - "{{ validation_results_dir }}/bpftool"
          - "--out"
          - "{{ validation_results_dir }}/bpftool_overhead_summary.csv"
      register: validation_bpftool_summary_output
      when: hostvars['localhost'].validation_collect_bpftool | bool
      changed_when: true
      failed_when: false

    - name: Warn when bpftool overhead summary could not be created
      ansible.builtin.debug:
        msg:
          - "bpftool overhead summary was not created. This usually means the running probe container did not expose bpftool or BPF stats."
          - "{{ validation_bpftool_summary_output.stderr | default(validation_bpftool_summary_output.stdout | default('No command output captured.')) }}"
      when:
        - hostvars['localhost'].validation_collect_bpftool | bool
        - validation_bpftool_summary_output.rc is defined
        - validation_bpftool_summary_output.rc != 0

    - name: Create paper-ready validation figures
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/create_validation_paper_figures.py"
          - "--results-dir"
          - "{{ validation_results_dir }}"
          - "--out-dir"
          - "{{ validation_results_dir }}/paper_figures"
      register: validation_paper_figures_output
      when: hostvars['localhost'].validation_create_paper_figures | bool
      changed_when: validation_paper_figures_output.rc == 0
      failed_when: false

    - name: Warn when paper-ready validation figures could not be created
      ansible.builtin.debug:
        msg:
          - "Paper-ready validation figures were not created. The raw CSV/notebook data is still usable."
          - "{{ validation_paper_figures_output.stderr | default(validation_paper_figures_output.stdout | default('No command output captured.')) }}"
      when:
        - hostvars['localhost'].validation_create_paper_figures | bool
        - validation_paper_figures_output.rc is defined
        - validation_paper_figures_output.rc != 0

    - name: Create validation notebook
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/create_latency_validation_notebook.py"
          - "--results-dir"
          - "{{ validation_results_dir }}"
      register: validation_specific_notebook_output
      when: hostvars['localhost'].validation_create_notebooks | bool
      changed_when: validation_specific_notebook_output.rc == 0
      failed_when: false

    - name: Warn when validation notebook could not be created
      ansible.builtin.debug:
        msg:
          - "Validation notebook was not created. The experiment data is still usable."
          - "{{ validation_specific_notebook_output.stderr | default(validation_specific_notebook_output.stdout | default('No command output captured.')) }}"
      when:
        - hostvars['localhost'].validation_create_notebooks | bool
        - validation_specific_notebook_output.rc is defined
        - validation_specific_notebook_output.rc != 0

    - name: Create automatic experiment analysis notebook
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/create_experiment_analysis_notebook.py"
          - "--results-dir"
          - "{{ validation_results_dir }}"
          - "--kind"
          - "validation"
          - "--title"
          - "Latency Validation Experiment Analysis"
      register: validation_experiment_notebook_output
      when: hostvars['localhost'].validation_create_notebooks | bool
      changed_when: validation_experiment_notebook_output.rc == 0
      failed_when: false

    - name: Warn when automatic experiment analysis notebook could not be created
      ansible.builtin.debug:
        msg:
          - "Automatic experiment analysis notebook was not created. The experiment data is still usable."
          - "{{ validation_experiment_notebook_output.stderr | default(validation_experiment_notebook_output.stdout | default('No command output captured.')) }}"
      when:
        - hostvars['localhost'].validation_create_notebooks | bool
        - validation_experiment_notebook_output.rc is defined
        - validation_experiment_notebook_output.rc != 0

    - name: Create Grafana-style dashboard notebook
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/validation/create_grafana_dashboard_notebook.py"
          - "--results-dir"
          - "{{ validation_results_dir }}"
          - "--title"
          - "Latency Validation Grafana-Style Dashboard Figures"
      register: validation_grafana_notebook_output
      when: hostvars['localhost'].validation_create_notebooks | bool
      changed_when: validation_grafana_notebook_output.rc == 0
      failed_when: false

    - name: Warn when Grafana-style dashboard notebook could not be created
      ansible.builtin.debug:
        msg:
          - "Grafana-style dashboard notebook was not created. The exported CSV/timeline files are still usable."
          - "{{ validation_grafana_notebook_output.stderr | default(validation_grafana_notebook_output.stdout | default('No command output captured.')) }}"
      when:
        - hostvars['localhost'].validation_create_notebooks | bool
        - validation_grafana_notebook_output.rc is defined
        - validation_grafana_notebook_output.rc != 0

    - name: Write validation README
      ansible.builtin.copy:
        dest: "{{ validation_results_dir }}/README.md"
        mode: "0644"
        content: |
          # Latency Validation Run {{ hostvars['localhost'].validation_run_id }}

          Open `experiment_analysis.ipynb` for the automatic supervisor-facing report.
          Open `latency_validation_analysis.ipynb` for the older validation-specific notebook.

          Main artifacts:
          - `prometheus_timeseries.csv` or `prometheus_timeseries.csv.gz`: exported latency, pairer, overhead, and discovered RF/RAN metrics.
          - `pcap_tcp_rtt.csv`: pcap-reconstructed TCP ACK RTT samples, generated during the playbook only when controller-side `tshark` is available and `validation_extract_pcap_rtt=true`; otherwise generate it locally from the notebook or `create_validation_paper_figures.py`.
          - `pcap_tcp_rtt_LOCAL_RECONSTRUCTION.md`: local reconstruction instructions when controller-side pcap extraction is skipped.
          - `ping_rtt.csv` / `ping_rtt_summary.csv`: per-packet and summarized UE-visible ICMP RTT from validation `ping` logs.
          - `icmp_ping_probe_comparison.png` / `.csv` / `.md`: standalone ICMP comparison of ping RTT against exported probe latency.
          - `bpftool/`: raw before/after `bpftool prog show -j` snapshots from the running `ebpf-latency-probe` container in the gNB pod, when available.
          - `bpftool_overhead_summary.csv`: per-program `delta(run_time_ns) / delta(run_cnt)` packet-path overhead summary, when bpftool snapshots succeeded.
          - `bpftool/*__tc_pass_attach.json`: attachment logs for the `v04_tc_pass_baseline` TC_ACT_OK baseline scenario.
          - `paper_figures/`: standalone SVG validation-evidence figures and CSV summaries for container CPU, container memory, passive TC baseline vs latency probe overhead, BPF packet-rate budgets, controlled netem pickup, ICMP ping-vs-probe time series, TCP probe-vs-pcap RTT comparison, and TCP/ICMP median deltas when `v05_tcp_icmp_parallel_median` or `v06_tcp_icmp_parallel_mtu_ping` is run.
          - `pcaps/`: fetched N3 pcap files and capture-tool logs. With the default per-direction pod mode, filenames include `scenario__step__direction__role_<pod>_n3.pcap`; pcaps may be compressed to `.pcap.gz`.
          - `qhatXX.tgz`: per-UE iperf JSON logs and ICMP ping logs.
          - `timeline_summary.md`: human-readable scenario, step, direction, and iperf-task recap.
          - `timeline_summary.csv` / `timeline_summary.json`: machine-readable timing windows.
          - `by_window/scenario/<scenario>/prometheus_timeseries.csv.gz`: metrics filtered to one scenario interval.
          - `by_window/task/<scenario_step_direction>/prometheus_timeseries.csv.gz`: metrics filtered to one step/direction interval.
          - `experiment_analysis.ipynb`: automatic plots for all exported metrics plus paper-candidate CDF/box/time-series plots. If local `tshark` exists, its pcap cell can regenerate `pcap_tcp_rtt.csv` from fetched pcaps.
          - `grafana_dashboard_figures.ipynb`: recreates the monitoring dashboard as static notebook figures.

          Interpretation reminder:
          - `mode="core"` means logical uplink.
          - `mode="ran"` means logical downlink.
          - ICMP ping RTT is UE-visible end-to-end RTT. Probe ICMP latency is measured at N3 vantage points, so use it for trend/distribution agreement rather than exact one-to-one equality.
          - `v05_tcp_icmp_parallel_median` runs downlink TCP iperf and UPF-to-UE ICMP ping together and creates median-delta summaries when pcap and Prometheus data are available.
          - `v06_tcp_icmp_parallel_mtu_ping` repeats the parallel TCP+ICMP validation with `ping -s {{ hostvars['localhost'].validation_mtu_ping_size }}`; for IPv4 this is about {{ hostvars['localhost'].validation_mtu_ping_size | int + 28 }} bytes including IP and ICMP headers.
          - `v04_tc_pass_baseline` is included in `all` and provides the minimal passive TC eBPF comparison.
          - Decide between direct BPF RTT and same-packet pairer based on sample density, stability, pcap agreement, and decomposition value.
          - This validation workflow is only for proving that the latency mechanism is correct and sensitive to a known delay. Cross-slice contention, load ramps, far-UE behavior, and mixed-load analysis are handled by `run_tcp_paper_scenarios.yml`.
          - Container CPU/memory are exported from Prometheus. Low-level BPF overhead is computed as `delta(run_time_ns) / delta(run_cnt)` if the running probe container exposes `bpftool`.
      register: validation_readme_output
      failed_when: false

    - name: Show validation timeline recap
      ansible.builtin.debug:
        msg: "{{ validation_timeline_finalize_output.stdout_lines | default(['Timeline recap unavailable; check timeline_events.jsonl.']) }}"

    - name: Show validation output paths
      ansible.builtin.debug:
        msg:
          - "Validation results: {{ validation_results_dir }}"
          - "Experiment notebook: {{ validation_results_dir }}/experiment_analysis.ipynb"
          - "Grafana-style notebook: {{ validation_results_dir }}/grafana_dashboard_figures.ipynb"
          - "Notebook: {{ validation_results_dir }}/latency_validation_analysis.ipynb"
          - "Prometheus CSV: {{ validation_results_dir }}/prometheus_timeseries.csv or .csv.gz"
          - "Pcap RTT CSV: {{ validation_results_dir }}/pcap_tcp_rtt.csv"
          - "Ping RTT CSV: {{ validation_results_dir }}/ping_rtt.csv"
          - "ICMP comparison plot: {{ validation_results_dir }}/icmp_ping_probe_comparison.png"
          - "BPF overhead CSV: {{ validation_results_dir }}/bpftool_overhead_summary.csv"
          - "Paper figures: {{ validation_results_dir }}/paper_figures"
          - "Timeline recap: {{ validation_results_dir }}/timeline_summary.md"
          - "Per-scenario metrics: {{ validation_results_dir }}/by_window/scenario"
          - "Per-task metrics: {{ validation_results_dir }}/by_window/task"
