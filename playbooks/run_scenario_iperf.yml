---
- hosts: all
  gather_facts: true
  tasks:
    - name: Normalize booleans at playbook start
      import_tasks: ../tasks/reload_booleans.yml

# ============================================================
# Set global target_server variable (default: iperf_server_node)
# Can be overridden with: ansible-playbook ... -e "target_server_host=hostname"
# ============================================================
- name: Set target server configuration
  hosts: localhost
  gather_facts: false
  run_once: true
  tasks:
    - name: Determine target server host
      set_fact:
        target_server_host: >-
          {{
            target_server_host
            | default(
                (groups['iperf_server_node'] | default([]) | first),
                true
              )
            | default(groups['core_node'][0])
          }}
        cacheable: yes
      run_once: true
    
    - name: Get target server IP
      set_fact:
        target_server_ip: "{{ hostvars[target_server_host]['ip'] }}"
      run_once: true
    
    - name: Display target server configuration
      debug:
        msg: |
          ✓ Target Server Configuration:
            Host: {{ target_server_host }}
            IP: {{ target_server_ip }}
      run_once: true

- name: Run iperf servers on target server
  hosts: "{{ hostvars['localhost'].get('target_server_host', groups['iperf_server_node'][0]) }}"
  become: true
  vars:
    target_server_host: "{{ hostvars['localhost'].get('target_server_host', groups['iperf_server_node'][0]) }}"
    target_server_ip: "{{ hostvars[target_server_host]['ip'] }}"
    ignore_task_errors: yes
    nb_ues: "{{ 3 if rru == 'rfsim' else groups['qhats'] | length }}"
  roles:
    - role: scenarios/iperf_server

- name: Run RFSIM UE iperf tests (only if rru=rfsim)
  hosts: core_node
  become: true
  gather_facts: false
  vars:
    target_server_host: "{{ hostvars['localhost'].get('target_server_host', groups['iperf_server_node'][0]) }}"
    target_server_ip: "{{ hostvars[target_server_host]['ip'] }}"
    nb_ues: "{{ 3 if rru == 'rfsim' else groups['qhats'] | length }}"
    ignore_task_errors: yes
  tasks:
    - name: Run RFSIM role
      include_role:
        name: scenarios/iperf/rfsim-ue-to-target_server
      when: rru == "rfsim"

- name: Optionally run UE to target_server iperf tests from Faraday
  hosts: faraday
  vars:
    target_server_host: "{{ hostvars['localhost'].get('target_server_host', groups['iperf_server_node'][0]) }}"
    ignore_task_errors: yes
    nb_ues: "{{ groups['qhats'] | length }}"
    target_server_ip: "{{ hostvars[target_server_host]['ip'] }}"
  roles:
    - role: scenarios/iperf/ue-to-target_server
      when: rru != "rfsim"

- name: "📊 FINAL SUMMARY (-- show most recent iperf results (300s max))"
  hosts: "{{ hostvars['localhost'].get('target_server_host', groups['iperf_server_node'][0]) }}"
  become: true
  gather_facts: false
  vars:
    max_age_seconds: 300  # only logs modified in the last 300 seconds
  tasks:
    - name: Find iperf logs
      find:
        paths: "/root/IPERF"
        patterns: "iperf_*.log"
      register: iperf_files
    
    - name: Filter logs modified in the last 300 seconds
      set_fact:
        recent_logs: >-
          {{ iperf_files.files
             | selectattr('mtime', '>=', (ansible_date_time.epoch | int) - max_age_seconds)
             | list }}
    
    - name: Read logs content
      slurp:
        src: "{{ item.path }}"
      loop: "{{ recent_logs | sort(attribute='mtime', reverse=true) }}"
      register: log_contents
    
    - name: 🚀 DISPLAY LOGS
      debug:
        msg: |
          FILE: {{ item.item.path }}
          {{ item.content | b64decode | regex_replace('\x00', '') }}
      loop: "{{ log_contents.results }}"
      loop_control:
        label: "{{ item.item.path }}"
    
    - name: "📌 NOTE Location of all iperf results"
      debug:
        msg: "NOTA: All iperfs results are stored in {{ inventory_hostname }} server on /root/IPERF directory"
