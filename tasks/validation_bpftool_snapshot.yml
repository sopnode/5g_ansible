---
- name: Discover running eBPF latency probe container in the RAN pod
  ansible.builtin.shell: |
    set -eu
    ns="{{ validation_bpftool_namespace | default(hostvars['localhost'].validation_ran_namespace_effective | default('open5gs')) }}"
    selectors="{{ validation_bpftool_pod_selectors | default(['app=oai-gnb', 'app.kubernetes.io/name=oai-gnb', 'app.kubernetes.io/name=oai-du', 'app.kubernetes.io/name=oai-cu-up', 'app.kubernetes.io/name=oai-cuup']) | join(';;') }}"
    container_regex="{{ validation_bpftool_probe_container_regex | default('^ebpf-latency-probe') }}"
    pod=""
    old_ifs="$IFS"
    IFS=';;'
    for selector in $selectors; do
      IFS="$old_ifs"
      [ -z "$selector" ] && continue
      pod=$(kubectl -n "$ns" get pods \
        -l "$selector" \
        --field-selector=status.phase=Running \
        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
      if [ -n "$pod" ]; then
        break
      fi
      IFS=';;'
    done
    IFS="$old_ifs"
    if [ -z "$pod" ]; then
      pod=$(kubectl -n "$ns" get pods \
        --field-selector=status.phase=Running \
        --no-headers \
        -o custom-columns=NAME:.metadata.name 2>/dev/null \
        | grep -E -i 'gnb|du|cu-up|cuup' \
        | head -n 1 || true)
    fi
    if [ -z "$pod" ]; then
      echo "$ns"
      echo ""
      echo ""
      echo "no running RAN pod found" >&2
      exit 2
    fi
    running_containers=$(kubectl -n "$ns" get pod "$pod" \
      -o jsonpath='{range .status.containerStatuses[?(@.state.running)]}{.name}{"\n"}{end}{range .status.ephemeralContainerStatuses[?(@.state.running)]}{.name}{"\n"}{end}' 2>/dev/null || true)
    container=$(printf '%s\n' "$running_containers" | grep -E "$container_regex" | head -n 1 || true)
    if [ -z "$container" ]; then
      echo "$ns"
      echo "$pod"
      echo ""
      echo "no running container matching $container_regex in pod $pod" >&2
      exit 3
    fi
    echo "$ns"
    echo "$pod"
    echo "$container"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  register: validation_bpftool_probe_discovery
  changed_when: false
  failed_when: false

- name: Set bpftool probe target facts
  ansible.builtin.set_fact:
    validation_bpftool_target_namespace: "{{ validation_bpftool_probe_discovery.stdout_lines[0] | default('') }}"
    validation_bpftool_target_pod: "{{ validation_bpftool_probe_discovery.stdout_lines[1] | default('') }}"
    validation_bpftool_target_container: "{{ validation_bpftool_probe_discovery.stdout_lines[2] | default('') }}"

- name: Enable kernel BPF runtime stats from the running probe container
  ansible.builtin.shell: |
    kubectl -n "{{ validation_bpftool_target_namespace }}" exec "{{ validation_bpftool_target_pod }}" \
      -c "{{ validation_bpftool_target_container }}" -- sh -lc '
        if [ -w /proc/sys/kernel/bpf_stats_enabled ]; then
          echo 1 > /proc/sys/kernel/bpf_stats_enabled
        elif command -v sysctl >/dev/null 2>&1; then
          sysctl -w kernel.bpf_stats_enabled=1 >/dev/null
        fi
      '
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  register: validation_bpftool_enable_stats_output
  changed_when: false
  failed_when: false
  when:
    - validation_bpftool_enable_stats | default(true) | bool
    - validation_bpftool_target_pod | length > 0
    - validation_bpftool_target_container | length > 0

- name: Capture bpftool program snapshot from the running probe container
  ansible.builtin.shell: |
    kubectl -n "{{ validation_bpftool_target_namespace }}" exec "{{ validation_bpftool_target_pod }}" \
      -c "{{ validation_bpftool_target_container }}" -- sh -lc '
        if ! command -v bpftool >/dev/null 2>&1; then
          echo "bpftool not found in container" >&2
          exit 127
        fi
        bpftool -j prog show
      '
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  register: validation_bpftool_prog_snapshot
  changed_when: false
  failed_when: false
  when:
    - validation_bpftool_target_pod | length > 0
    - validation_bpftool_target_container | length > 0

- name: Write bpftool snapshot artifact
  ansible.builtin.copy:
    dest: "{{ paper_results_dir }}/bpftool/{{ validation_capture_label_safe }}__{{ validation_bpftool_snapshot_phase }}.json"
    mode: "0644"
    content: "{{ validation_bpftool_snapshot_payload | to_nice_json }}"
  delegate_to: localhost
  vars:
    validation_bpftool_snapshot_payload:
      phase: "{{ validation_bpftool_snapshot_phase }}"
      label: "{{ validation_capture_label_safe }}"
      scenario: "{{ paper_scenario.name }}"
      step: "{{ paper_step.name }}"
      direction: "{{ paper_direction }}"
      namespace: "{{ validation_bpftool_target_namespace | default('') }}"
      pod: "{{ validation_bpftool_target_pod | default('') }}"
      container: "{{ validation_bpftool_target_container | default('') }}"
      discovery_rc: "{{ validation_bpftool_probe_discovery.rc | default('') }}"
      discovery_stderr: "{{ validation_bpftool_probe_discovery.stderr | default('') }}"
      enable_stats_rc: "{{ validation_bpftool_enable_stats_output.rc | default('') }}"
      enable_stats_stderr: "{{ validation_bpftool_enable_stats_output.stderr | default('') }}"
      bpftool_rc: "{{ validation_bpftool_prog_snapshot.rc | default('') }}"
      bpftool_stderr: "{{ validation_bpftool_prog_snapshot.stderr | default('') }}"
      raw_stdout: "{{ validation_bpftool_prog_snapshot.stdout | default('') }}"

- name: Warn when bpftool snapshot did not succeed
  ansible.builtin.debug:
    msg:
      - "bpftool snapshot {{ validation_bpftool_snapshot_phase }} failed for {{ validation_capture_label_safe }}."
      - "Target: {{ validation_bpftool_target_namespace | default('') }}/{{ validation_bpftool_target_pod | default('') }} container={{ validation_bpftool_target_container | default('') }}"
      - "{{ validation_bpftool_probe_discovery.stderr | default(validation_bpftool_prog_snapshot.stderr | default('No stderr captured.')) }}"
  when: >
    (validation_bpftool_probe_discovery.rc | default(1) | int) != 0
    or (validation_bpftool_prog_snapshot.rc | default(1) | int) != 0
