---
- name: Set iperf direction args
  ansible.builtin.set_fact:
    paper_direction_args: "{{ '-R' if paper_direction == 'dl' else '' }}"
    paper_step_bitrate: "{{ paper_step.bitrate | default(paper_step.tcp_bitrate | default('')) | string | trim }}"

- name: Record direction start
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/record_paper_timeline_event.yml"
  vars:
    paper_timeline_event:
      level: "direction"
      phase: "start"
      scenario: "{{ paper_scenario.name }}"
      scenario_title: "{{ paper_scenario.title | default('') }}"
      scenario_index: "{{ paper_scenario_index | int }}"
      step: "{{ paper_step.name }}"
      step_index: "{{ paper_step_index | int }}"
      direction: "{{ paper_direction }}"
      ues: "{{ paper_step_ues }}"
      parallel_streams: "{{ paper_step.parallel_streams | default(1) | int }}"
      parallel_by_ue: "{{ paper_step.parallel_by_ue | default({}) }}"
      ue_roles: "{{ paper_step.ue_roles | default({}) }}"
      bitrate: "{{ paper_step_bitrate }}"
      command_template: "iperf3 -c {{ paper_target_server_ip }} -t {{ paper_duration }} -P <per-UE> {{ ('-b ' ~ paper_step_bitrate) if paper_step_bitrate | length > 0 else '' }} {{ paper_direction_args }} --json --get-server-output"

- name: Start TCP iperf jobs
  ansible.builtin.shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ item }} '
      set -e
      LOG_DIR="/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}"
      mkdir -p "$LOG_DIR"
      iperf3 \
        -p {{ paper_ue_port_map[item] }} \
        -B {{ ue_ips[item] }} \
        -c {{ paper_target_server_ip }} \
        -t {{ paper_duration }} \
        -P {{ (paper_step.parallel_by_ue | default({}))[item] | default(paper_step.parallel_streams | default(1)) }} \
        {{ ('-b ' ~ paper_step_bitrate) if paper_step_bitrate | length > 0 else '' }} \
        {{ paper_direction_args }} \
        --json \
        --get-server-output \
        > "$LOG_DIR/iperf_{{ item }}.json" \
        2> "$LOG_DIR/iperf_{{ item }}.stderr" || {
          rc=$?
          echo "TCP paper iperf failed during the real experiment job." >&2
          echo "scenario={{ paper_scenario.name }} step={{ paper_step.name }} direction={{ paper_direction }} ue={{ item }} port={{ paper_ue_port_map[item] }} ue_ip={{ ue_ips[item] }} target={{ paper_target_server_ip }} rc=$rc" >&2
          echo "Remote logs: $LOG_DIR/iperf_{{ item }}.json and $LOG_DIR/iperf_{{ item }}.stderr" >&2
          head -n 80 "$LOG_DIR/iperf_{{ item }}.json" >&2 || true
          head -n 80 "$LOG_DIR/iperf_{{ item }}.stderr" >&2 || true
          exit "$rc"
        }
      if grep -q '"error"[[:space:]]*:' "$LOG_DIR/iperf_{{ item }}.json"; then
        echo "TCP paper iperf JSON reported an error during the real experiment job." >&2
        echo "scenario={{ paper_scenario.name }} step={{ paper_step.name }} direction={{ paper_direction }} ue={{ item }} port={{ paper_ue_port_map[item] }} ue_ip={{ ue_ips[item] }} target={{ paper_target_server_ip }}" >&2
        echo "Remote logs: $LOG_DIR/iperf_{{ item }}.json and $LOG_DIR/iperf_{{ item }}.stderr" >&2
        head -n 80 "$LOG_DIR/iperf_{{ item }}.json" >&2 || true
        head -n 80 "$LOG_DIR/iperf_{{ item }}.stderr" >&2 || true
        exit 1
      fi
    '
  async: "{{ paper_duration | int + paper_async_grace | int }}"
  poll: 0
  loop: "{{ paper_step_ues }}"
  loop_control:
    label: "{{ item }}"
  register: paper_iperf_jobs
  changed_when: true
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Stop validation pcap window after bounded capture time
  block:
    - name: Wait for validation pcap window
      ansible.builtin.pause:
        seconds: "{{ validation_pcap_capture_seconds_for_direction | default(15) | int }}"

    - name: Stop and fetch validation pcap window
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_pcap_stop_fetch.yml"
  when: validation_pcap_capture_active_for_direction | default(false) | bool

- name: Wait for TCP iperf jobs to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: paper_iperf_wait
  until: paper_iperf_wait.finished
  retries: "{{ (paper_duration | int // 5) + 60 }}"
  delay: 5
  loop: "{{ paper_iperf_jobs.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default(item.ansible_job_id | default('unknown')) }}"
  when: item.ansible_job_id is defined
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Collect failed TCP iperf wait jobs
  ansible.builtin.set_fact:
    paper_iperf_wait_failed_jobs: "{{ paper_iperf_wait.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list }}"

- name: Stop remaining iperf jobs after completion failure
  ansible.builtin.shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ item }} \
      "pkill -f 'iperf3 .* -c {{ paper_target_server_ip }}' >/dev/null 2>&1 || true"
  loop: "{{ paper_step_ues }}"
  changed_when: false
  failed_when: false
  when: paper_iperf_wait_failed_jobs | length > 0

- name: Fail if any real TCP iperf job failed
  ansible.builtin.fail:
    msg: |
      TCP paper iperf failed during the real experiment window.
      scenario={{ paper_scenario.name }} step={{ paper_step.name }} direction={{ paper_direction }}
      ue={{ item.item.item | default(item.item | default('unknown')) }}
      rc={{ item.rc | default('unknown') }}
      msg={{ item.msg | default('') }}
      remote_json=/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}/iperf_{{ item.item.item | default(item.item | default('unknown')) }}.json
      remote_stderr=/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}/iperf_{{ item.item.item | default(item.item | default('unknown')) }}.stderr

      stdout:
      {{ item.stdout | default('') }}

      stderr:
      {{ item.stderr | default('') }}
  loop: "{{ paper_iperf_wait.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item | default(item.item | default('unknown')) }}"
  when: >
    (item.failed | default(false) | bool) or
    (item.rc is defined and (item.rc | int) != 0)

- name: Cleanup async job files
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  loop: "{{ paper_iperf_jobs.results | default([]) }}"
  when: item.ansible_job_id is defined
  ignore_errors: true

- name: Record direction end
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/record_paper_timeline_event.yml"
  vars:
    paper_timeline_event:
      level: "direction"
      phase: "end"
      scenario: "{{ paper_scenario.name }}"
      scenario_title: "{{ paper_scenario.title | default('') }}"
      scenario_index: "{{ paper_scenario_index | int }}"
      step: "{{ paper_step.name }}"
      step_index: "{{ paper_step_index | int }}"
      direction: "{{ paper_direction }}"
      ues: "{{ paper_step_ues }}"
      parallel_streams: "{{ paper_step.parallel_streams | default(1) | int }}"
      parallel_by_ue: "{{ paper_step.parallel_by_ue | default({}) }}"
      ue_roles: "{{ paper_step.ue_roles | default({}) }}"
      bitrate: "{{ paper_step_bitrate }}"
