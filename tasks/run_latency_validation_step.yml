---
- name: Select connected UEs for this validation step
  ansible.builtin.set_fact:
    paper_step_ues: "{{ paper_step.ues | select('in', paper_connected_ues) | list }}"

- name: Set validation netem facts
  ansible.builtin.set_fact:
    validation_step_netem_enabled: "{{ validation_enable_netem | default(true) | bool and paper_step.netem_delay_ms is defined }}"
    validation_step_netem_iface: "{{ validation_netem_interface | default(hostvars[paper_target_server_host].nic_interface | default('')) }}"
    validation_step_netem_ifb: "{{ validation_netem_ifb | default('ifb5gval') }}"
    validation_step_netem_method: "{{ validation_netem_method | default('pod_ifb_redirect') }}"
    validation_step_netem_peer_ips: "{{ paper_step_ues | map('extract', ue_ips) | list }}"
    validation_step_netem_host: "{{ paper_step.netem_host | default(validation_netem_host | default(groups['core_node'][0])) }}"
    validation_step_netem_target_role: "{{ paper_step.netem_target_role | default(validation_netem_target_role | default('upf')) }}"
    validation_step_netem_namespace: "{{ paper_step.netem_namespace | default(validation_netem_namespace | default('open5gs')) }}"
    validation_step_netem_pod_iface: "{{ paper_step.netem_pod_iface | default(validation_netem_pod_iface | default('n3')) }}"
    validation_step_netem_pod_selectors: "{{ paper_step.netem_pod_selectors | default(validation_netem_pod_selectors | default(['nf=upf', 'app=open5gs,nf=upf', 'app.kubernetes.io/name=open5gs-upf'])) }}"
    validation_step_netem_pod_name_regex: "{{ paper_step.netem_pod_name_regex | default(validation_netem_pod_name_regex | default('upf')) }}"
    validation_step_netem_pod_container_regex: "{{ paper_step.netem_pod_container_regex | default(validation_netem_pod_container_regex | default('upf')) }}"
    validation_step_netem_target_pod_regex: "{{ paper_step.netem_target_pod_regex | default(validation_netem_target_pod_regex | default('')) }}"
    validation_step_netem_filter_prio: "{{ paper_step.netem_filter_prio | default(validation_netem_filter_prio | default(49152)) }}"
    validation_step_netem_cleanup_filter: "{{ paper_step.netem_cleanup_filter | default(validation_netem_cleanup_filter | default(true)) }}"
    validation_step_netem_cleanup_ifb: "{{ paper_step.netem_cleanup_ifb | default(validation_netem_cleanup_ifb | default(false)) }}"
    validation_step_netem_label_safe: "{{ (paper_scenario.name ~ '__' ~ paper_step.name) | regex_replace('[^A-Za-z0-9_.-]', '_') }}"
    validation_step_tc_pass_enabled: "{{ paper_step.tc_pass_baseline | default(false) | bool }}"
    validation_step_tc_pass_label_safe: "{{ (paper_scenario.name ~ '__' ~ paper_step.name) | regex_replace('[^A-Za-z0-9_.-]', '_') }}"
    validation_tc_pass_host: "{{ paper_step.tc_pass_host | default(validation_tc_pass_host | default(validation_netem_ran_host | default(groups['ran_node'][0] if (groups['ran_node'] | default([]) | length > 0) else groups['core_node'][0]))) }}"
    validation_tc_pass_namespace: "{{ paper_step.tc_pass_namespace | default(validation_tc_pass_namespace | default(validation_netem_ran_namespace | default('open5gs'))) }}"
    validation_tc_pass_pod_iface: "{{ paper_step.tc_pass_pod_iface | default(validation_tc_pass_pod_iface | default(validation_netem_ran_pod_iface | default('n3'))) }}"
    validation_tc_pass_pod_selectors: "{{ paper_step.tc_pass_pod_selectors | default(validation_tc_pass_pod_selectors | default(['app=oai-gnb', 'app.kubernetes.io/name=oai-gnb', 'app.kubernetes.io/name=oai-du', 'app.kubernetes.io/name=oai-cu-up', 'app.kubernetes.io/name=oai-cuup'])) }}"
    validation_tc_pass_pod_name_regex: "{{ paper_step.tc_pass_pod_name_regex | default(validation_tc_pass_pod_name_regex | default('gnb|du|cu-up|cuup')) }}"
    validation_tc_pass_pod_container_regex: "{{ paper_step.tc_pass_pod_container_regex | default(validation_tc_pass_pod_container_regex | default('gnb|oai-gnb|nr-gnb|du|cu-up|cuup')) }}"
    validation_tc_pass_target_pod_regex: "{{ paper_step.tc_pass_target_pod_regex | default(validation_tc_pass_target_pod_regex | default('')) }}"
    validation_tc_pass_filter_prio: "{{ paper_step.tc_pass_filter_prio | default(validation_tc_pass_filter_prio | default(49153)) }}"
    validation_tc_pass_install_deps: "{{ paper_step.tc_pass_install_deps | default(validation_tc_pass_install_deps | default(true)) }}"

- name: Show validation step details
  ansible.builtin.debug:
    msg:
      - "Scenario: {{ paper_scenario.name }}"
      - "Step: {{ paper_step.name }}"
      - "UEs: {{ paper_step_ues | join(', ') }}"
      - "Default parallel streams: {{ paper_step.parallel_streams | default(1) }}"
      - "Per-UE parallel overrides: {{ paper_step.parallel_by_ue | default({}) }}"
      - "TCP bitrate cap: {{ paper_step.bitrate | default(paper_step.tcp_bitrate | default('unlimited')) }}"
      - "Pcap capture for step: {{ paper_step.capture_pcap | default(true) }}"
      - "Pcap capture seconds: {{ paper_step.pcap_capture_seconds | default(validation_pcap_capture_seconds | default(15)) }}"
      - "Netem enabled for step: {{ validation_step_netem_enabled }}"
      - "Netem delay: {{ paper_step.netem_delay_ms | default('none') }} ms"
      - "Netem method: {{ validation_step_netem_method }}"
      - "Netem IFB: {{ validation_step_netem_ifb }}"
      - "Netem target role: {{ validation_step_netem_target_role }}"
      - "Netem host/pod iface: {{ validation_step_netem_host }} / {{ validation_step_netem_pod_iface }}"
      - "Netem target pod regex: {{ validation_step_netem_target_pod_regex | default('') }}"
      - "Netem validation filter prio: {{ validation_step_netem_filter_prio }}"
      - "Netem cleanup validation filter: {{ validation_step_netem_cleanup_filter }}"
      - "Netem cleanup IFB device: {{ validation_step_netem_cleanup_ifb }}"
      - "Netem matched UE IPs: {{ validation_step_netem_peer_ips | join(', ') }}"
      - "TC pass baseline enabled: {{ validation_step_tc_pass_enabled }}"
      - "TC pass target host/pod iface: {{ validation_tc_pass_host }} / {{ validation_tc_pass_pod_iface }}"
      - "TC pass filter prio: {{ validation_tc_pass_filter_prio }}"

- name: Record validation step start
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/record_paper_timeline_event.yml"
  vars:
    paper_timeline_event:
      level: "step"
      phase: "start"
      scenario: "{{ paper_scenario.name }}"
      scenario_title: "{{ paper_scenario.title | default('') }}"
      scenario_index: "{{ paper_scenario_index | int }}"
      step: "{{ paper_step.name }}"
      step_index: "{{ paper_step_index | int }}"
      ues: "{{ paper_step_ues }}"
      configured_ues: "{{ paper_step.ues }}"
      parallel_streams: "{{ paper_step.parallel_streams | default(1) | int }}"
      parallel_by_ue: "{{ paper_step.parallel_by_ue | default({}) }}"
      bitrate: "{{ paper_step.bitrate | default(paper_step.tcp_bitrate | default('')) }}"
      directions: "{{ paper_step.directions | default([]) }}"
      pcap_capture_seconds: "{{ paper_step.pcap_capture_seconds | default(validation_pcap_capture_seconds | default(15)) | int }}"
      netem_enabled: "{{ validation_step_netem_enabled }}"
      netem_delay_ms: "{{ paper_step.netem_delay_ms | default('') }}"
      netem_method: "{{ validation_step_netem_method }}"
      netem_ifb: "{{ validation_step_netem_ifb }}"
      netem_target_role: "{{ validation_step_netem_target_role }}"
      netem_target_pod_regex: "{{ validation_step_netem_target_pod_regex }}"
      netem_filter_prio: "{{ validation_step_netem_filter_prio }}"
      netem_cleanup_filter: "{{ validation_step_netem_cleanup_filter }}"
      netem_cleanup_ifb: "{{ validation_step_netem_cleanup_ifb }}"
      netem_peer_ips: "{{ validation_step_netem_peer_ips }}"
      tc_pass_baseline: "{{ validation_step_tc_pass_enabled }}"
      tc_pass_filter_prio: "{{ validation_tc_pass_filter_prio }}"
  when: paper_step_ues | length > 0

- name: Run validation step with optional controlled netem
  block:
    - name: Resolve selected pod for ingress IFB netem delay
      ansible.builtin.shell: |
        set -euo pipefail
        ns="{{ validation_step_netem_namespace }}"
        selectors="{{ validation_step_netem_pod_selectors | join(';;') }}"
        pod_regex="{{ validation_step_netem_pod_name_regex }}"
        target_pod_regex="{{ validation_step_netem_target_pod_regex | default('') }}"
        container_regex="{{ validation_step_netem_pod_container_regex }}"
        target_role="{{ validation_step_netem_target_role }}"

        pods=""
        old_ifs="$IFS"
        IFS=';;'
        for selector in $selectors; do
          IFS="$old_ifs"
          [ -z "$selector" ] && continue
          matches=$(kubectl -n "$ns" get pods \
            -l "$selector" \
            --field-selector=status.phase=Running \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
          if [ -n "$matches" ]; then
            pods="$(printf '%s\n%s\n' "$pods" "$matches")"
          fi
          IFS=';;'
        done
        IFS="$old_ifs"
        if [ -z "$(printf '%s' "$pods" | tr -d '[:space:]')" ]; then
          pods=$(kubectl -n "$ns" get pods \
            --field-selector=status.phase=Running \
            --no-headers \
            -o custom-columns=NAME:.metadata.name 2>/dev/null \
            | grep -E -i "$pod_regex" || true)
        fi
        pods=$(printf '%s\n' "$pods" | sed '/^[[:space:]]*$/d' | sort -u)
        if [ -n "$target_pod_regex" ]; then
          pods=$(printf '%s\n' "$pods" | grep -E -i "$target_pod_regex" || true)
        fi
        if [ -z "$pods" ]; then
          echo "No running $target_role pod matched netem selectors in namespace $ns" >&2
          exit 4
        fi

        pod=$(printf '%s\n' "$pods" | head -n 1)
        containers=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}')
        container=$(printf '%s\n' "$containers" | grep -E -i "$container_regex" | head -n 1 || true)
        if [ -z "$container" ]; then
          container=$(printf '%s\n' "$containers" | head -n 1)
        fi
        if [ -z "$container" ]; then
          echo "No container found for pod $pod" >&2
          exit 5
        fi

        status_lines=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .status.containerStatuses[*]}{.name}{"="}{.containerID}{"\n"}{end}' 2>/dev/null || true)
        cid=$(printf '%s\n' "$status_lines" | awk -F= -v c="$container" '$1 == c {print $2; exit}')
        cid="${cid#*://}"
        if [ -z "$cid" ]; then
          echo "Could not resolve container ID for $ns/$pod container $container" >&2
          exit 6
        fi
        node=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{.spec.nodeName}')
        if [ -z "$node" ]; then
          echo "Could not resolve node for $ns/$pod" >&2
          exit 7
        fi
        printf '%s|%s|%s|%s|%s\n' "$ns" "$pod" "$container" "$node" "$cid"
      args:
        executable: /bin/bash
      delegate_to: "{{ validation_k8s_control_host | default(validation_step_netem_host) }}"
      become: true
      environment:
        KUBECONFIG: "{{ validation_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
      register: validation_netem_target_resolution
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'pod_ifb_redirect'
      changed_when: false

    - name: Set selected pod ingress IFB netem target facts
      ansible.builtin.set_fact:
        validation_step_netem_target_ns: "{{ validation_netem_target_resolution.stdout.split('|')[0] }}"
        validation_step_netem_target_pod: "{{ validation_netem_target_resolution.stdout.split('|')[1] }}"
        validation_step_netem_target_container: "{{ validation_netem_target_resolution.stdout.split('|')[2] }}"
        validation_step_netem_target_node: "{{ validation_netem_target_resolution.stdout.split('|')[3] }}"
        validation_step_netem_target_container_id: "{{ validation_netem_target_resolution.stdout.split('|')[4] }}"
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'pod_ifb_redirect'

    - name: Show selected pod ingress IFB netem target
      ansible.builtin.debug:
        msg:
          - "Netem target role: {{ validation_step_netem_target_role }}"
          - "Netem target pod: {{ validation_step_netem_target_ns }}/{{ validation_step_netem_target_pod }}"
          - "Netem target container: {{ validation_step_netem_target_container }}"
          - "Netem target physical node: {{ validation_step_netem_target_node }}"
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'pod_ifb_redirect'

    - name: Apply selected pod ingress IFB netem delay
      ansible.builtin.shell: |
        set -euo pipefail
        ns="{{ validation_step_netem_target_ns }}"
        pod="{{ validation_step_netem_target_pod }}"
        container="{{ validation_step_netem_target_container }}"
        cid="{{ validation_step_netem_target_container_id }}"
        iface_pref="{{ validation_step_netem_pod_iface }}"
        ifb="{{ validation_step_netem_ifb }}"
        delay_ms="{{ paper_step.netem_delay_ms }}"
        filter_prio="{{ validation_step_netem_filter_prio }}"
        target_role="{{ validation_step_netem_target_role }}"
        state_dir="/tmp/{{ paper_run_id }}/netem"
        state_file="$state_dir/{{ validation_step_netem_label_safe }}.targets"

        mkdir -p "$state_dir"
        : > "$state_file"
        modprobe ifb numifbs=8 2>/dev/null || true

        pid=""
        if [ -n "$cid" ] && command -v crictl >/dev/null 2>&1; then
          pid=$(crictl inspect "$cid" 2>/dev/null | sed -n 's/.*"pid":[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -n 1)
        fi
        if [ -z "$pid" ] && [ -n "$cid" ] && [ -r "/run/containerd/io.containerd.runtime.v2.task/k8s.io/$cid/init.pid" ]; then
          pid=$(cat "/run/containerd/io.containerd.runtime.v2.task/k8s.io/$cid/init.pid")
        fi
        if [ -z "$pid" ] && [ -n "$cid" ] && command -v ctr >/dev/null 2>&1; then
          pid=$(ctr -n k8s.io tasks list 2>/dev/null | awk -v id="$cid" '$1 == id || index(id, $1) == 1 || index($1, id) == 1 {print $2; exit}')
        fi
        if [ -z "$pid" ]; then
          echo "Could not resolve host PID for $ns/$pod container $container" >&2
          exit 6
        fi

        iface=""
        for candidate in "$iface_pref" n3 n2 net1 eth0; do
          if [ -n "$candidate" ] && nsenter -t "$pid" -n ip link show "$candidate" >/dev/null 2>&1; then
            iface="$candidate"
            break
          fi
        done
        if [ -z "$iface" ]; then
          iface=$(nsenter -t "$pid" -n ip -o link show | awk -F': ' '$2 !~ /^(lo|ifb)/ {sub(/@.*/, "", $2); print $2; exit}')
        fi
        if [ -z "$iface" ]; then
          echo "Could not find pod interface for $ns/$pod" >&2
          exit 7
        fi

        delete_validation_filter() {
          nsenter -t "$pid" -n tc filter del dev "$iface" ingress protocol ip pref "$filter_prio" 2>/dev/null && return 0
          nsenter -t "$pid" -n tc filter del dev "$iface" ingress pref "$filter_prio" 2>/dev/null && return 0
          nsenter -t "$pid" -n tc filter del dev "$iface" parent ffff: protocol ip pref "$filter_prio" 2>/dev/null && return 0
          return 0
        }
        delete_validation_filter

        nsenter -t "$pid" -n tc qdisc del dev "$ifb" root 2>/dev/null || true
        if ! nsenter -t "$pid" -n ip link show "$ifb" >/dev/null 2>&1; then
          nsenter -t "$pid" -n ip link add "$ifb" type ifb
        fi
        nsenter -t "$pid" -n ip link set dev "$ifb" up
        nsenter -t "$pid" -n tc qdisc add dev "$ifb" root netem delay "${delay_ms}ms"

        nsenter -t "$pid" -n tc qdisc add dev "$iface" ingress 2>/dev/null || true
        nsenter -t "$pid" -n tc filter add dev "$iface" ingress protocol ip prio "$filter_prio" u32 \
          match u32 0 0 \
          action mirred egress redirect dev "$ifb"

        printf '%s|%s|%s|%s|%s|%s\n' "$ns" "$pod" "$container" "$pid" "$iface" "$ifb" >> "$state_file"
        echo "Ingress IFB netem configured for $target_role $ns/$pod container=$container pid=$pid iface=$iface ifb=$ifb delay=${delay_ms}ms"
        nsenter -t "$pid" -n tc qdisc show dev "$iface" || true
        nsenter -t "$pid" -n tc filter show dev "$iface" ingress || true
        nsenter -t "$pid" -n tc qdisc show dev "$ifb" || true
      args:
        executable: /bin/bash
      delegate_to: "{{ validation_step_netem_target_node | default(validation_step_netem_host) }}"
      become: true
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'pod_ifb_redirect'
      changed_when: true

    - name: Apply target-server IFB netem delay
      ansible.builtin.shell: |
        set -e
        iface="{{ validation_step_netem_iface }}"
        ifb="{{ validation_step_netem_ifb }}"
        delay_ms="{{ paper_step.netem_delay_ms }}"
        peer_ips="{{ validation_step_netem_peer_ips | join(' ') }}"

        if [ -z "$iface" ]; then
          echo "No validation netem interface configured" >&2
          exit 2
        fi
        if [ -z "$peer_ips" ]; then
          echo "No UE IPs available for validation netem filters" >&2
          exit 3
        fi

        modprobe ifb numifbs=1 2>/dev/null || true
        if ! ip link show "$ifb" >/dev/null 2>&1; then
          ip link add "$ifb" type ifb
        fi
        ip link set dev "$ifb" up

        tc qdisc del dev "$ifb" root 2>/dev/null || true
        tc qdisc replace dev "$ifb" root netem delay "${delay_ms}ms"

        tc qdisc del dev "$iface" clsact 2>/dev/null || true
        tc qdisc add dev "$iface" clsact

        prio=10
        for peer_ip in $peer_ips; do
          tc filter add dev "$iface" ingress protocol ip prio "$prio" u32 \
            match ip src "$peer_ip"/32 \
            action mirred egress redirect dev "$ifb"
          tc filter add dev "$iface" egress protocol ip prio "$prio" u32 \
            match ip dst "$peer_ip"/32 \
            action mirred egress redirect dev "$ifb"
          prio=$((prio + 1))
        done

        echo "IFB netem configured on $ifb for UE IPs: $peer_ips"
        tc qdisc show dev "$iface" || true
        tc filter show dev "$iface" ingress || true
        tc filter show dev "$iface" egress || true
        tc qdisc show dev "$ifb" || true
      delegate_to: "{{ paper_target_server_host }}"
      become: true
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'ifb_redirect'
        - validation_step_netem_iface | length > 0
      changed_when: true

    - name: Attach TC pass baseline for this step
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_tc_pass_baseline.yml"
      when:
        - validation_step_tc_pass_enabled | bool
        - paper_step_ues | length > 0

    - name: Run validation step directions
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/run_latency_validation_direction.yml"
      loop: "{{ paper_step.directions | default(['ul', 'dl']) }}"
      loop_control:
        loop_var: paper_direction
        label: "{{ paper_direction }}"
      when: paper_step_ues | length > 0

  always:
    - name: Clear selected pod ingress IFB netem delay
      ansible.builtin.shell: |
        set -u
        state_file="/tmp/{{ paper_run_id }}/netem/{{ validation_step_netem_label_safe }}.targets"
        filter_prio="{{ validation_step_netem_filter_prio }}"
        cleanup_ifb="{{ validation_step_netem_cleanup_ifb | bool | ternary('true', 'false') }}"
        if [ ! -f "$state_file" ]; then
          exit 0
        fi
        while IFS='|' read -r ns pod container pid iface ifb; do
          [ -z "$pid" ] && continue
          if ! kill -0 "$pid" 2>/dev/null; then
            continue
          fi
          if [ -n "$iface" ]; then
            nsenter -t "$pid" -n tc filter del dev "$iface" ingress protocol ip pref "$filter_prio" 2>/dev/null && true
            nsenter -t "$pid" -n tc filter del dev "$iface" ingress pref "$filter_prio" 2>/dev/null && true
            nsenter -t "$pid" -n tc filter del dev "$iface" parent ffff: protocol ip pref "$filter_prio" 2>/dev/null || true
          fi
          if [ "$cleanup_ifb" = "true" ] && [ -n "$ifb" ]; then
            nsenter -t "$pid" -n tc qdisc del dev "$ifb" root 2>/dev/null || true
            nsenter -t "$pid" -n ip link set dev "$ifb" down 2>/dev/null || true
            nsenter -t "$pid" -n ip link delete "$ifb" type ifb 2>/dev/null || true
          fi
        done < "$state_file"
        rm -f "$state_file"
      args:
        executable: /bin/bash
      delegate_to: "{{ validation_step_netem_target_node | default(validation_step_netem_host) }}"
      become: true
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'pod_ifb_redirect'
        - validation_step_netem_cleanup_filter | bool
      changed_when: false
      failed_when: false

    - name: Clear target-server IFB netem delay
      ansible.builtin.shell: |
        iface="{{ validation_step_netem_iface }}"
        ifb="{{ validation_step_netem_ifb }}"
        if [ -n "$iface" ]; then
          tc qdisc del dev "$iface" clsact 2>/dev/null || true
          tc qdisc del dev "$iface" ingress 2>/dev/null || true
        fi
        if [ -n "$ifb" ]; then
          tc qdisc del dev "$ifb" root 2>/dev/null || true
          ip link set dev "$ifb" down 2>/dev/null || true
          ip link delete "$ifb" type ifb 2>/dev/null || true
        fi
      delegate_to: "{{ paper_target_server_host }}"
      become: true
      when:
        - validation_step_netem_enabled | bool
        - validation_step_netem_method == 'ifb_redirect'
        - validation_step_netem_iface | length > 0
      changed_when: false
      failed_when: false

    - name: Clear TC pass baseline
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_tc_pass_cleanup.yml"
      when:
        - validation_step_tc_pass_enabled | bool
        - paper_step_ues | length > 0

- name: Record validation step end
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/record_paper_timeline_event.yml"
  vars:
    paper_timeline_event:
      level: "step"
      phase: "end"
      scenario: "{{ paper_scenario.name }}"
      scenario_title: "{{ paper_scenario.title | default('') }}"
      scenario_index: "{{ paper_scenario_index | int }}"
      step: "{{ paper_step.name }}"
      step_index: "{{ paper_step_index | int }}"
      ues: "{{ paper_step_ues }}"
      parallel_streams: "{{ paper_step.parallel_streams | default(1) | int }}"
      parallel_by_ue: "{{ paper_step.parallel_by_ue | default({}) }}"
      directions: "{{ paper_step.directions | default([]) }}"
      pcap_capture_seconds: "{{ paper_step.pcap_capture_seconds | default(validation_pcap_capture_seconds | default(15)) | int }}"
      netem_enabled: "{{ validation_step_netem_enabled }}"
      netem_delay_ms: "{{ paper_step.netem_delay_ms | default('') }}"
      netem_method: "{{ validation_step_netem_method }}"
      netem_ifb: "{{ validation_step_netem_ifb }}"
      netem_target_role: "{{ validation_step_netem_target_role }}"
      netem_target_pod_regex: "{{ validation_step_netem_target_pod_regex }}"
