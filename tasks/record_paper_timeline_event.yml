---
- name: Capture timeline event timestamp
  ansible.builtin.set_fact:
    paper_timeline_epoch: "{{ lookup('pipe', 'date +%s') }}"
    paper_timeline_utc: "{{ lookup('pipe', \"date -u '+%Y-%m-%dT%H:%M:%SZ'\") }}"
    paper_timeline_local: "{{ lookup('pipe', 'TZ=' ~ (paper_local_timezone | default('Europe/Paris') | quote) ~ \" date '+%Y-%m-%d %H:%M:%S %Z'\") }}"

- name: Append timeline event
  ansible.builtin.lineinfile:
    path: "{{ paper_results_dir }}/timeline_events.jsonl"
    line: "{{ paper_timeline_event | combine(paper_timeline_timestamp) | to_json }}"
    create: true
    insertafter: EOF
    mode: "0644"
  vars:
    paper_timeline_timestamp:
      run_id: "{{ paper_run_id }}"
      epoch: "{{ paper_timeline_epoch | int }}"
      utc_time: "{{ paper_timeline_utc }}"
      local_time: "{{ paper_timeline_local }}"
      timezone: "{{ paper_local_timezone | default('Europe/Paris') }}"
  delegate_to: localhost
