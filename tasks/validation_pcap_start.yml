---
- name: Start validation host pcaps for this traffic window
  ansible.builtin.shell: |
    set -e
    run_dir="/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}"
    mkdir -p "$run_dir"
    pid_file="$run_dir/tcpdump_{{ item }}.pid"
    if [ -f "$pid_file" ]; then
      kill -INT "$(cat "$pid_file")" 2>/dev/null || true
      sleep 1
    fi
    nohup tcpdump \
      -i {{ validation_pcap_iface }} \
      -s {{ validation_pcap_snaplen }} \
      -U \
      -w "$run_dir/{{ item }}_n3.pcap" \
      '{{ validation_pcap_filter }}' \
      > "$run_dir/{{ item }}_tcpdump.log" 2>&1 &
    echo "$!" > "$pid_file"
  delegate_to: "{{ item }}"
  become: true
  loop: "{{ (groups['core_node'] + groups['ran_node']) | unique | list }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'host'
    - validation_pcap_scope == 'direction'
  changed_when: true

- name: Ensure core-node pod pcap staging directory exists for this traffic window
  ansible.builtin.file:
    path: "/tmp/{{ paper_run_id }}/pcaps"
    state: directory
    mode: "0755"
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'

- name: Start validation pod pcaps for this traffic window
  ansible.builtin.shell: |
    set -eu
    ns="{{ item.namespace }}"
    pod="{{ item.pod }}"
    role="{{ item.role }}"
    container="{{ item.container | default('') }}"
    container_arg=()
    if [ -n "$container" ]; then
      container_arg=(-c "$container")
    fi
    kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- sh -c '
      run_dir="$1"
      role="$2"
      label="$3"
      iface="$4"
      snaplen="$5"
      capture_filter="$6"
      mkdir -p "$run_dir"
      pid_file="$run_dir/capture_${role}_${label}.pid"
      if [ -f "$pid_file" ]; then
        kill -INT "$(cat "$pid_file")" 2>/dev/null || true
        sleep 1
      fi
      if command -v tcpdump >/dev/null 2>&1; then
        echo "capture_tool=tcpdump" > "$run_dir/${role}_${label}_tcpdump.log"
        nohup tcpdump \
          -i "$iface" \
          -s "$snaplen" \
          -U \
          -w "$run_dir/${role}_${label}_n3.pcap" \
          "$capture_filter" \
          >> "$run_dir/${role}_${label}_tcpdump.log" 2>&1 &
      elif command -v tshark >/dev/null 2>&1; then
        echo "capture_tool=tshark" > "$run_dir/${role}_${label}_tcpdump.log"
        nohup tshark \
          -i "$iface" \
          -s "$snaplen" \
          -f "$capture_filter" \
          -w "$run_dir/${role}_${label}_n3.pcap" \
          >> "$run_dir/${role}_${label}_tcpdump.log" 2>&1 &
      else
        echo "no tcpdump/tshark found in capture container" > "$run_dir/${role}_${label}_tcpdump.log"
        exit 42
      fi
      echo "$!" > "$pid_file"
    ' sh "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}" "$role" "{{ validation_capture_label_safe }}" "{{ validation_pcap_pod_iface }}" "{{ validation_pcap_snaplen }}" "{{ validation_pcap_filter }}"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  register: validation_pod_pcap_start
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  changed_when: true
  failed_when: false

- name: Warn when validation pod pcap could not be started for this traffic window
  ansible.builtin.debug:
    msg:
      - "Could not start pod pcap for {{ item.item.role }} pod {{ item.item.pod }} container {{ item.item.container | default('default') }}."
      - "The validation traffic will continue; this capture target will only contribute a tcpdump/tshark log if one was created."
      - "Most common cause: the container image has neither tcpdump nor tshark, and package-manager installation did not succeed."
      - "stderr: {{ item.stderr | default('') }}"
      - "stdout: {{ item.stdout | default('') }}"
  loop: "{{ validation_pod_pcap_start.results | default([]) }}"
  loop_control:
    label: "{{ item.item.role if item.item is defined else 'unknown' }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
    - item.rc | default(0) != 0

- name: Start validation host-netns pod pcaps for failed pod capture targets
  ansible.builtin.shell: |
    set -u
    role="{{ item.item.role }}"
    pod="{{ item.item.pod }}"
    container="{{ item.item.container | default('') }}"
    cid="{{ item.item.container_id | default('') }}"
    label="{{ validation_capture_label_safe }}"
    iface="{{ validation_pcap_pod_iface }}"
    snaplen="{{ validation_pcap_snaplen }}"
    capture_filter="{{ validation_pcap_filter }}"
    run_dir="/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}"
    mkdir -p "$run_dir"

    pid_file="$run_dir/hostnet_${role}_${label}.pid"
    if [ -f "$pid_file" ]; then
      kill -INT "$(cat "$pid_file")" 2>/dev/null || true
      sleep 1
    fi

    if ! command -v tcpdump >/dev/null 2>&1; then
      if command -v apt-get >/dev/null 2>&1; then
        DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y tcpdump
      elif command -v dnf >/dev/null 2>&1; then
        dnf install -y tcpdump
      elif command -v yum >/dev/null 2>&1; then
        yum install -y tcpdump
      fi
    fi
    if ! command -v tcpdump >/dev/null 2>&1; then
      echo "host tcpdump not available on $(hostname)" > "$run_dir/${role}_${label}_tcpdump.log"
      exit 42
    fi

    pid=""
    if [ -n "$cid" ] && command -v crictl >/dev/null 2>&1; then
      pid=$(crictl inspect "$cid" 2>/dev/null | sed -n 's/.*"pid":[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -n 1)
    fi
    if [ -z "$pid" ] && [ -n "$cid" ] && [ -r "/run/containerd/io.containerd.runtime.v2.task/k8s.io/$cid/init.pid" ]; then
      pid=$(cat "/run/containerd/io.containerd.runtime.v2.task/k8s.io/$cid/init.pid")
    fi
    if [ -z "$pid" ] && [ -n "$cid" ] && command -v ctr >/dev/null 2>&1; then
      pid=$(ctr -n k8s.io tasks list 2>/dev/null | awk -v id="$cid" '$1 == id || index(id, $1) == 1 || index($1, id) == 1 {print $2; exit}')
    fi
    if [ -z "$pid" ]; then
      echo "could not resolve host PID for $pod/$container cid=$cid on $(hostname)" > "$run_dir/${role}_${label}_tcpdump.log"
      exit 43
    fi

    echo "capture_tool=host-netns-tcpdump node=$(hostname) pod=$pod container=$container pid=$pid iface=$iface" > "$run_dir/${role}_${label}_tcpdump.log"
    nohup nsenter -t "$pid" -n tcpdump \
      -i "$iface" \
      -s "$snaplen" \
      -U \
      -w "$run_dir/${role}_${label}_n3.pcap" \
      "$capture_filter" \
      >> "$run_dir/${role}_${label}_tcpdump.log" 2>&1 &
    echo "$!" > "$pid_file"
  args:
    executable: /bin/bash
  delegate_to: "{{ item.item.node | default(validation_k8s_control_host) }}"
  become: true
  loop: "{{ validation_pod_pcap_start.results | default([]) }}"
  loop_control:
    label: "{{ item.item.role if item.item is defined else 'unknown' }}={{ item.item.pod if item.item is defined else 'unknown' }}"
  register: validation_hostnet_pcap_start
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
    - item.rc | default(0) != 0
  changed_when: true
  failed_when: false

- name: Warn when validation host-netns pcap fallback could not be started
  ansible.builtin.debug:
    msg:
      - "Could not start host-netns pcap fallback for {{ item.item.item.role }} pod {{ item.item.item.pod }} on node {{ item.item.item.node | default('unknown') }}."
      - "stderr: {{ item.stderr | default('') }}"
      - "stdout: {{ item.stdout | default('') }}"
  loop: "{{ validation_hostnet_pcap_start.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.role if item.item is defined and item.item.item is defined else 'unknown' }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
    - item.rc | default(0) != 0
