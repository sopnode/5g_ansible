---
- name: Resolve selected pod for TC pass baseline
  ansible.builtin.shell: |
    set -euo pipefail
    ns="{{ validation_tc_pass_namespace }}"
    selectors="{{ validation_tc_pass_pod_selectors | join(';;') }}"
    pod_regex="{{ validation_tc_pass_pod_name_regex }}"
    target_pod_regex="{{ validation_tc_pass_target_pod_regex | default('') }}"
    container_regex="{{ validation_tc_pass_pod_container_regex }}"

    pods=""
    old_ifs="$IFS"
    IFS=';;'
    for selector in $selectors; do
      IFS="$old_ifs"
      [ -z "$selector" ] && continue
      matches=$(kubectl -n "$ns" get pods \
        -l "$selector" \
        --field-selector=status.phase=Running \
        -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
      if [ -n "$matches" ]; then
        pods="$(printf '%s\n%s\n' "$pods" "$matches")"
      fi
      IFS=';;'
    done
    IFS="$old_ifs"
    if [ -z "$(printf '%s' "$pods" | tr -d '[:space:]')" ]; then
      pods=$(kubectl -n "$ns" get pods \
        --field-selector=status.phase=Running \
        --no-headers \
        -o custom-columns=NAME:.metadata.name 2>/dev/null \
        | grep -E -i "$pod_regex" || true)
    fi
    pods=$(printf '%s\n' "$pods" | sed '/^[[:space:]]*$/d' | sort -u)
    if [ -n "$target_pod_regex" ]; then
      pods=$(printf '%s\n' "$pods" | grep -E -i "$target_pod_regex" || true)
    fi
    if [ -z "$pods" ]; then
      echo "No running pod matched TC pass selectors in namespace $ns" >&2
      exit 4
    fi

    pod=$(printf '%s\n' "$pods" | head -n 1)
    containers=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}')
    container=$(printf '%s\n' "$containers" | grep -E -i "$container_regex" | head -n 1 || true)
    if [ -z "$container" ]; then
      container=$(printf '%s\n' "$containers" | head -n 1)
    fi
    if [ -z "$container" ]; then
      echo "No container found for pod $pod" >&2
      exit 5
    fi

    status_lines=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .status.containerStatuses[*]}{.name}{"="}{.containerID}{"\n"}{end}' 2>/dev/null || true)
    cid=$(printf '%s\n' "$status_lines" | awk -F= -v c="$container" '$1 == c {print $2; exit}')
    cid="${cid#*://}"
    if [ -z "$cid" ]; then
      echo "Could not resolve container ID for $ns/$pod container $container" >&2
      exit 6
    fi
    node=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{.spec.nodeName}')
    if [ -z "$node" ]; then
      echo "Could not resolve node for $ns/$pod" >&2
      exit 7
    fi
    printf '%s|%s|%s|%s|%s\n' "$ns" "$pod" "$container" "$node" "$cid"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  register: validation_tc_pass_target_resolution
  changed_when: false
  failed_when: false

- name: Set selected TC pass baseline target facts
  ansible.builtin.set_fact:
    validation_tc_pass_target_ns: "{{ validation_tc_pass_target_resolution.stdout.split('|')[0] | default('') }}"
    validation_tc_pass_target_pod: "{{ validation_tc_pass_target_resolution.stdout.split('|')[1] | default('') }}"
    validation_tc_pass_target_container: "{{ validation_tc_pass_target_resolution.stdout.split('|')[2] | default('') }}"
    validation_tc_pass_target_node: "{{ validation_tc_pass_target_resolution.stdout.split('|')[3] | default(validation_tc_pass_host) }}"
    validation_tc_pass_target_container_id: "{{ validation_tc_pass_target_resolution.stdout.split('|')[4] | default('') }}"
  when: validation_tc_pass_target_resolution.rc | default(1) | int == 0

- name: Attach minimal TC pass baseline program
  ansible.builtin.shell: |
    set -euo pipefail
    ns="{{ validation_tc_pass_target_ns }}"
    pod="{{ validation_tc_pass_target_pod }}"
    container="{{ validation_tc_pass_target_container }}"
    cid="{{ validation_tc_pass_target_container_id }}"
    iface_pref="{{ validation_tc_pass_pod_iface }}"
    pref="{{ validation_tc_pass_filter_prio }}"
    install_deps="{{ validation_tc_pass_install_deps | bool | ternary('true', 'false') }}"
    state_dir="/tmp/{{ paper_run_id }}/tc-pass"
    label="{{ validation_step_tc_pass_label_safe }}"
    source_file="$state_dir/tc_pass_base.c"
    obj_file="$state_dir/tc_pass_base.o"
    state_file="$state_dir/${label}.state"

    mkdir -p "$state_dir"

    if ! command -v tc >/dev/null 2>&1; then
      if [ "$install_deps" = "true" ] && command -v apt-get >/dev/null 2>&1; then
        DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y iproute2
      elif [ "$install_deps" = "true" ] && command -v dnf >/dev/null 2>&1; then
        dnf install -y iproute-tc
      elif [ "$install_deps" = "true" ] && command -v yum >/dev/null 2>&1; then
        yum install -y iproute-tc
      fi
    fi
    if ! command -v tc >/dev/null 2>&1; then
      echo "tc is not available on $(hostname)" >&2
      exit 20
    fi

    clang_bin=""
    for candidate in clang clang-18 clang-17 clang-16 clang-15 clang-14 clang-13; do
      if command -v "$candidate" >/dev/null 2>&1; then
        clang_bin="$candidate"
        break
      fi
    done
    if [ -z "$clang_bin" ] && [ "$install_deps" = "true" ]; then
      if command -v apt-get >/dev/null 2>&1; then
        DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y clang llvm
      elif command -v dnf >/dev/null 2>&1; then
        dnf install -y clang llvm
      elif command -v yum >/dev/null 2>&1; then
        yum install -y clang llvm
      fi
      for candidate in clang clang-18 clang-17 clang-16 clang-15 clang-14 clang-13; do
        if command -v "$candidate" >/dev/null 2>&1; then
          clang_bin="$candidate"
          break
        fi
      done
    fi
    if [ -z "$clang_bin" ]; then
      echo "clang is not available on $(hostname); set validation_tc_pass_install_deps=true or install clang" >&2
      exit 21
    fi

    cat > "$source_file" <<'EOF'
    #define SEC(NAME) __attribute__((section(NAME), used))
    #define TC_ACT_OK 0

    struct __sk_buff;

    SEC("classifier")
    int tc_pass_base(struct __sk_buff *skb)
    {
        return TC_ACT_OK;
    }

    char _license[] SEC("license") = "GPL";
    EOF

    "$clang_bin" -O2 -g -target bpf -c "$source_file" -o "$obj_file"

    pid=""
    if [ -n "$cid" ] && command -v crictl >/dev/null 2>&1; then
      pid=$(crictl inspect "$cid" 2>/dev/null | sed -n 's/.*"pid":[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -n 1)
    fi
    if [ -z "$pid" ] && [ -n "$cid" ] && [ -r "/run/containerd/io.containerd.runtime.v2.task/k8s.io/$cid/init.pid" ]; then
      pid=$(cat "/run/containerd/io.containerd.runtime.v2.task/k8s.io/$cid/init.pid")
    fi
    if [ -z "$pid" ] && [ -n "$cid" ] && command -v ctr >/dev/null 2>&1; then
      pid=$(ctr -n k8s.io tasks list 2>/dev/null | awk -v id="$cid" '$1 == id || index(id, $1) == 1 || index($1, id) == 1 {print $2; exit}')
    fi
    if [ -z "$pid" ]; then
      echo "Could not resolve host PID for $ns/$pod container $container" >&2
      exit 22
    fi

    iface=""
    for candidate in "$iface_pref" n3 n2 net1 eth0; do
      if [ -n "$candidate" ] && nsenter -t "$pid" -n ip link show "$candidate" >/dev/null 2>&1; then
        iface="$candidate"
        break
      fi
    done
    if [ -z "$iface" ]; then
      iface=$(nsenter -t "$pid" -n ip -o link show | awk -F': ' '$2 !~ /^(lo|ifb)/ {sub(/@.*/, "", $2); print $2; exit}')
    fi
    if [ -z "$iface" ]; then
      echo "Could not find pod interface for $ns/$pod" >&2
      exit 23
    fi

    nsenter -t "$pid" -n tc qdisc add dev "$iface" clsact 2>/dev/null || true
    nsenter -t "$pid" -n tc filter del dev "$iface" ingress pref "$pref" 2>/dev/null || true
    nsenter -t "$pid" -n tc filter add dev "$iface" ingress pref "$pref" bpf da obj "$obj_file" sec classifier

    printf '%s|%s|%s|%s|%s|%s|%s|%s\n' "$ns" "$pod" "$container" "$pid" "$iface" "$pref" "$obj_file" "$clang_bin" > "$state_file"
    echo "TC pass baseline attached: ns=$ns pod=$pod container=$container pid=$pid iface=$iface pref=$pref obj=$obj_file clang=$clang_bin"
    nsenter -t "$pid" -n tc filter show dev "$iface" ingress pref "$pref" || true
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_tc_pass_target_node }}"
  become: true
  register: validation_tc_pass_attach_output
  changed_when: validation_tc_pass_attach_output.rc | default(1) | int == 0
  failed_when: false
  when: validation_tc_pass_target_resolution.rc | default(1) | int == 0

- name: Write TC pass baseline attachment artifact
  ansible.builtin.copy:
    dest: "{{ paper_results_dir }}/bpftool/{{ validation_step_tc_pass_label_safe }}__tc_pass_attach.json"
    mode: "0644"
    content: "{{ validation_tc_pass_attach_payload | to_nice_json }}"
  delegate_to: localhost
  vars:
    validation_tc_pass_attach_payload:
      label: "{{ validation_step_tc_pass_label_safe }}"
      scenario: "{{ paper_scenario.name }}"
      step: "{{ paper_step.name }}"
      namespace: "{{ validation_tc_pass_target_ns | default('') }}"
      pod: "{{ validation_tc_pass_target_pod | default('') }}"
      container: "{{ validation_tc_pass_target_container | default('') }}"
      node: "{{ validation_tc_pass_target_node | default('') }}"
      iface: "{{ validation_tc_pass_pod_iface }}"
      filter_prio: "{{ validation_tc_pass_filter_prio }}"
      resolution_rc: "{{ validation_tc_pass_target_resolution.rc | default('') }}"
      resolution_stderr: "{{ validation_tc_pass_target_resolution.stderr | default('') }}"
      attach_rc: "{{ validation_tc_pass_attach_output.rc | default('') }}"
      attach_stdout: "{{ validation_tc_pass_attach_output.stdout | default('') }}"
      attach_stderr: "{{ validation_tc_pass_attach_output.stderr | default('') }}"

- name: Warn when TC pass baseline could not be attached
  ansible.builtin.debug:
    msg:
      - "TC pass baseline was not attached for {{ validation_step_tc_pass_label_safe }}."
      - "Resolution stderr: {{ validation_tc_pass_target_resolution.stderr | default('') }}"
      - "Attach stderr: {{ validation_tc_pass_attach_output.stderr | default('') }}"
      - "Traffic will continue, but bpftool will not contain tc_pass_base for this window."
  when: >
    (validation_tc_pass_target_resolution.rc | default(1) | int) != 0
    or (validation_tc_pass_attach_output.rc | default(1) | int) != 0
