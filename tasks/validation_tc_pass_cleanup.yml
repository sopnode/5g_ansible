---
- name: Remove minimal TC pass baseline program
  ansible.builtin.shell: |
    set -u
    label="{{ validation_step_tc_pass_label_safe }}"
    state_file="/tmp/{{ paper_run_id }}/tc-pass/${label}.state"
    if [ ! -f "$state_file" ]; then
      exit 0
    fi
    while IFS='|' read -r ns pod container pid iface pref obj_file clang_bin; do
      [ -z "$pid" ] && continue
      if ! kill -0 "$pid" 2>/dev/null; then
        continue
      fi
      if [ -n "$iface" ] && [ -n "$pref" ]; then
        nsenter -t "$pid" -n tc filter del dev "$iface" ingress pref "$pref" 2>/dev/null || true
        nsenter -t "$pid" -n tc filter del dev "$iface" parent ffff: pref "$pref" 2>/dev/null || true
      fi
    done < "$state_file"
    rm -f "$state_file"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_tc_pass_target_node | default(validation_tc_pass_host) }}"
  become: true
  changed_when: false
  failed_when: false
