---
- name: Stop validation host pcaps for this traffic window
  ansible.builtin.shell: |
    run_dir="/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}"
    pid_file="$run_dir/tcpdump_{{ item }}.pid"
    if [ -f "$pid_file" ]; then
      kill -INT "$(cat "$pid_file")" 2>/dev/null || true
      sleep 2
    fi
  delegate_to: "{{ item }}"
  become: true
  loop: "{{ (groups['core_node'] + groups['ran_node']) | unique | list }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'host'
    - validation_pcap_scope == 'direction'
  changed_when: false
  failed_when: false

- name: Fetch validation host pcap files for this traffic window
  ansible.builtin.fetch:
    src: "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}/{{ item }}_n3.pcap"
    dest: "{{ paper_results_dir }}/pcaps/{{ validation_capture_label_safe }}__{{ item }}_n3.pcap"
    flat: true
  delegate_to: "{{ item }}"
  become: true
  loop: "{{ (groups['core_node'] + groups['ran_node']) | unique | list }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'host'
    - validation_pcap_scope == 'direction'
  ignore_errors: true

- name: Fetch validation host tcpdump logs for this traffic window
  ansible.builtin.fetch:
    src: "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}/{{ item }}_tcpdump.log"
    dest: "{{ paper_results_dir }}/pcaps/{{ validation_capture_label_safe }}__{{ item }}_tcpdump.log"
    flat: true
  delegate_to: "{{ item }}"
  become: true
  loop: "{{ (groups['core_node'] + groups['ran_node']) | unique | list }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'host'
    - validation_pcap_scope == 'direction'
  ignore_errors: true

- name: Stop validation pod pcaps for this traffic window
  ansible.builtin.shell: |
    set -u
    ns="{{ item.namespace }}"
    pod="{{ item.pod }}"
    role="{{ item.role }}"
    container="{{ item.container | default('') }}"
    container_arg=()
    if [ -n "$container" ]; then
      container_arg=(-c "$container")
    fi
    kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- sh -c '
      run_dir="$1"
      role="$2"
      label="$3"
      pid_file="$run_dir/capture_${role}_${label}.pid"
      legacy_pid_file="$run_dir/tcpdump_${role}_${label}.pid"
      if [ -f "$pid_file" ]; then
        kill -INT "$(cat "$pid_file")" 2>/dev/null || true
        sleep 2
      elif [ -f "$legacy_pid_file" ]; then
        kill -INT "$(cat "$legacy_pid_file")" 2>/dev/null || true
        sleep 2
      fi
    ' sh "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}" "$role" "{{ validation_capture_label_safe }}"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  changed_when: false
  failed_when: false

- name: Stop validation host-netns pod pcaps for this traffic window
  ansible.builtin.shell: |
    set -u
    role="{{ item.role }}"
    label="{{ validation_capture_label_safe }}"
    run_dir="/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}"
    pid_file="$run_dir/hostnet_${role}_${label}.pid"
    if [ -f "$pid_file" ]; then
      kill -INT "$(cat "$pid_file")" 2>/dev/null || true
      sleep 2
    fi
  args:
    executable: /bin/bash
  delegate_to: "{{ item.node | default(validation_k8s_control_host) }}"
  become: true
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  changed_when: false
  failed_when: false

- name: Ensure core-node pod pcap staging directory exists before pod copy
  ansible.builtin.file:
    path: "/tmp/{{ paper_run_id }}/pcaps"
    state: directory
    mode: "0755"
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'

- name: Copy validation pod pcaps to core-node staging for this traffic window
  ansible.builtin.shell: |
    set -u
    ns="{{ item.namespace }}"
    pod="{{ item.pod }}"
    role="{{ item.role }}"
    container="{{ item.container | default('') }}"
    safe_pod="$(printf '%s' "$pod" | tr -c 'A-Za-z0-9_.-' '_')"
    container_arg=()
    if [ -n "$container" ]; then
      container_arg=(-c "$container")
    fi
    mkdir -p "/tmp/{{ paper_run_id }}/pcaps"
    kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- \
      cat "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}/${role}_{{ validation_capture_label_safe }}_n3.pcap" \
      > "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}__${role}_${safe_pod}_n3.pcap"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  register: validation_pod_pcap_stage
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  changed_when: true
  failed_when: false

- name: Copy validation pod tcpdump logs to core-node staging for this traffic window
  ansible.builtin.shell: |
    set -u
    ns="{{ item.namespace }}"
    pod="{{ item.pod }}"
    role="{{ item.role }}"
    container="{{ item.container | default('') }}"
    safe_pod="$(printf '%s' "$pod" | tr -c 'A-Za-z0-9_.-' '_')"
    container_arg=()
    if [ -n "$container" ]; then
      container_arg=(-c "$container")
    fi
    mkdir -p "/tmp/{{ paper_run_id }}/pcaps"
    kubectl -n "$ns" exec "${container_arg[@]}" "$pod" -- \
      cat "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}/${role}_{{ validation_capture_label_safe }}_tcpdump.log" \
      > "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}__${role}_${safe_pod}_tcpdump.log"
  args:
    executable: /bin/bash
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  environment:
    KUBECONFIG: "{{ validation_kubeconfig }}"
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  register: validation_pod_tcpdump_log_stage
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  changed_when: true
  failed_when: false

- name: Warn when pod pcap staging failed
  ansible.builtin.debug:
    msg:
      - "Could not stage pcap for {{ item.item.role }} pod {{ item.item.pod }}."
      - "This usually means tcpdump did not start in the pod, the capture file was not created yet, or the pod rejected tcpdump permissions."
      - "stderr: {{ item.stderr | default('') }}"
      - "stdout: {{ item.stdout | default('') }}"
  loop: "{{ validation_pod_pcap_stage.results | default([]) }}"
  loop_control:
    label: "{{ item.item.role if item.item is defined else 'unknown' }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
    - item.rc | default(0) != 0

- name: Warn when pod tcpdump log staging failed
  ansible.builtin.debug:
    msg:
      - "Could not stage tcpdump log for {{ item.item.role }} pod {{ item.item.pod }}."
      - "stderr: {{ item.stderr | default('') }}"
      - "stdout: {{ item.stdout | default('') }}"
  loop: "{{ validation_pod_tcpdump_log_stage.results | default([]) }}"
  loop_control:
    label: "{{ item.item.role if item.item is defined else 'unknown' }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
    - item.rc | default(0) != 0

- name: List staged validation pod capture files for this traffic window
  ansible.builtin.shell: |
    mkdir -p "/tmp/{{ paper_run_id }}/pcaps"
    find "/tmp/{{ paper_run_id }}/pcaps" \
      -maxdepth 1 \
      -type f \
      -name "{{ validation_capture_label_safe }}__*" \
      -print
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  register: validation_staged_pod_capture_files
  changed_when: false
  failed_when: false
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'

- name: Show staged validation pod capture files for this traffic window
  ansible.builtin.debug:
    msg:
      - "Capture label: {{ validation_capture_label_safe }}"
      - "Staged files: {{ validation_staged_pod_capture_files.stdout_lines | default([]) }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'

- name: Fetch staged validation pod capture files for this traffic window
  ansible.builtin.fetch:
    src: "{{ item }}"
    dest: "{{ paper_results_dir }}/pcaps/{{ item | basename }}"
    flat: true
  delegate_to: "{{ validation_k8s_control_host }}"
  become: true
  loop: "{{ validation_staged_pod_capture_files.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item | basename }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
    - validation_staged_pod_capture_files.stdout_lines | default([]) | length > 0
  ignore_errors: true

- name: Fetch validation host-netns pcap files for this traffic window
  ansible.builtin.fetch:
    src: "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}/{{ item.role }}_{{ validation_capture_label_safe }}_n3.pcap"
    dest: "{{ paper_results_dir }}/pcaps/{{ validation_capture_label_safe }}__{{ item.role }}_{{ item.pod | regex_replace('[^A-Za-z0-9_.-]', '_') }}_n3.pcap"
    flat: true
  delegate_to: "{{ item.node | default(validation_k8s_control_host) }}"
  become: true
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  ignore_errors: true

- name: Fetch validation host-netns tcpdump logs for this traffic window
  ansible.builtin.fetch:
    src: "/tmp/{{ paper_run_id }}/pcaps/{{ validation_capture_label_safe }}/{{ item.role }}_{{ validation_capture_label_safe }}_tcpdump.log"
    dest: "{{ paper_results_dir }}/pcaps/{{ validation_capture_label_safe }}__{{ item.role }}_{{ item.pod | regex_replace('[^A-Za-z0-9_.-]', '_') }}_tcpdump.log"
    flat: true
  delegate_to: "{{ item.node | default(validation_k8s_control_host) }}"
  become: true
  loop: "{{ hostvars[validation_k8s_control_host].validation_pcap_target_pods_expanded | default([]) }}"
  loop_control:
    label: "{{ item.role }}={{ item.pod }}"
  when:
    - validation_capture_pcaps | bool
    - validation_pcap_mode == 'pod'
    - validation_pcap_scope == 'direction'
  ignore_errors: true
