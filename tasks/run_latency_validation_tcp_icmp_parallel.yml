---
- name: Set parallel TCP/ICMP validation facts
  ansible.builtin.set_fact:
    paper_direction_args: "{{ '-R' if paper_direction == 'dl' else '' }}"
    paper_step_bitrate: "{{ paper_step.bitrate | default(paper_step.tcp_bitrate | default('')) | string | trim }}"
    validation_ping_direction_label: "{{ 'ue_to_upf' if paper_direction == 'ul' else 'upf_to_ue' }}"
    validation_ping_count_effective: "{{ paper_step.ping_count | default(validation_ping_count | default(paper_duration | default(60))) | int }}"
    validation_ping_interval_effective: "{{ paper_step.ping_interval | default(validation_ping_interval | default(1)) }}"
    validation_ping_timeout_effective: "{{ paper_step.ping_timeout | default(validation_ping_timeout | default(2)) | int }}"
    validation_ping_size_effective: "{{ paper_step.ping_size | default(validation_ping_size | default(56)) | int }}"
    validation_ping_upf_namespace_effective: "{{ paper_step.ping_upf_namespace | default(validation_ping_upf_namespace | default(validation_netem_namespace | default('open5gs'))) }}"
    validation_ping_upf_iface_effective: "{{ paper_step.ping_upf_iface | default(validation_ping_upf_iface | default('ogstun')) }}"
    validation_ping_upf_pod_selectors_effective: "{{ paper_step.ping_upf_pod_selectors | default(validation_ping_upf_pod_selectors | default(['nf=upf', 'app=open5gs,nf=upf', 'app.kubernetes.io/name=open5gs-upf'])) }}"
    validation_ping_upf_pod_name_regex_effective: "{{ paper_step.ping_upf_pod_name_regex | default(validation_ping_upf_pod_name_regex | default('upf')) }}"
    validation_ping_upf_container_regex_effective: "{{ paper_step.ping_upf_container_regex | default(validation_ping_upf_container_regex | default('upf')) }}"
    validation_ping_upf_pod_regex_effective: "{{ paper_step.ping_upf_pod_regex | default(validation_ping_upf_pod_regex | default(validation_netem_upf_pod_regex | default(''))) }}"

- name: Record parallel TCP/ICMP validation direction start
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/record_paper_timeline_event.yml"
  vars:
    paper_timeline_event:
      level: "direction"
      phase: "start"
      scenario: "{{ paper_scenario.name }}"
      scenario_title: "{{ paper_scenario.title | default('') }}"
      scenario_index: "{{ paper_scenario_index | int }}"
      step: "{{ paper_step.name }}"
      step_index: "{{ paper_step_index | int }}"
      direction: "{{ paper_direction }}"
      traffic_type: "tcp_icmp_parallel"
      ping_direction: "{{ validation_ping_direction_label }}"
      ues: "{{ paper_step_ues }}"
      parallel_streams: "{{ paper_step.parallel_streams | default(1) | int }}"
      parallel_by_ue: "{{ paper_step.parallel_by_ue | default({}) }}"
      bitrate: "{{ paper_step_bitrate }}"
      ping_count: "{{ validation_ping_count_effective }}"
      ping_interval: "{{ validation_ping_interval_effective }}"
      ping_timeout: "{{ validation_ping_timeout_effective }}"
      ping_size: "{{ validation_ping_size_effective }}"
      command_template: "iperf3 TCP {{ paper_direction }} plus ping {{ validation_ping_direction_label }} in the same validation window"

- name: Start parallel TCP iperf jobs
  ansible.builtin.shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ item }} '
      set -e
      LOG_DIR="/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}"
      mkdir -p "$LOG_DIR"
      iperf3 \
        -p {{ paper_ue_port_map[item] }} \
        -B {{ ue_ips[item] }} \
        -c {{ paper_target_server_ip }} \
        -t {{ paper_duration }} \
        -P {{ (paper_step.parallel_by_ue | default({}))[item] | default(paper_step.parallel_streams | default(1)) }} \
        {{ ('-b ' ~ paper_step_bitrate) if paper_step_bitrate | length > 0 else '' }} \
        {{ paper_direction_args }} \
        --json \
        --get-server-output \
        > "$LOG_DIR/iperf_{{ item }}.json" \
        2> "$LOG_DIR/iperf_{{ item }}.stderr"
    '
  async: "{{ paper_duration | int + paper_async_grace | int }}"
  poll: 0
  loop: "{{ paper_step_ues }}"
  loop_control:
    label: "{{ item }}"
  register: validation_parallel_iperf_jobs
  changed_when: true
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Start parallel UE-to-UPF ping jobs
  ansible.builtin.shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ item }} '
      set -e
      LOG_DIR="/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}"
      mkdir -p "$LOG_DIR"
      ping_ts_arg=""
      if ping -D -c 1 -W 1 127.0.0.1 >/dev/null 2>&1; then
        ping_ts_arg="-D"
      fi
      ping \
        $ping_ts_arg \
        -I {{ ue_ips[item] }} \
        -c {{ validation_ping_count_effective }} \
        -i {{ validation_ping_interval_effective }} \
        -W {{ validation_ping_timeout_effective }} \
        -s {{ validation_ping_size_effective }} \
        {{ (fiveg.slices | selectattr('name', 'equalto', fiveg.ues[item].slice) | first).ip_prefix }}.1 \
        > "$LOG_DIR/ping_{{ item }}.log" \
        2> "$LOG_DIR/ping_{{ item }}.stderr"
    '
  async: "{{ ((validation_ping_count_effective | int) * ((validation_ping_interval_effective | float) | round(0, 'ceil') | int) + (validation_ping_timeout_effective | int) + (paper_async_grace | int)) }}"
  poll: 0
  loop: "{{ paper_step_ues }}"
  loop_control:
    label: "{{ item }}"
  register: validation_parallel_ue_ping_jobs
  when: paper_direction == 'ul'
  changed_when: true
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Start parallel UPF-to-UE ping jobs
  ansible.builtin.shell: |
    set -euo pipefail
    ns="{{ validation_ping_upf_namespace_effective }}"
    selectors="{{ validation_ping_upf_pod_selectors_effective | join(';;') }}"
    pod_regex="{{ validation_ping_upf_pod_name_regex_effective }}"
    target_pod_regex="{{ validation_ping_upf_pod_regex_effective }}"
    container_regex="{{ validation_ping_upf_container_regex_effective }}"
    upf_ip="{{ (fiveg.slices | selectattr('name', 'equalto', fiveg.ues[item].slice) | first).ip_prefix }}.1"
    ue_ip="{{ ue_ips[item] }}"
    upf_iface="{{ validation_ping_upf_iface_effective }}"
    run_dir="/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}"
    mkdir -p "$run_dir"

    pods=""
    old_ifs="$IFS"
    IFS=';;'
    for selector in $selectors; do
      IFS="$old_ifs"
      [ -z "$selector" ] && continue
      matches=$(kubectl -n "$ns" get pods \
        -l "$selector" \
        --field-selector=status.phase=Running \
        -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
      if [ -n "$matches" ]; then
        pods="$(printf '%s\n%s\n' "$pods" "$matches")"
      fi
      IFS=';;'
    done
    IFS="$old_ifs"
    if [ -z "$(printf '%s' "$pods" | tr -d '[:space:]')" ]; then
      pods=$(kubectl -n "$ns" get pods \
        --field-selector=status.phase=Running \
        --no-headers \
        -o custom-columns=NAME:.metadata.name 2>/dev/null \
        | grep -E -i "$pod_regex" || true)
    fi
    pods=$(printf '%s\n' "$pods" | sed '/^[[:space:]]*$/d' | sort -u)
    if [ -n "$target_pod_regex" ]; then
      pods=$(printf '%s\n' "$pods" | grep -E -i "$target_pod_regex" || true)
    fi
    if [ -z "$pods" ]; then
      echo "No running UPF pod matched parallel ping selectors in namespace $ns" >&2
      exit 4
    fi

    selected_pod=""
    selected_container=""
    for pod in $pods; do
      containers=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}')
      container=$(printf '%s\n' "$containers" | grep -E -i "$container_regex" | head -n 1 || true)
      if [ -z "$container" ]; then
        container=$(printf '%s\n' "$containers" | head -n 1)
      fi
      if [ -z "$container" ]; then
        continue
      fi
      if kubectl -n "$ns" exec -c "$container" "$pod" -- sh -c "ip -4 addr show | grep -F '$upf_ip/' >/dev/null" 2>/dev/null; then
        selected_pod="$pod"
        selected_container="$container"
        break
      fi
      if [ -z "$selected_pod" ]; then
        selected_pod="$pod"
        selected_container="$container"
      fi
    done
    if [ -z "$selected_pod" ] || [ -z "$selected_container" ]; then
      echo "Could not select UPF pod/container for parallel ping" >&2
      exit 5
    fi

    {
      echo "upf_pod=$selected_pod"
      echo "upf_container=$selected_container"
      echo "upf_ip=$upf_ip"
      echo "ue={{ item }}"
      echo "ue_ip=$ue_ip"
      echo "upf_iface=$upf_iface"
    } > "$run_dir/ping_{{ item }}.meta"

    kubectl -n "$ns" exec -c "$selected_container" "$selected_pod" -- sh -c '
      set -e
      if ! command -v ping >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then
          DEBIAN_FRONTEND=noninteractive apt-get update >/dev/null 2>&1 && DEBIAN_FRONTEND=noninteractive apt-get install -y iputils-ping >/dev/null 2>&1 || true
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y iputils >/dev/null 2>&1 || true
        elif command -v yum >/dev/null 2>&1; then
          yum install -y iputils >/dev/null 2>&1 || true
        fi
      fi
      ping_ts_arg=""
      if ping -D -c 1 -W 1 127.0.0.1 >/dev/null 2>&1; then
        ping_ts_arg="-D"
      fi
      source_arg=""
      if [ -n "$1" ]; then
        source_arg="-I $1"
      fi
      ping \
        $ping_ts_arg \
        $source_arg \
        -c "$2" \
        -i "$3" \
        -W "$4" \
        -s "$5" \
        "$6"
    ' sh "$upf_iface" "{{ validation_ping_count_effective }}" "{{ validation_ping_interval_effective }}" "{{ validation_ping_timeout_effective }}" "{{ validation_ping_size_effective }}" "$ue_ip" \
      > "$run_dir/ping_{{ item }}.log" \
      2> "$run_dir/ping_{{ item }}.stderr"
  args:
    executable: /bin/bash
  async: "{{ ((validation_ping_count_effective | int) * ((validation_ping_interval_effective | float) | round(0, 'ceil') | int) + (validation_ping_timeout_effective | int) + (paper_async_grace | int)) }}"
  poll: 0
  loop: "{{ paper_step_ues }}"
  loop_control:
    label: "{{ item }}"
  register: validation_parallel_upf_ping_jobs
  delegate_to: "{{ validation_k8s_control_host | default(groups['core_node'][0]) }}"
  become: true
  environment:
    KUBECONFIG: "{{ validation_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
  when: paper_direction == 'dl'
  changed_when: true
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Stop validation pcap window after bounded parallel capture time
  block:
    - name: Wait for validation parallel pcap window
      ansible.builtin.pause:
        seconds: "{{ validation_pcap_capture_seconds_for_direction | default(15) | int }}"

    - name: Stop and fetch validation parallel pcap window
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_pcap_stop_fetch.yml"
  when: validation_pcap_capture_active_for_direction | default(false) | bool

- name: Wait for parallel TCP iperf jobs to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: validation_parallel_iperf_wait
  until: validation_parallel_iperf_wait.finished
  retries: "{{ (paper_duration | int // 5) + 60 }}"
  delay: 5
  loop: "{{ validation_parallel_iperf_jobs.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default(item.ansible_job_id | default('unknown')) }}"
  when: item.ansible_job_id is defined
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Select parallel ping job set for this direction
  ansible.builtin.set_fact:
    validation_parallel_ping_jobs_effective: "{{ validation_parallel_upf_ping_jobs if paper_direction == 'dl' else validation_parallel_ue_ping_jobs }}"

- name: Wait for parallel ping jobs to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  delegate_to: "{{ (validation_k8s_control_host | default(groups['core_node'][0])) if paper_direction == 'dl' else inventory_hostname }}"
  become: "{{ paper_direction == 'dl' }}"
  register: validation_parallel_ping_wait
  until: validation_parallel_ping_wait.finished
  retries: "{{ ((validation_ping_count_effective | int) // 5) + 60 }}"
  delay: 5
  loop: "{{ validation_parallel_ping_jobs_effective.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default(item.ansible_job_id | default('unknown')) }}"
  when: item.ansible_job_id is defined
  ignore_errors: "{{ ignore_task_errors | default(true) }}"

- name: Fetch parallel UPF-to-UE ping logs and metadata
  ansible.builtin.fetch:
    src: "/tmp/{{ paper_run_id }}/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}/{{ ping_file_name }}"
    dest: "{{ paper_results_dir }}/upf_ping_logs/scenario={{ paper_scenario.name }}/step={{ paper_step.name }}/direction={{ paper_direction }}/{{ ping_file_name }}"
    flat: true
  delegate_to: "{{ validation_k8s_control_host | default(groups['core_node'][0]) }}"
  loop: "{{ paper_step_ues | product(['log', 'stderr', 'meta']) | list }}"
  loop_control:
    loop_var: ping_log_item
    label: "{{ ping_log_item.0 }}.{{ ping_log_item.1 }}"
  vars:
    ping_file_name: "ping_{{ ping_log_item.0 }}.{{ ping_log_item.1 }}"
  when: paper_direction == 'dl'
  failed_when: false
  ignore_errors: true

- name: Cleanup parallel TCP async job files
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  loop: "{{ validation_parallel_iperf_jobs.results | default([]) }}"
  when: item.ansible_job_id is defined
  ignore_errors: true

- name: Cleanup parallel ping async job files
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  delegate_to: "{{ (validation_k8s_control_host | default(groups['core_node'][0])) if paper_direction == 'dl' else inventory_hostname }}"
  become: "{{ paper_direction == 'dl' }}"
  loop: "{{ validation_parallel_ping_jobs_effective.results | default([]) }}"
  when: item.ansible_job_id is defined
  ignore_errors: true

- name: Record parallel TCP/ICMP validation direction end
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/record_paper_timeline_event.yml"
  vars:
    paper_timeline_event:
      level: "direction"
      phase: "end"
      scenario: "{{ paper_scenario.name }}"
      scenario_title: "{{ paper_scenario.title | default('') }}"
      scenario_index: "{{ paper_scenario_index | int }}"
      step: "{{ paper_step.name }}"
      step_index: "{{ paper_step_index | int }}"
      direction: "{{ paper_direction }}"
      traffic_type: "tcp_icmp_parallel"
      ping_direction: "{{ validation_ping_direction_label }}"
      ues: "{{ paper_step_ues }}"
      parallel_streams: "{{ paper_step.parallel_streams | default(1) | int }}"
      parallel_by_ue: "{{ paper_step.parallel_by_ue | default({}) }}"
      bitrate: "{{ paper_step_bitrate }}"
      ping_count: "{{ validation_ping_count_effective }}"
      ping_interval: "{{ validation_ping_interval_effective }}"
      ping_timeout: "{{ validation_ping_timeout_effective }}"
      ping_size: "{{ validation_ping_size_effective }}"
