---
- name: Set validation direction pcap window facts
  ansible.builtin.set_fact:
    validation_direction_traffic_type: "{{ paper_step.traffic_type | default('tcp') | lower }}"
    validation_capture_label: "{{ paper_scenario.name }}__{{ paper_step.name }}__{{ paper_direction }}"
    validation_capture_label_safe: "{{ (paper_scenario.name ~ '__' ~ paper_step.name ~ '__' ~ paper_direction) | regex_replace('[^A-Za-z0-9_.-]', '_') }}"
    validation_pcap_capture_active: >-
      {{
        validation_capture_pcaps | default(false) | bool
        and validation_pcap_scope | default('direction') == 'direction'
        and paper_step.capture_pcap | default(true) | bool
      }}
    validation_pcap_capture_window_seconds: "{{ paper_step.pcap_capture_seconds | default(validation_pcap_capture_seconds | default(15)) | int }}"

- name: Show validation direction pcap window
  ansible.builtin.debug:
    msg:
      - "Direction: {{ paper_direction }}"
      - "Traffic type: {{ validation_direction_traffic_type }}"
      - "Pcap active: {{ validation_pcap_capture_active }}"
      - "Pcap label: {{ validation_capture_label_safe }}"
      - "Pcap window seconds: {{ validation_pcap_capture_window_seconds }}"

- name: Start validation pcap window
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_pcap_start.yml"
  when: validation_pcap_capture_active | bool

- name: Capture bpftool snapshot before validation traffic
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_bpftool_snapshot.yml"
  vars:
    validation_bpftool_snapshot_phase: "start"
  when: validation_collect_bpftool | default(false) | bool

- name: Run validation iperf direction
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/run_tcp_paper_direction.yml"
  vars:
    validation_pcap_capture_active_for_direction: "{{ validation_pcap_capture_active }}"
    validation_pcap_capture_seconds_for_direction: "{{ validation_pcap_capture_window_seconds }}"
  when: validation_direction_traffic_type not in ['icmp', 'tcp_icmp_parallel']

- name: Run validation ICMP ping direction
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/run_latency_validation_ping.yml"
  vars:
    validation_pcap_capture_active_for_direction: "{{ validation_pcap_capture_active }}"
    validation_pcap_capture_seconds_for_direction: "{{ validation_pcap_capture_window_seconds }}"
  when: validation_direction_traffic_type == 'icmp'

- name: Run validation parallel TCP and ICMP direction
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/run_latency_validation_tcp_icmp_parallel.yml"
  vars:
    validation_pcap_capture_active_for_direction: "{{ validation_pcap_capture_active }}"
    validation_pcap_capture_seconds_for_direction: "{{ validation_pcap_capture_window_seconds }}"
  when: validation_direction_traffic_type == 'tcp_icmp_parallel'

- name: Capture bpftool snapshot after validation traffic
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/validation_bpftool_snapshot.yml"
  vars:
    validation_bpftool_snapshot_phase: "end"
  when: validation_collect_bpftool | default(false) | bool
