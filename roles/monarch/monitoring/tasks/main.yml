---
# === CRITICAL: Ensure venv interpreter is active for this role ===
- name: Verify and set venv Python interpreter
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

- name: Set gNB Monitoring Interval from the .env of Monarch
  command: ./set_gnb_monitoring_interval.sh
  args:
    chdir: "{{ repo_dest }}"
  when: set_gnb_monitoring
  ignore_errors: true

- name: Ensure python-dotenv is installed for Monarch monitoring (using shell to avoid setuptools dependency)
  ansible.builtin.shell: /opt/ansible-venv/bin/pip install python-dotenv

- name: Submit monitoring requests to Monarch
  ansible.builtin.shell: cd {{ repo_dest }}/request_translator && \
    /opt/ansible-venv/bin/python3 test_api.py --json_file requests/request_slice.json submit && \
    /opt/ansible-venv/bin/python3 test_api.py --json_file requests/request_test.json submit
  args:
    chdir: "{{ repo_dest }}/request_translator"
  environment:
    PYTHONPATH: "{{ repo_dest }}"
    PATH: "/opt/ansible-venv/bin:/usr/bin:/bin"
  register: submit_output
  changed_when: false
  failed_when: submit_output.rc != 0

- name: Print API submission result
  ansible.builtin.debug:
    var: submit_output.stdout_lines
