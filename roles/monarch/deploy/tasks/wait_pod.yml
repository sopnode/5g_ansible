---
- name: Wait for {{ item.label }} pod to be Ready
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ monarch_ns }}"
    label_selectors:
      - "{{ item.selector }}"
  register: pod_info
  failed_when: false
  until: >
    pod_info.rc is not defined and
    pod_info.resources is defined and
    pod_info.resources | length > 0 and
    (pod_info.resources[0].status.containerStatuses is defined) and
    (pod_info.resources[0].status.containerStatuses[0].ready | default(false))
  retries: 30
  delay: 5

- name: Debug pod_info if wait failed
  ansible.builtin.debug:
    var: pod_info
  when: >
    pod_info.resources is not defined or
    pod_info.resources | length == 0

