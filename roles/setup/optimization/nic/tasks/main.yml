---
- name: Install ethtool
  apt:
    name:
      - ethtool
    state: present
    update_cache: yes
  become: true

- name: Increase NIC ring buffers on {{ nic_interface }}
  command: ethtool -G {{ nic_interface }} tx 8160 rx 8160
  become: true

- name: Install tuned
  apt:
    name:
      - tuned
    state: present
    update_cache: yes
  become: true
  when: inventory_hostname != "sopnode-f3"

- name: Activate throughput-performance tuned profile
  command: tuned-adm profile throughput-performance
  become: true
  when: inventory_hostname != "sopnode-f3"

- name: Show active tuned profile
  command: tuned-adm active
  register: tuned_status
  become: true
  when: inventory_hostname != "sopnode-f3"

- debug:
    msg: "{{ tuned_status.stdout }}"
  when: inventory_hostname != "sopnode-f3"

# IRQ PINNING on RAN node
- name: Apply NIC IRQ pinning only on RAN nodes
  when: inventory_hostname == "sopnode-f3"
  block:
    # FIX: pin IRQs for BOTH ens15f0np0 (management) AND ens15f1np1 (DPDK/SRIOV PF)
    # Unpinned PF IRQs can fire on RT cores causing jitter and potential livelock.
    - name: Find IRQs for ens15f0np0
      ansible.builtin.shell: "grep -i 'ens15f0np0' /proc/interrupts | awk '{print $1}' | tr -d ':'"
      register: ovs_irq_list
      changed_when: false
      become: true

    - name: Find IRQs for ens15f1np1 (SRIOV PF)
      ansible.builtin.shell: "grep -i 'ens15f1np1' /proc/interrupts | awk '{print $1}' | tr -d ':'"
      register: sriov_pf_irq_list
      changed_when: false
      become: true

    - name: Apply IRQ affinity for ens15f0np0 (cores 14-31)
      ansible.builtin.shell: |
        echo 14-31 > /proc/irq/{{ item }}/smp_affinity_list
      loop: "{{ ovs_irq_list.stdout_lines }}"
      become: true

    - name: Apply IRQ affinity for ens15f1np1 SRIOV PF (cores 14-31)
      ansible.builtin.shell: |
        echo 14-31 > /proc/irq/{{ item }}/smp_affinity_list
      loop: "{{ sriov_pf_irq_list.stdout_lines }}"
      become: true
      when: sriov_pf_irq_list.stdout_lines | length > 0

    - name: Make IRQ pinning persistent on reboot
      ansible.builtin.copy:
        dest: /etc/systemd/system/irq-affinity-ens15f0np0.service
        content: |
          [Unit]
          Description=Pin IRQs for ens15f0np0 and ens15f1np1
          After=multi-user.target
          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'for i in {{ (ovs_irq_list.stdout_lines + sriov_pf_irq_list.stdout_lines) | join(" ") }}; do echo 14-31 > /proc/irq/$i/smp_affinity_list; done'
          [Install]
          WantedBy=multi-user.target
      become: true

    - name: Enable IRQ affinity service
      ansible.builtin.systemd:
        daemon_reload: yes
        name: irq-affinity-ens15f0np0.service
        enabled: yes
      become: true