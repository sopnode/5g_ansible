---
- name: Load common variables
  include_vars:
    file: "../config/defaults/main.yml"

- name: Ensure Free5GC namespace exists
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ core_ns }}"
    state: present

- name: Deploy free5gc using Helm
  when: rru == 'rfsim'
  kubernetes.core.helm:
    name: free5gc
    chart_ref: "{{ [repo_dest, 'charts', 'free5gc'] | path_join }}"
    release_namespace: "{{ core_ns }}"
    state: present
    wait: true
    atomic: true
    timeout: 1200s
    values:
      nodeSelector:
        kubernetes.io/hostname: "{{ core_node_name }}"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "{{ core_node_name }}"

      upf:
        privileged: true
        capabilities:
          add:
            - NET_ADMIN
            - SYS_MODULE

      # PVC cert-pvc compatible OpenEBS hostpath
      pvc:
        cert:
          enabled: true
          size: 1Gi
          storageClassName: openebs-hostpath
          accessModes:
            - ReadWriteOnce
          volumeMode: Filesystem
