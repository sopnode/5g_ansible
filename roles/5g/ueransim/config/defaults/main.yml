---
# defaults/main.yml - low priority, can be overridden by group_vars

# for open5gs
ueransim_root: "/root/open5gs-k8s/ueransim"

# for free5gc and oai
ueransim_chart_path: "/root/free5gc-helm/charts/ueransim"

# NOTA: for oai, free5gc that includes ueransim not already cloned
free5gc_repo_url: "https://github.com/sopnode/free5gc-helm.git"
free5gc_repo_dest: "/root/free5gc-helm"
free5gc_repo_branch: "main"

nad_manifests_path: "{{ ueransim_chart_path }}/nad"  
