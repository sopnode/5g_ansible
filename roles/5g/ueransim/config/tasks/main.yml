---

- name: Check if yq is already installed
  ansible.builtin.stat:
    path: "{{ yq_bin_path }}"
  register: yq_bin

- name: Download yq binary using curl or wget
  ansible.builtin.shell: |
    set -e
    if command -v curl >/dev/null 2>&1; then
      curl -L --fail "{{ yq_url }}" -o "{{ yq_bin_path }}"
    elif command -v wget >/dev/null 2>&1; then
      wget -O "{{ yq_bin_path }}" "{{ yq_url }}"
    else
      echo "Neither curl nor wget found" >&2
      exit 1
    fi
  args:
    creates: "{{ yq_bin_path }}"
  when: not yq_bin.stat.exists
  become: true

- name: Ensure yq is executable
  ansible.builtin.file:
    path: "{{ yq_bin_path }}"
    mode: '0755'
    state: file
  become: true


- name: Load active 5G profile
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
    name: fiveg

- name: Validate PLMN
  assert:
    that:
      - fiveg.plmn.mcc is defined
      - fiveg.plmn.mnc is defined
      - fiveg.plmn.tac is defined

- name: Validate slices
  assert:
    that:
      - slice.name is defined
      - slice.sst is defined
      - slice.dnn is defined
  loop: "{{ fiveg.slices }}"
  loop_control:
    loop_var: slice

- name: Validate UE slice references
  assert:
    that:
      - ue.value.slice in fiveg.slices | map(attribute='name') | list
  loop: "{{ fiveg.ues | dict2items }}"
  loop_control:
    loop_var: ue

# ============================================================
# Dispatch to core-specific config
# ============================================================
- name: Configure ueransim for open5gs
  ansible.builtin.include_tasks: config_open5gs.yml
  when: core == 'open5gs'

- name: Configure ueransim for free5gc
  ansible.builtin.include_tasks: config_free5gc.yml
  when: core == 'free5gc'
  vars:
    ueransim_network: "{{ ueransim_free5gc_network }}"

# Retrieve ueransim repo for oai
- name: Remove existing free5gc directory to ensure clean state
  ansible.builtin.file:
    path: "{{ free5gc_repo_dest }}"
    state: absent

- name: Clone free5gc repo
  ansible.builtin.git:
    repo: "{{ free5gc_repo_url }}"
    dest: "{{ free5gc_repo_dest }}"
    version: "{{ free5gc_repo_branch }}"
    update: yes
    force: yes

- name: Fix chart templates - use $.Values in gnb/ue context
  ansible.builtin.replace:
    path: "{{ item.file }}"
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  when: core == 'oai'
  loop:
    - file: "{{ ueransim_chart_path }}/templates/gnb/gnb-deployment.yaml"
      regexp: 'toYaml \.nodeSelector'
      replace: 'toYaml $.Values.nodeSelector'
    - file: "{{ ueransim_chart_path }}/templates/gnb/gnb-deployment.yaml"
      regexp: 'toYaml \.affinity'
      replace: 'toYaml $.Values.affinity'
    - file: "{{ ueransim_chart_path }}/templates/gnb/gnb-deployment.yaml"
      regexp: 'toYaml \.tolerations'
      replace: 'toYaml $.Values.tolerations'
    - file: "{{ ueransim_chart_path }}/templates/ue/ue-deployment.yaml"
      regexp: 'toYaml \.nodeSelector'
      replace: 'toYaml $.Values.nodeSelector'
    - file: "{{ ueransim_chart_path }}/templates/ue/ue-deployment.yaml"
      regexp: 'toYaml \.affinity'
      replace: 'toYaml $.Values.affinity'
    - file: "{{ ueransim_chart_path }}/templates/ue/ue-deployment.yaml"
      regexp: 'toYaml \.tolerations'
      replace: 'toYaml $.Values.tolerations'
  changed_when: false

- name: Configure ueransim for oai
  when: core == 'oai'
  block:

    - name: Create sed script to fix ngapIp
      ansible.builtin.copy:
        content: "{% raw %}s/ngapIp: 0\.0\.0\.0/ngapIp: {{ .n2if.ipAddress }}/g{% endraw %}"
        dest: "{{ ueransim_chart_path }}/fix_ngapip.sed"
        mode: '0644'

    - name: Fix ngapIp in gnb-deployment.yaml
      ansible.builtin.shell: |
        sed -i -f {{ ueransim_chart_path }}/fix_ngapip.sed {{ ueransim_chart_path }}/templates/gnb/gnb-deployment.yaml
        echo "✓ ngapIp patch applied"
        grep -n "ngapIp:" {{ ueransim_chart_path }}/templates/gnb/gnb-deployment.yaml
      register: ngapip_patch
      changed_when: false

    - name: Display result
      ansible.builtin.debug:
        msg: "{{ ngapip_patch.stdout }}"

    - name: Cleanup
      ansible.builtin.file:
        path: "{{ ueransim_chart_path }}/fix_ngapip.sed"
        state: absent

    - name: Load OAI configuration tasks
      ansible.builtin.include_tasks: config_oai.yml

  vars:
    ueransim_network: "{{ ueransim_oai_network }}"

