---
# ============================================================
# ueransim config for open5gs (kustomize static manifests)
# ============================================================

- name: Check if yq is already installed
  ansible.builtin.stat:
    path: "{{ yq_bin_path }}"
  register: yq_bin

- name: Download yq binary
  ansible.builtin.shell: |
    set -e
    if command -v curl >/dev/null 2>&1; then
      curl -L --fail "{{ yq_url }}" -o "{{ yq_bin_path }}"
    elif command -v wget >/dev/null 2>&1; then
      wget -O "{{ yq_bin_path }}" "{{ yq_url }}"
    else
      echo "Neither curl nor wget found" >&2
      exit 1
    fi
  args:
    creates: "{{ yq_bin_path }}"
  when: not yq_bin.stat.exists
  become: true

- name: Ensure yq is executable
  ansible.builtin.file:
    path: "{{ yq_bin_path }}"
    mode: '0755'
    state: file
  become: true

- name: Build ueransim_slices list for open5gs gNB
  set_fact:
    ueransim_slices: "{{ ueransim_slices | default([]) + [
      {
        'sst': sl_item.sst | int,
        'sd': lookup('template', 'slice_sd.j2') | trim
      }
    ] }}"
  loop: "{{ fiveg.slices }}"
  loop_control:
    loop_var: sl_item

- name: Update ueransim gNB configuration (open5gs)
  ansible.builtin.shell: >
    {{ yq_bin_path }} eval -i '
      .mcc = "{{ fiveg.plmn.mcc }}" |
      .mnc = "{{ fiveg.plmn.mnc }}" |
      .tac = {{ fiveg.plmn.tac | int }} |
      .linkIp = "0.0.0.0" |
      .ngapIp = "{{ ueransim_open5gs_network.gnb_ip }}" |
      .gtpIp  = "{{ ueransim_open5gs_network.gnb_ip }}" |
      .slices = {{ ueransim_slices | to_json }}
    ' "{{ ueransim_root }}/ueransim-gnb/config/open5gs-gnb.yaml"

- name: Rewrite ueransim UE configs (open5gs)
  ansible.builtin.copy:
    dest: "{{ ueransim_root }}/ueransim-ue/ue{{ ue_num }}/ue{{ ue_num }}.yaml"
    content: "{{ lookup('template', 'ue-config.j2') }}"
  vars:
    ue_data: "{{ item.value }}"
    slice_data: "{{ fiveg.slices | selectattr('name', 'equalto', item.value.slice) | first }}"
    curr_sd: "{{ lookup('template', 'slice_sd.j2', template_vars={'sl_item': slice_data}) | trim }}"
    ue_num: "{{ '1' if item.key == 'uesim01' else '2' if item.key == 'uesim02' else '3' }}"
  loop: "{{ fiveg.ues | dict2items | selectattr('key', 'in', ['uesim01', 'uesim02', 'uesim03']) | list }}"

- name: Set replicas to 0 for all UE deployments
  ansible.builtin.shell: >
    {{ yq_bin_path }} eval -i '.spec.replicas = 0'
    "{{ ueransim_root }}/ueransim-ue/ue{{ item }}/ue-deployment.yaml"
  loop: [1, 2, 3]
