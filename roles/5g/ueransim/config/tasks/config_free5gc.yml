---
# ============================================================
# ueransim config for free5gc (Helm values overrides)
# 1 release for gNB + 1 release per UE
# ============================================================
- name: Ensure ueransim output directory exists
  ansible.builtin.file:
    path: "{{ ueransim_chart_path }}/overrides"
    state: directory
    mode: '0755'

- name: Generate ueransim gNB values override
  ansible.builtin.template:
    src: ueransim-gnb-values.yaml.j2
    dest: "{{ ueransim_chart_path }}/overrides/values-gnb-override.yaml"
    mode: '0644'
  vars:
    profile: "{{ fiveg }}"
    net: "{{ ueransim_free5gc_network }}"

- name: Generate ueransim UE values override for each UE
  ansible.builtin.template:
    src: ueransim-ue-values.yaml.j2
    dest: "{{ ueransim_chart_path }}/overrides/values-{{ ue.key | lower }}-override.yaml"
    mode: '0644'
  vars:
    profile: "{{ fiveg }}"
    net: "{{ ueransim_free5gc_network }}"
    ue_name: "{{ ue.key }}"
    ue_data: "{{ ue.value }}"
    slice_data: "{{ fiveg.slices | selectattr('name', 'equalto', ue.value.slice) | first }}"
  loop: "{{ fiveg.ues | dict2items | selectattr('key', 'in', ['uesim01', 'uesim02', 'uesim03']) | sort(attribute='key') | list }}"
  loop_control:
    loop_var: ue
