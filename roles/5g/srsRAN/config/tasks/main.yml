---
- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

- name: Remove existing srsRAN Helm directory to ensure clean state
  ansible.builtin.file:
    path: "{{ repo_dest }}"
    state: absent

- name: Clone repo srsRAN
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_dest }}"
    version: "{{ version | default('main') }}"
    update: no
    force: yes

- name: Ensure namespace exists
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ ran_ns }}"
    state: present

- name: Gather env facts (remote)
  ansible.builtin.setup:
    filter: ansible_env
  when: ansible_env is not defined

- name: Normalize repo_dest to remote HOME
  ansible.builtin.set_fact:
    repo_dest_abs: "{{ (repo_dest | default('~/srsran-helm') | trim)
                       | regex_replace('^~/?', ansible_env.HOME ~ '/') }}"

- name: Select values filename from rru
  ansible.builtin.set_fact:
    values_filename: "{{ rru_file_map[(rru | default('rfsim') | string | trim | lower)] | default('values.yaml') }}"
  vars:
    rru_file_map:
      benetel: values-benetel.yaml
      liteon:  values-liteon.yaml
      n300:    values-n300-n78-20MHz.yaml
      n320:    values-n320-n78-20MHz.yaml
      rfsim:   values-rfsim.yaml

- name: Build absolute values_file path
  ansible.builtin.set_fact:
    values_file: "{{ [repo_dest_abs, 'charts', 'srsran-gnb', values_filename] | path_join }}"

- name: debug
  ansible.builtin.debug:
    msg:
      - "repo_dest_abs='{{ repo_dest_abs }}'"
      - "values_file='{{ values_file }}'"

- name: Ensure values file exists (remote)
  ansible.builtin.stat:
    path: "{{ values_file }}"
  register: values_stat

- name: Fail if values file missing
  ansible.builtin.fail:
    msg: "Values file not found: {{ values_file }}"
  when: not values_stat.stat.exists

- name: Patch n3 NAD MTU for free5gc split-node scenario
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: "{{ free5gc_n3_nad_name }}"
        namespace: "{{ ran_ns }}"
      spec:
        config: >-
          { "cniVersion": "0.3.1", "plugins": [ { "type": "ovs",
            "capabilities": { "ips": true }, "bridge": "n3br",
            "mtu": 1450,
            "ipam": { "type": "static", "routes": [ { "dst": "0.0.0.0/0", "gw": "" } ] }
          } ] }
  when:
    - core == 'free5gc'
    - core_node_name != ran_node_name

- name: Apply 5G profile to gNB and UE configs
  include_tasks: apply_5g_profile.yaml

- name: Debug amf ip/port
  debug:
    msg:
      - "amf_ip={{ srsran_network.n2.amf_ip | quote }}"
      - "amf_port={{ srsran_network.n2.amf_port | quote }}"

- name: Update AMF address, gNB N3 IP, namespace and n3networkName
  ansible.builtin.shell: >
    {{ yq_bin_path }} eval -i '
      .gnbConfig.cu_cp.amf.addr = "{{ srsran_network.n2.amf_ip }}" |
      .gnbConfig.cu_cp.amf.port = {{ srsran_network.n2.amf_port }} |
      .gnbConfig.cu_cp.amf.bind_addr = "{{ srsran_network.n2.gnb_bind_ip }}" |
      .gnbConfig.cu_up.ngu.socket = [{"bind_addr": "{{ srsran_network.n3.gnb_ip }}"}] |
      .gnbIp = "{{ srsran_network.n3.gnb_ip }}" |
      .n3networkName = "{{ n3networkName }}" |
      .namespace = "{{ ran_ns }}"
    ' "{{ values_file }}"

- name: Fix device_args for rfsim GNU Radio single-channel multi-UE
  ansible.builtin.shell: >
    {{ yq_bin_path }} eval -i '
      .gnbConfig.cell_cfg.channel_bandwidth_MHz = 20 |
      .gnbConfig.cell_cfg.pdcch.common.coreset0_index = 12 |
      .gnbConfig.cell_cfg.pdcch.common.ss0_index = 0 |
      .gnbConfig.ru_sdr.srate = 23.04 |
      .gnbConfig.ru_sdr.device_args = "tx_port=tcp://{{ srsran_network.n3.gnb_ip }}:2000,rx_port=tcp://{{ srsran_network.n3.ue_ips[0] }}:2001,base_srate=23.04e6"
    ' "{{ values_file }}"
  when: rru == 'rfsim'

- name: Patch gnb deployment template - parameterize n3network name
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/templates/deployment.yaml"
    regexp: '"name":\s*"n3network"'
    replace: '"name": "{{ ''{{'' }} .Values.n3networkName {{ ''}}'' }}"'

- name: Patch srsue deployment template - parameterize n3network name
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsue/templates/deployment.yaml"
    regexp: '"name":\s*"n3network"'
    replace: '"name": "{{ ''{{'' }} .Values.n3networkName {{ ''}}'' }}"'

# --- rfsim only: UE list + srsue values file ---

- name: Load 5G profile vars
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
    name: fiveg
  when: rru == 'rfsim'

- name: Build full UE list
  set_fact:
    ue_list_full:
      - name: ue1
        index: 1
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.uesim01.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.uesim01.slice) | map(attribute='dnn') | first }}"
        tx_port: 2101
        rx_port: 2100
        ue_ip: "{{ srsran_network.n3.ue_ips[0] }}"
      - name: ue2
        index: 2
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.uesim02.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.uesim02.slice) | map(attribute='dnn') | first }}"
        tx_port: 2201
        rx_port: 2200
        ue_ip: "{{ srsran_network.n3.ue_ips[0] }}"
      - name: ue3
        index: 3
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.uesim03.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.uesim03.slice) | map(attribute='dnn') | first }}"
        tx_port: 2301
        rx_port: 2300
        ue_ip: "{{ srsran_network.n3.ue_ips[0] }}"
  when: rru == 'rfsim'

- name: Slice UE list to ue_count
  set_fact:
    ue_list: "{{ ue_list_full[:ue_count | int] }}"
    ue_indices: "{{ range(1, ue_count | int + 1) | list }}"
  when: rru == 'rfsim'

- name: Write srsue values-rfsim.yaml
  ansible.builtin.copy:
    dest: "{{ [repo_dest_abs, 'charts', 'srsue', 'values-rfsim.yaml'] | path_join }}"
    content: |
      gnbIp: "{{ srsran_network.n3.gnb_ip }}"
      ueIp: "{{ srsran_network.n3.ue_ips[0] }}"
      n3networkName: "{{ n3networkName }}"
      ueCount: {{ ue_count }}
      ues:
      {% for ue in ue_list %}
        - imsi: "{{ ue.imsi }}"
          k: "{{ fiveg.security.full_key }}"
          opc: "{{ fiveg.security.opc }}"
          apn: "{{ ue.dnn }}"
          ueIp: "{{ ue.ue_ip }}"
          zmqTxPort: {{ ue.tx_port }}
          zmqRxPort: {{ ue.rx_port }}
      {% endfor %}
  when: rru == 'rfsim'
