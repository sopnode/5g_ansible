# ------------------------------
# Deploy srsRAN UEs (single pod, tmux + GNU Radio broker)
# RFSIM only - up to 3 UEs on a single radio channel
# ------------------------------

- name: Include 5G profile variables
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
    name: fiveg

- name: Build full UE list from 5G profile
  set_fact:
    ue_list_full:
      - name: ue1
        index: 1
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.UE18.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.UE18.slice) | map(attribute='dnn') | first }}"
        tx_port: 2100
        rx_port: 2000
        ue_ip: "{{ srsran_network.n3.ue_ips[0] }}"
      - name: ue2
        index: 2
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.UE19.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.UE19.slice) | map(attribute='dnn') | first }}"
        tx_port: 2200
        rx_port: 2001
        ue_ip: "{{ srsran_network.n3.ue_ips[1] }}"
      - name: ue3
        index: 3
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.UE20.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.UE20.slice) | map(attribute='dnn') | first }}"
        tx_port: 2300
        rx_port: 2002
        ue_ip: "{{ srsran_network.n3.ue_ips[2] }}"

- name: Slice UE list to ue_count
  set_fact:
    ue_list: "{{ ue_list_full[:ue_count | int] }}"
    ue_indices: "{{ range(1, ue_count | int + 1) | list }}"

- name: Debug UE list
  ansible.builtin.debug:
    msg: "Deploying {{ ue_list | length }} UE(s): {{ ue_list | map(attribute='name') | list }}"

- block:
    # --- Cleanup ---
    - name: Uninstall existing srsUE Helm release
      kubernetes.core.helm:
        name: srsran-ue
        release_namespace: "{{ ran_ns }}"
        state: absent
        wait: true
      failed_when: false

    - name: Clean old ConfigMap
      kubernetes.core.k8s:
        api_version: v1
        kind: ConfigMap
        namespace: "{{ ran_ns }}"
        name: "srsran-ue-ue-config"
        state: absent
      failed_when: false

    # --- Deploy single UE pod via Helm ---
    - name: Deploy srsRAN UE pod via Helm
      kubernetes.core.helm:
        name: srsran-ue
        chart_ref: "{{ [repo_dest_abs, 'charts', 'srsue'] | path_join }}"
        release_namespace: "{{ ran_ns }}"
        state: present
        wait: true
        atomic: true
        timeout: 600s
        values:
          ueCount: "{{ ue_count }}"
          n3networkName: "{{ free5gc_n3_nad_name | default('n3network') }}"
          ueIp: "{{ srsran_network.n3.ue_ips[0] }}"  # IP du pod (pour Multus)
          gnbIp: "{{ srsran_network.n3.gnb_ip }}"
          # UE configs passées comme liste
          ues: "{{ ue_list | map(attribute='imsi') | list }}"
          imsi: "{{ ue_list[0].imsi }}"
          k: "{{ fiveg.security.full_key }}"
          opc: "{{ fiveg.security.opc }}"
          apn: "{{ ue_list[0].dnn }}"
          zmq:
            tx_port: "{{ ue_list[0].tx_port }}"
            rx_port: "{{ ue_list[0].rx_port }}"

    # --- Pod discovery ---
    - name: Get UE pod name
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ran_ns }}"
        label_selectors:
          - app=srsran
          - component=ue
      register: ue_pods
      until: ue_pods.resources | length > 0
      retries: 20
      delay: 5

    - name: Set UE pod name
      set_fact:
        ue_pod_name: "{{ ue_pods.resources[0].metadata.name }}"

    - name: Wait for UE pod to be Ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pod/{{ ue_pod_name }}
        -n {{ ran_ns }} --timeout=300s
      changed_when: false

    # --- tmux session ---
    - name: Create tmux session 'ran' if missing
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} --
        /bin/sh -lc "tmux has-session -t ran || tmux new-session -d -s ran"
      changed_when: true
      failed_when: false

    # --- Start each UE in its own tmux window ---
    - name: Start each UE in its own tmux window
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} --
        /bin/sh -lc "
          tmux list-windows -t ran | grep -q 'ue{{ item.index }}' && tmux kill-window -t ran:ue{{ item.index }} || true;
          tmux new-window -t ran -n ue{{ item.index }} 'bash -lc \"/srsran/config/start_ue.sh {{ item.index }}\"'
        "
      loop: "{{ ue_list }}"
      changed_when: true
      failed_when: false

    # --- Wait for srsUE processes ---
    - name: Wait until each UE process is up
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} -- /bin/sh -lc
        'ok=1; for i in {{ ue_indices | join(" ") }}; do
           if ! pgrep -af "srsue .*ue_${i}\.conf" >/dev/null; then
             ok=0; break;
           fi
         done; test "$ok" = "1"'
      register: ue_up_check
      changed_when: false
      failed_when: false
      retries: 60
      delay: 2
      until: ue_up_check.rc == 0

    - name: Pause before starting GNU Radio
      ansible.builtin.pause:
        seconds: 2

    # --- Start GNU Radio broker ---
    - name: Start GNU Radio broker in tmux window 'gnu'
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} --
        /bin/sh -lc "
          tmux list-windows -t ran | grep -q '^\s*[0-9]\+: gnu\b' && tmux kill-window -t ran:gnu || true;
          tmux new-window -t ran -n gnu 'bash -lc \"/srsran/config/start_gnu.sh {{ ue_count }}\"'
        "
      changed_when: true
      failed_when: false

    - name: Wait for GNU Radio to be ready
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} -- /bin/sh -lc
        "grep -q 'Press Enter to quit' /var/log/gnu_multi_ue.log"
      register: gnu_log_wait
      changed_when: false
      failed_when: false
      retries: 30
      delay: 2
      until: gnu_log_wait.rc == 0

    - name: Show GNU Radio status
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} -- /bin/sh -lc
        "echo '== ps =='; pgrep -af 'python3 .*multi_ue_scenario.py' || true;
         echo '== log tail =='; tail -n 20 /var/log/gnu_multi_ue.log || true"
      register: gnu_status
      changed_when: false
      failed_when: false

    - name: GNU Radio status
      ansible.builtin.debug:
        msg: "{{ gnu_status.stdout }}"

    - name: Pause before adding routes
      ansible.builtin.pause:
        seconds: 2

    # --- Routes ---
    - name: Add default routes in UE pod
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} -- /bin/bash -lc
        'UE_COUNT={{ ue_count }} /srsran/config/add_route.sh'
      changed_when: false
      failed_when: false

    # --- Show UE IPs ---
    - name: Extract UE IP addresses from logs
      ansible.builtin.command: >
        kubectl -n {{ ran_ns }} exec {{ ue_pod_name }} -- /bin/sh -lc
        "grep -m1 'PDU Session Establishment successful' /var/log/ue{{ item.index }}.log | awk '{print \$NF}'"
      loop: "{{ ue_list }}"
      register: ue_ips
      changed_when: false
      failed_when: false

    - name: Show UE IP addresses
      ansible.builtin.debug:
        msg: "{{ item.item.name }} → {{ item.stdout | default('N/A') }}"
      loop: "{{ ue_ips.results }}"

    - name: Summary
      ansible.builtin.debug:
        msg:
          - "UEs started in tmux session 'ran': windows ue1..ue{{ ue_count }}"
          - "GNU Radio broker started in tmux window 'gnu'"
          - "Inspect: kubectl -n {{ ran_ns }} exec -it {{ ue_pod_name }} -- tmux attach -t ran"

  when: rru == 'rfsim'

- name: Summary (Non-RFSIM)
  ansible.builtin.debug:
    msg:
      - "gNB deployed in namespace {{ ran_ns }}"
      - "UE deployment skipped (rru={{ rru }})"
  when: rru != 'rfsim'
