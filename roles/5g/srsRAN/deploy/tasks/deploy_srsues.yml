---
# ------------------------------
# Deploy srsRAN UEs (multi-pod, RFSIM only)
# ------------------------------
- name: Build full UE list from 5G profile (UE18/19/20)
  set_fact:
    ue_list_full:
      - name: ue1
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.UE18.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.UE18.slice) | map(attribute='dnn') | first }}"
        tx_port: 2100
        rx_port: 2000
        ue_ip: "{{ srsran_network.n3.ue_ips[0] }}"
      - name: ue2
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.UE19.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.UE19.slice) | map(attribute='dnn') | first }}"
        tx_port: 2200
        rx_port: 2001
        ue_ip: "{{ srsran_network.n3.ue_ips[1] }}"
      - name: ue3
        imsi: "{{ fiveg.plmn.mcc }}{{ fiveg.plmn.mnc }}{{ fiveg.ues.UE20.imsi_suffix }}"
        dnn: "{{ fiveg.slices | selectattr('name','equalto',fiveg.ues.UE20.slice) | map(attribute='dnn') | first }}"
        tx_port: 2300
        rx_port: 2002
        ue_ip: "{{ srsran_network.n3.ue_ips[2] }}"

- name: Slice UE list to ue_count
  set_fact:
    ue_list: "{{ ue_list_full[:ue_count | int] }}"

- name: Debug UE list
  ansible.builtin.debug:
    msg: "Deploying {{ ue_list | length }} UE(s): {{ ue_list | map(attribute='name') | list }}"

- name: Clean old ConfigMap for this UE release
  when: rru == "rfsim"
  kubernetes.core.k8s:
    api_version: v1
    kind: ConfigMap
    namespace: "{{ ran_ns }}"
    name: "srsran-ue-srsue-{{ item.name }}-ue-config"
    state: absent
  loop: "{{ ue_list }}"
  loop_control:
    loop_var: item

- name: Deploy each srsUE pod as separate Helm release
  when: rru == "rfsim"
  kubernetes.core.helm:
    name: "srsue-{{ item.name }}"
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsue'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    state: present
    wait: true
    values:
      imsi: "{{ item.imsi }}"
      k: "{{ fiveg.security.full_key }}"
      opc: "{{ fiveg.security.opc }}"
      apn: "{{ item.dnn }}"
      n3networkName: "{{ free5gc_n3_nad_name | default('n3network') }}"
      ueIp: "{{ item.ue_ip }}"
      gnbIp: "{{ srsran_network.n3.gnb_ip }}"
      zmq:
        tx_port: "{{ item.tx_port }}"
        rx_port: "{{ item.rx_port }}"
  loop: "{{ ue_list }}"


