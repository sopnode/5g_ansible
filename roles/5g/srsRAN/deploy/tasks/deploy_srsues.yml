---
# ------------------------------
# Deploy srsRAN UE pod (single pod, tmux session)
# RFSIM only - broker and UEs started in start_broker.yml
# ------------------------------

- name: Assert ue_list is defined (must be set by config role)
  ansible.builtin.assert:
    that:
      - ue_list is defined
      - ue_list | length > 0
    fail_msg: "ue_list is not defined - ensure config role ran before deploy"

- name: Debug UE list
  ansible.builtin.debug:
    msg: "Deploying {{ ue_list | length }} UE(s): {{ ue_list | map(attribute='name') | list }}"

- block:

    - name: Uninstall existing srsran-ue Helm release
      kubernetes.core.helm:
        name: srsran-ue
        release_namespace: "{{ ran_ns }}"
        state: absent
        wait: true
      failed_when: false

    - name: Clean old srsue ConfigMap
      kubernetes.core.k8s:
        api_version: v1
        kind: ConfigMap
        namespace: "{{ ran_ns }}"
        name: "srsran-ue-srsran-ue-ue-config"
        state: absent
      failed_when: false

    - name: Deploy srsRAN UE pod via Helm
      kubernetes.core.helm:
        name: srsran-ue
        chart_ref: "{{ [repo_dest_abs, 'charts', 'srsue'] | path_join }}"
        release_namespace: "{{ ran_ns }}"
        values_files:
          - "{{ [repo_dest_abs, 'charts', 'srsue', 'values-rfsim.yaml'] | path_join }}"
        state: present
        wait: true
        atomic: true
        timeout: 300s

    - name: Get UE pod name
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ran_ns }}"
        label_selectors: "{{ srs_ue_label_selectors }}"
      register: ue_pods
      until: >
        ue_pods.resources | length > 0 and
        (ue_pods.resources[0].status.phase | default('')) == 'Running'
      retries: 30
      delay: 5

    - name: Set UE pod name
      set_fact:
        ue_pod_name: "{{ ue_pods.resources[0].metadata.name }}"

    - name: Wait for UE pod to be Ready
      ansible.builtin.command: >
        {{ kubectl_bin }} wait --for=condition=Ready pod/{{ ue_pod_name }}
        -n {{ ran_ns }} --timeout=300s
      changed_when: false

    - name: Debug UE pod name
      ansible.builtin.debug:
        msg: "UE pod: {{ ue_pod_name }}"

    - name: Create tmux session 'ran' if missing
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} exec {{ ue_pod_name }} --
        /bin/sh -lc "tmux has-session -t ran 2>/dev/null || tmux new-session -d -s ran"
      changed_when: true
      failed_when: false

  when: rru == 'rfsim'

- name: Summary (Non-RFSIM)
  ansible.builtin.debug:
    msg:
      - "gNB deployed in namespace {{ ran_ns }}"
      - "UE deployment skipped (rru={{ rru }})"
  when: rru != 'rfsim'
