---
# ------------------------------
# Deploy srsRAN UE pod (single pod, tmux session)
# RFSIM only - broker started in start_broker.yml
# For open5gs: UEs are launched here BEFORE gNB (same order as reference role)
# For free5gc: UEs are launched in start_broker.yml AFTER gNB+broker
# ------------------------------
- name: Assert ue_list is defined (must be set by config role)
  ansible.builtin.assert:
    that:
      - ue_list is defined
      - ue_list | length > 0
    fail_msg: "ue_list is not defined - ensure config role ran before deploy"

- name: Debug UE list
  ansible.builtin.debug:
    msg: "Deploying {{ ue_list | length }} UE(s): {{ ue_list | map(attribute='name') | list }}"

- block:
    - name: Uninstall existing srsran-ue Helm release
      kubernetes.core.helm:
        name: srsran-ue
        release_namespace: "{{ ran_ns }}"
        state: absent
        wait: true
      failed_when: false

    - name: Clean old srsue ConfigMap
      kubernetes.core.k8s:
        api_version: v1
        kind: ConfigMap
        namespace: "{{ ran_ns }}"
        name: "srsran-ue-srsran-ue-ue-config"
        state: absent
      failed_when: false

    - name: Deploy srsRAN UE pod via Helm
      kubernetes.core.helm:
        name: srsran-ue
        chart_ref: "{{ [repo_dest_abs, 'charts', 'srsue'] | path_join }}"
        release_namespace: "{{ ran_ns }}"
        values_files:
          - "{{ [repo_dest_abs, 'charts', 'srsue', 'values-rfsim.yaml'] | path_join }}"
        state: present
        wait: true
        atomic: true
        timeout: 300s

    - name: Get UE pod name
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ran_ns }}"
        label_selectors: "{{ srs_ue_label_selectors }}"
      register: ue_pods
      until: >
        ue_pods.resources | length > 0 and
        (ue_pods.resources[0].status.phase | default('')) == 'Running'
      retries: 30
      delay: 5

    - name: Set UE pod name
      set_fact:
        ue_pod_name: "{{ ue_pods.resources[0].metadata.name }}"

    - name: Wait for UE pod to be Ready
      ansible.builtin.command: >
        {{ kubectl_bin }} wait --for=condition=Ready pod/{{ ue_pod_name }}
        -n {{ ran_ns }} --timeout=300s
      changed_when: false

    - name: Debug UE pod name
      ansible.builtin.debug:
        msg: "UE pod: {{ ue_pod_name }}"

    - name: Create tmux session 'ran' if missing
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} exec {{ ue_pod_name }} --
        /bin/sh -lc "tmux has-session -t ran 2>/dev/null || tmux new-session -d -s ran"
      changed_when: true
      failed_when: false

    # For open5gs: launch UEs here BEFORE gNB deploy.
    # This matches the working order from the reference role:
    #   UEs -> gNB -> broker
    # The broker's req_source connects to gNB only after gNB is stable,
    # preventing ZMQ REQ/REP deadlock (SIGBUS exit 136).
    - name: Start each UE in its own tmux window (open5gs only)
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} exec {{ ue_pod_name }} --
        /bin/sh -lc "
          tmux list-windows -t ran | grep -q 'ue{{ item.index }}' \
            && tmux kill-window -t ran:ue{{ item.index }} || true;
          tmux new-window -t ran -n ue{{ item.index }} \
            'bash -lc \"/srsran/config/start_ue.sh {{ item.index }} 2>&1 | tee /var/log/ue{{ item.index }}.log\"'
        "
      loop: "{{ ue_list }}"
      changed_when: true
      failed_when: false
      when: core == 'open5gs'

    - name: Wait until each UE process is up (open5gs only)
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} exec {{ ue_pod_name }} -- /bin/sh -lc
        'ok=1;
         for i in {{ ue_indices | join(" ") }}; do
           if ! pgrep -af "srsue.*ue_${i}\.conf" >/dev/null 2>&1; then
             ok=0; break;
           fi;
         done;
         test "$ok" = "1"'
      register: ue_up_check
      changed_when: false
      failed_when: false
      retries: 60
      delay: 2
      until: ue_up_check.rc == 0
      when: core == 'open5gs'

    - name: Warn if UE processes did not start (open5gs only)
      ansible.builtin.debug:
        msg: "WARNING: not all UE processes started"
      when: core == 'open5gs' and ue_up_check.rc != 0

  when: rru == 'rfsim'

- name: Summary (Non-RFSIM)
  ansible.builtin.debug:
    msg:
      - "gNB deployed in namespace {{ ran_ns }}"
      - "UE deployment skipped (rru={{ rru }})"
  when: rru != 'rfsim'
