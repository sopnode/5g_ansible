---
# ============================================================
# Patch srsRAN Helm charts for rfsim multi-UE GNU Radio mode
# Idempotent - safe to run multiple times
# ============================================================

- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

# --- Rewrite configmap.yaml (tous scenarios rfsim) ---

- name: Rewrite srsue configmap.yaml
  ansible.builtin.copy:
    dest: "{{ repo_dest_abs }}/charts/srsue/templates/configmap.yaml"
    mode: '0644'
    content: "{{ lookup('template', 'srsue_configmap.yaml.j2') }}"

# --- Rewrite deployment.yaml pour matcher exactement le repo Ziyad ---
# Image: ghcr.io/ziyad-mabrouk/srsue:v1.0
# ip netns add ue0 au démarrage
# n3networkName paramétrable

- name: Rewrite srsue deployment.yaml
  ansible.builtin.copy:
    dest: "{{ repo_dest_abs }}/charts/srsue/templates/deployment.yaml"
    mode: '0644'
    content: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ '{{' }} include "srsran-ue.fullname" . {{ '}}' }}
        labels:
          {{ '{{-' }} include "srsran-ue.labels" . | nindent 4 {{ '}}' }}
      spec:
        selector:
          matchLabels:
            {{ '{{-' }} include "srsran-ue.selectorLabels" . | nindent 6 {{ '}}' }}
        replicas: 1
        template:
          metadata:
            labels:
              {{ '{{-' }} include "srsran-ue.selectorLabels" . | nindent 8 {{ '}}' }}
            annotations:
              k8s.v1.cni.cncf.io/networks: >-
                [{ "name": "{{ '{{' }} .Values.n3networkName {{ '}}' }}", "interface": "n3", "ips": [ "{{ '{{' }} .Values.ueIp {{ '}}' }}/24" ] }]
          spec:
            containers:
              - name: ue
                image: "{{ '{{' }} .Values.image.repository {{ '}}' }}:{{ '{{' }} .Values.image.tag {{ '}}' }}"
                imagePullPolicy: {{ '{{' }} .Values.image.pullPolicy {{ '}}' }}
                securityContext:
                  privileged: true
                  capabilities:
                    add: ["NET_ADMIN", "SYS_NICE", "IPC_LOCK", "CAP_NET_ADMIN"]
                command: ["/bin/bash", "-c", "--"]
                args:
                  - |
                    mkdir -p /dev/net
                    mknod /dev/net/tun c 10 200
                    ip netns add ue0
                    apt update && apt install -y tmux iputils-ping iperf3
                    while true; do sleep 30; done
                env:
                  - name: PATH
                    value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/srsran/config"
                  - name: GNB_IP
                    value: "{{ srsran_network.n3.gnb_ip }}"
                  - name: UE_IPS
                    value: "{{ srsran_network.n3.ue_ips | join(',') }}"
                  - name: UE_COUNT
                    value: "{{ ue_count | default(3) | string }}"
                volumeMounts:
                  - name: ue-config
                    mountPath: /srsran/config
            dnsPolicy: ClusterFirst
            restartPolicy: Always
            volumes:
              - name: ue-config
                configMap:
                  name: {{ '{{' }} include "srsran-ue.fullname" . {{ '}}' }}-ue-config
                  defaultMode: 0755

# --- Rewrite srsue values-rfsim.yaml (simple, comme repo Ziyad) ---

- name: Rewrite srsue values-rfsim.yaml (open5gs rfsim)
  ansible.builtin.copy:
    dest: "{{ repo_dest_abs }}/charts/srsue/values-rfsim.yaml"
    mode: '0644'
    content: |
      image:
        repository: ghcr.io/ziyad-mabrouk/srsue
        tag: v1.0
        pullPolicy: IfNotPresent
      ueIp: "{{ srsran_network.n3.ue_ips[0] }}"
      gnbIp: "{{ srsran_network.n3.gnb_ip }}"
      n3networkName: "{{ n3networkName }}"
  when: rru == 'rfsim' and core == 'open5gs'

# --- Patch gNB values-rfsim.yaml - n3network name (tous scénarios) ---

- name: Patch gNB deployment - parameterize n3network name
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/values-rfsim.yaml"
    regexp: '"name":\s*"n3network"'
    replace: '"name": "{{ ''{{'' }} .Values.n3networkName {{ ''}}'' }}"'

- name: Patch gNB configmap - set log level to info
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/values-rfsim.yaml"
    regexp: 'all_level:\s*warning'
    replace: 'all_level: info'

# --- Patch gNB values-rfsim.yaml IPs (open5gs rfsim only) ---
# Use Multus N3 IPs directly (stable):
#   - AMF addr : srsran_network.n3.amf_ip  (10.10.3.200, fixed Multus IP)
#   - gNB bind : srsran_network.n3.gnb_ip  (10.10.3.234)
#   - gNB tx/rx: gnb_ip:2000 / ue_ip:2001
- name: Patch gNB values-rfsim.yaml with correct IPs (open5gs rfsim)
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/values-rfsim.yaml"
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  loop:
    - regexp: 'gnbIp:.*'
      replace: 'gnbIp: {{ srsran_network.n3.gnb_ip }}'
    - regexp: '(^\s*addr:\s*)10\.\d+\.\d+\.\d+'
      replace: '\g<1>{{ srsran_network.n3.amf_ip }}'
    - regexp: '(^\s*bind_addr:\s*)10\.\d+\.\d+\.\d+(\s*)$'
      replace: '\g<1>{{ srsran_network.n3.gnb_ip }}\g<2>'
    - regexp: 'tx_port=tcp://[0-9.]+:2000,rx_port=tcp://[0-9.]+:2001'
      replace: 'tx_port=tcp://{{ srsran_network.n3.gnb_ip }}:2000,rx_port=tcp://{{ srsran_network.n3.ue_ips[0] }}:2001'
    - regexp: '(^\s*- bind_addr:\s*)10\.\d+\.\d+\.\d+'
      replace: '\g<1>{{ srsran_network.n3.gnb_ip }}'
  when: rru == 'rfsim' and core == 'open5gs'
