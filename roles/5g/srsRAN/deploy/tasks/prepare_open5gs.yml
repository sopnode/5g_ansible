---
# Restart AMF to clear stale UE contexts from RAM
# Fixes open5gs v2.7.0 bug: Assertion 'gnb' failed at amf-sm.c:815
# ONLY called for open5gs - never touches free5gc

- name: Restart AMF to clear stale UE contexts
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} rollout restart deployment
    open5gs-amf
  changed_when: true

- name: Wait for AMF rollout to complete
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} rollout status deployment
    open5gs-amf --timeout=60s
  changed_when: false

- name: Wait for AMF pod to be fully ready (15s uptime)
  ansible.builtin.shell: |
    AMF_START=$({{ kubectl_bin }} get pod -n {{ ran_ns }} -l nf=amf \
      -o jsonpath='{.items[0].status.containerStatuses[0].state.running.startedAt}')
    STARTED=$(date -d "$AMF_START" +%s)
    NOW=$(date +%s)
    DIFF=$((NOW - STARTED))
    echo "AMF up for ${DIFF}s"
    test "$DIFF" -gt 15
  register: amf_ready
  changed_when: false
  failed_when: false
  retries: 40
  delay: 3
  until: amf_ready.rc == 0

# --- Use stable ClusterIP service instead of unstable pod IP ---
# Pod IPs change at every restart; the ClusterIP is stable for the lifetime
# of the cluster and survives AMF pod restarts.

- name: Ensure AMF NGAP ClusterIP service exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: amf-ngap
        namespace: "{{ ran_ns }}"
        labels:
          app: open5gs
      spec:
        selector:
          nf: amf
        ports:
          - protocol: SCTP
            port: 38412
            targetPort: 38412
        type: ClusterIP

- name: Get AMF NGAP service ClusterIP
  ansible.builtin.command: >
    {{ kubectl_bin }} get svc -n {{ ran_ns }} amf-ngap
    -o jsonpath='{.spec.clusterIP}'
  register: amf_svc_ip
  changed_when: false
  until: amf_svc_ip.stdout != ""
  retries: 10
  delay: 3

- name: Update AMF IP in gNB values-rfsim.yaml
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/values-rfsim.yaml"
    regexp: '(^\s*addr:\s*)[\d\.]+'
    replace: '\g<1>{{ amf_svc_ip.stdout }}'

- name: Debug AMF service IP updated
  ansible.builtin.debug:
    msg: "AMF NGAP ClusterIP service {{ amf_svc_ip.stdout }} written to values-rfsim.yaml (stable across AMF restarts)"
