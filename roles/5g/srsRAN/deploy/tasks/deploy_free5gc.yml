---
# ============================================================
# srsRAN deploy for free5gc (Helm)
# ============================================================

- name: Normalize repo_dest to remote HOME
  ansible.builtin.set_fact:
    repo_dest_abs: "{{ (repo_dest | default('~/srsran-helm') | trim)
                       | regex_replace('^~/?', ansible_env.HOME ~ '/') }}"

- name: Gather env facts (remote)
  ansible.builtin.setup:
    filter: ansible_env
  when: ansible_env is not defined

- name: Select values filename from rru
  ansible.builtin.set_fact:
    values_filename: "{{ rru_file_map[(rru | default('rfsim') | string | trim | lower)] | default('values.yaml') }}"
  vars:
    rru_file_map:
      benetel: values-benetel.yaml
      liteon:  values-liteon.yaml
      n300:    values-n300-n78-20MHz.yaml
      n320:    values-n320-n78-20MHz.yaml
      rfsim:   values-rfsim.yaml

- name: Build absolute values_file path
  ansible.builtin.set_fact:
    values_file: "{{ [repo_dest_abs, 'charts', 'srsran-gnb', values_filename] | path_join }}"

- name: Uninstall existing srsran-gnb release if present
  shell: >
    helm list -n {{ ran_ns }} -a -q |
    grep -w "^srsran-gnb$" | wc -l
  register: gnb_release_exists
  changed_when: false
  failed_when: false

- name: Uninstall srsran-gnb
  shell: helm uninstall srsran-gnb -n {{ ran_ns }} --no-hooks
  when: gnb_release_exists.stdout | trim | int > 0
  failed_when: false

- name: Patch deployment template - parameterize n3network name
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/templates/deployment.yaml"
    regexp: '"name":\s*"n3network"'
    replace: '"name": "{{ ''{{'' }} .Values.n3networkName {{ ''}}'' }}"'

- name: Deploy srsRAN gNB via Helm (rfsim)
  when: rru == 'rfsim'
  kubernetes.core.helm:
    name: srsran-gnb
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsran-gnb'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    state: present
    wait: true
    atomic: true
    timeout: 120s
    values_files:
      - "{{ values_file }}"

- name: Deploy srsRAN gNB via Helm (physical RRU)
  when: rru != 'rfsim'
  include_tasks: deploy_with_check.yml

- name: Wait for gNB pod to be Ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ran_ns }}"
    label_selectors: "{{ srs_gnb_label_selectors }}"
  register: gnb_pod
  until:
    - gnb_pod.resources | length > 0
    - gnb_pod.resources[0].status.phase == 'Running'
    - gnb_pod.resources[0].status.containerStatuses |
      selectattr('ready', 'equalto', true) | list | length ==
      gnb_pod.resources[0].status.containerStatuses | length
  retries: 12
  delay: 10

- name: Delay for gNB stability
  ansible.builtin.pause:
    seconds: 10

- name: Deploy srsRAN UEs (rfsim only)
  include_tasks: deploy_srsues.yml
  when: rru == 'rfsim'