---

- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

- name: Uninstall existing srsran-gnb release if present
  shell: >
    helm list -n {{ ran_ns }} -a -q |
    grep -w "^srsran-gnb$" | wc -l
  register: gnb_release_exists
  changed_when: false
  failed_when: false

- name: Uninstall srsran-gnb
  shell: helm uninstall srsran-gnb -n {{ ran_ns }} --no-hooks
  when: gnb_release_exists.stdout | trim | int > 0
  failed_when: false

# open5gs only: restart AMF AFTER gNB uninstall to clear stale UE contexts from RAM
# This fixes open5gs v2.7.0 bug: Assertion 'gnb' failed at amf-sm.c:815
- name: Restart AMF to clear stale UE contexts (open5gs rfsim only)
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} rollout restart deployment open5gs-amf
  changed_when: true
  when: core == 'open5gs' and rru == 'rfsim'

- name: Wait for AMF rollout complete (open5gs rfsim only)
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} rollout status deployment open5gs-amf --timeout=60s
  changed_when: false
  when: core == 'open5gs' and rru == 'rfsim'

- name: Wait for AMF SCTP port 38412 to be ready (open5gs rfsim only)
  ansible.builtin.shell: |
    {{ kubectl_bin }} -n {{ ran_ns }} exec \
      $({{ kubectl_bin }} get pod -n {{ ran_ns }} -l nf=amf \
        -o jsonpath='{.items[0].metadata.name}') -- \
      ss -lnp | grep -q ':38412'
  register: amf_port_ready
  changed_when: false
  failed_when: false
  retries: 40
  delay: 3
  until: amf_port_ready.rc == 0
  when: core == 'open5gs' and rru == 'rfsim'

# Use stable ClusterIP service instead of unstable pod IP
# Pod IPs change at every restart; the ClusterIP survives AMF pod restarts.
- name: Ensure AMF NGAP ClusterIP service exists (open5gs rfsim only)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: amf-ngap
        namespace: "{{ ran_ns }}"
        labels:
          app: open5gs
      spec:
        selector:
          nf: amf
        ports:
          - protocol: SCTP
            port: 38412
            targetPort: 38412
        type: ClusterIP
  when: core == 'open5gs' and rru == 'rfsim'

- name: Get AMF NGAP service ClusterIP (open5gs rfsim only)
  ansible.builtin.command: >
    {{ kubectl_bin }} get svc -n {{ ran_ns }} amf-ngap
    -o jsonpath='{.spec.clusterIP}'
  register: amf_svc_ip
  changed_when: false
  until: amf_svc_ip.stdout != ""
  retries: 10
  delay: 3
  when: core == 'open5gs' and rru == 'rfsim'

- name: Update AMF IP in gNB values-rfsim.yaml (open5gs rfsim only)
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/values-rfsim.yaml"
    regexp: '(^\s*addr:\s*)\d+\.\d+\.\d+\.\d+'
    replace: '\g<1>{{ amf_svc_ip.stdout }}'
  when: core == 'open5gs' and rru == 'rfsim'

- name: Debug AMF service IP updated
  ansible.builtin.debug:
    msg: "AMF NGAP ClusterIP {{ amf_svc_ip.stdout }} written to values-rfsim.yaml (stable across AMF restarts)"
  when: core == 'open5gs' and rru == 'rfsim'

- name: Deploy srsRAN gNB (only when not rfsim)
  when: rru != 'rfsim'
  block:

    - name: Set initial retry facts
      ansible.builtin.set_fact:
        gnb_startup_success: false
        max_attempts: 2

    - name: Deploy and Monitor srsRAN gNB
      block:
        - name: "Attempt gNB deployment (Attempt {{ item }})"
          include_tasks: deploy_with_check.yml
          loop: "{{ range(1, max_attempts + 1) | list }}"
          when: not gnb_startup_success

      rescue:
        - name: Final failure message
          ansible.builtin.fail:
            msg: "gNB failed to start properly on both IP addresses."
          when: not gnb_startup_success

    - name: Confirm success
      ansible.builtin.debug:
        msg: "srsRAN gNB is running successfully!"
      when: gnb_startup_success

- name: Kill broker during gNB deploy to prevent SIGBUS (open5gs rfsim only)
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} exec {{ ue_pod_name }} --
    /bin/sh -lc "pkill -9 python3; true"
  changed_when: true
  failed_when: false
  when: core == 'open5gs' and rru == 'rfsim'

- name: Deploy srsRAN gNB using Helm
  when: rru == 'rfsim'
  kubernetes.core.helm:
    name: srsran-gnb
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsran-gnb'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    values_files:
      - "{{ values_file }}"
    state: present
    wait: False
    atomic: True
    timeout: 180s

- name: Wait for gNB to be ready before starting UEs (open5gs rfsim only)
  when: core == 'open5gs' and rru == 'rfsim'
  block:
    - name: Get gNB pod name
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} get pod
        -l app=srsran,component=gnb
        -o jsonpath='{.items[0].metadata.name}'
      register: gnb_pod_name_result
      until: gnb_pod_name_result.stdout != ""
      retries: 30
      delay: 5
      changed_when: false

    - name: Set gnb_pod_name fact
      ansible.builtin.set_fact:
        gnb_pod_name: "{{ gnb_pod_name_result.stdout }}"

    - name: Wait for gNB cell activated
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} exec {{ gnb_pod_name }} -c gnb-logs --
        grep -c "Cell was activated" /var/log/gnb.log
      register: cell_activated
      until: cell_activated.stdout | int >= 1
      retries: 60
      delay: 5
      changed_when: false

    - name: Wait for AMF reconnection to settle
      ansible.builtin.shell: |
        RECON=$({{ kubectl_bin }} -n {{ ran_ns }} exec {{ gnb_pod_name }} \
          -c gnb-logs -- grep "AMF Reconnection Routine.*started" /var/log/gnb.log 2>/dev/null \
          | tail -1 | awk '{print $1}')
        [ -z "$RECON" ] && exit 0
        RECON_S=$(date -d "$RECON" +%s 2>/dev/null) || exit 1
        NOW=$(date +%s)
        DIFF=$((NOW - RECON_S))
        echo "Last AMF reconnection ${DIFF}s ago"
        test "$DIFF" -gt 20
      register: amf_reconnect_stable
      changed_when: false
      failed_when: false
      retries: 30
      delay: 5
      until: amf_reconnect_stable.rc == 0
