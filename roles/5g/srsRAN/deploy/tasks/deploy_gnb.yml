---

- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

- name: Uninstall existing srsran-gnb release if present
  shell: >
    helm list -n {{ ran_ns }} -a -q |
    grep -w "^srsran-gnb$" | wc -l
  register: gnb_release_exists
  changed_when: false
  failed_when: false

- name: Uninstall srsran-gnb
  shell: helm uninstall srsran-gnb -n {{ ran_ns }} --no-hooks
  when: gnb_release_exists.stdout | trim | int > 0
  failed_when: false

# Use stable ClusterIP service instead of unstable pod IP.
# Pod IPs change at every restart; the ClusterIP survives AMF pod restarts.
- name: Ensure AMF NGAP ClusterIP service exists (open5gs rfsim only)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: amf-ngap
        namespace: "{{ ran_ns }}"
        labels:
          app: open5gs
      spec:
        selector:
          nf: amf
        ports:
          - protocol: SCTP
            port: 38412
            targetPort: 38412
        type: ClusterIP
  when: core == 'open5gs' and rru == 'rfsim'

- name: Get AMF NGAP service ClusterIP (open5gs rfsim only)
  ansible.builtin.command: >
    {{ kubectl_bin }} get svc -n {{ ran_ns }} amf-ngap
    -o jsonpath='{.spec.clusterIP}'
  register: amf_svc_ip
  changed_when: false
  until: amf_svc_ip.stdout != ""
  retries: 10
  delay: 3
  when: core == 'open5gs' and rru == 'rfsim'

- name: Update AMF IP in gNB values-rfsim.yaml (open5gs rfsim only)
  ansible.builtin.replace:
    path: "{{ repo_dest_abs }}/charts/srsran-gnb/values-rfsim.yaml"
    regexp: '(^\s*addr:\s*)\d+\.\d+\.\d+\.\d+'
    replace: '\g<1>{{ amf_svc_ip.stdout }}'
  when: core == 'open5gs' and rru == 'rfsim'

- name: Debug AMF service IP updated
  ansible.builtin.debug:
    msg: "AMF NGAP ClusterIP {{ amf_svc_ip.stdout }} written to values-rfsim.yaml"
  when: core == 'open5gs' and rru == 'rfsim'

# --- Non-rfsim (hardware RRU) deployment ---
- name: Deploy srsRAN gNB (only when not rfsim)
  when: rru != 'rfsim'
  block:

    - name: Set initial retry facts
      ansible.builtin.set_fact:
        gnb_startup_success: false
        max_attempts: 2

    - name: Deploy and Monitor srsRAN gNB
      block:
        - name: "Attempt gNB deployment (Attempt {{ item }})"
          include_tasks: deploy_with_check.yml
          loop: "{{ range(1, max_attempts + 1) | list }}"
          when: not gnb_startup_success

      rescue:
        - name: Final failure message
          ansible.builtin.fail:
            msg: "gNB failed to start properly on both IP addresses."
          when: not gnb_startup_success

    - name: Confirm success
      ansible.builtin.debug:
        msg: "srsRAN gNB is running successfully!"
      when: gnb_startup_success

# --- rfsim deployment ---
- name: Deploy srsRAN gNB using Helm (rfsim)
  when: rru == 'rfsim'
  kubernetes.core.helm:
    name: srsran-gnb
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsran-gnb'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    values_files:
      - "{{ values_file }}"
    state: present
    wait: False
    atomic: True
    timeout: 180s

- name: Wait for gNB to be ready (rfsim only)
  when: rru == 'rfsim'
  block:
    - name: Get gNB pod name
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} get pod
        -l app=srsran,component=gnb
        -o jsonpath='{.items[0].metadata.name}'
      register: gnb_pod_name_result
      until: gnb_pod_name_result.stdout != ""
      retries: 30
      delay: 5
      changed_when: false

    - name: Set gnb_pod_name fact
      ansible.builtin.set_fact:
        gnb_pod_name: "{{ gnb_pod_name_result.stdout }}"

    - name: Wait for gNB cell activated
      ansible.builtin.command: >
        {{ kubectl_bin }} -n {{ ran_ns }} exec {{ gnb_pod_name }} -c gnb-logs --
        grep -c "Cell was activated" /var/log/gnb.log
      register: cell_activated
      until: cell_activated.stdout | int >= 1
      retries: 60
      delay: 5
      changed_when: false

