---
- name: Force Ansible to use venv Python
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

- name: Uninstall existing srsran-gnb release if present
  shell: >
    helm list -n {{ ran_ns }} -a -q |
    grep -w "^srsran-gnb$" | wc -l
  register: gnb_release_exists
  changed_when: false
  failed_when: false

- name: Uninstall srsran-gnb
  shell: helm uninstall srsran-gnb -n {{ ran_ns }} --no-hooks
  when: gnb_release_exists.stdout | trim | int > 0
  failed_when: false

- name: Deploy srsRAN gNB (only when not rfsim)
  when: rru in ['n300', 'n320']
  block:

    - name: Set initial retry facts
      ansible.builtin.set_fact:
        gnb_startup_success: false
        max_attempts: 2

    - name: Deploy and Monitor srsRAN gNB
      block:
        - name: "Attempt gNB deployment (Attempt {{ item }})"
          include_tasks: deploy_with_check.yml
          loop: "{{ range(1, max_attempts + 1) | list }}"
          when: not gnb_startup_success

      rescue:
        - name: Final failure message
          ansible.builtin.fail:
            msg: "gNB failed to start properly on both IP addresses."
          when: not gnb_startup_success

    - name: Confirm success
      ansible.builtin.debug:
        msg: "srsRAN gNB is running successfully!"
      when: gnb_startup_success

- name: Configure SR-IOV for Benetel with DPDK
  when: rru in ['benetel1', 'benetel2']
  block:
    - name: Detect Benetel E810 PCI address
      shell: lspci | grep -i "E810-C" | awk '{print $1}' | head -1
      register: benetel_pci_result
      changed_when: false

    - name: Store detected PCI address
      ansible.builtin.set_fact:
        benetel_pci_addr: "0000:{{ benetel_pci_result.stdout }}"
      when: benetel_pci_result.stdout != ""

    - name: Fail if Benetel not detected
      ansible.builtin.fail:
        msg: "Benetel E810 adapter not found"
      when: benetel_pci_result.stdout == ""

    - name: Extract root device address
      ansible.builtin.set_fact:
        benetel_root_pci: "{{ benetel_pci_addr | regex_replace('\\.[0-9a-f]$', '.1') }}"

    - name: Create SR-IOV policy with vfio-pci for DPDK
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: sriovnetwork.openshift.io/v1
          kind: SriovNetworkNodePolicy
          metadata:
            name: benetel-dpdk-policy
            namespace: sriov-network-operator
          spec:
            deviceType: vfio-pci
            isRdma: false
            linkType: eth
            mtu: 9216
            nicSelector:
              rootDevices:
                - "{{ benetel_root_pci }}"
            nodeSelector:
              feature.node.kubernetes.io/network-sriov.capable: "true"
            numVfs: 4
            priority: 99
            resourceName: benetel_ru

    #- name: Update values file with discovered PCI address
    #  ansible.builtin.shell: >
    #    {{ yq_bin_path }} eval -i '
    #      .sriov.pciAddress = "{{ benetel_pci_addr }}"
    #    ' "{{ values_file }}"

    - name: Wait for SR-IOV VF creation
      pause:
        seconds: 60

- name: Deploy srsRAN gNB using Helm
  when: not rru in ['n300', 'n320']
  kubernetes.core.helm:
    name: srsran-gnb
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsran-gnb'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    values_files:
      - "{{ values_file }}"
    state: present
    wait: False
    atomic: True
    timeout: 180s

- name: Reset ansible_python_interpreter to system python3
  ansible.builtin.set_fact:
    ansible_python_interpreter: /usr/bin/python3
