---

- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

- name: Uninstall existing srsran-gnb release if present
  shell: >
    helm list -n {{ ran_ns }} -a -q |
    grep -w "^srsran-gnb$" | wc -l
  register: gnb_release_exists
  changed_when: false
  failed_when: false

- name: Uninstall srsran-gnb
  shell: helm uninstall srsran-gnb -n {{ ran_ns }} --no-hooks
  when: gnb_release_exists.stdout | trim | int > 0
  failed_when: false

- name: Deploy srsRAN gNB (only when not rfsim)
  when: rru != 'rfsim'
  block:

    - name: Set initial retry facts
      ansible.builtin.set_fact:
        gnb_startup_success: false
        max_attempts: 2

    - name: Deploy and Monitor srsRAN gNB
      block:
        - name: "Attempt gNB deployment (Attempt {{ item }})"
          include_tasks: deploy_with_check.yml
          loop: "{{ range(1, max_attempts + 1) | list }}"
          when: not gnb_startup_success

      rescue:
        - name: Final failure message
          ansible.builtin.fail:
            msg: "gNB failed to start properly on both IP addresses."
          when: not gnb_startup_success

    - name: Confirm success
      ansible.builtin.debug:
        msg: "srsRAN gNB is running successfully!"
      when: gnb_startup_success

- name: Deploy srsRAN gNB using Helm
  when: rru == 'rfsim'
  kubernetes.core.helm:
    name: srsran-gnb
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsran-gnb'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    values_files:
      - "{{ values_file }}"
    state: present
    wait: False # True # FAlse for debug
    atomic: True
    timeout: 180s

- name: Get gNB pod name
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} get pod
    -l app=srsran,component=gnb
    -o jsonpath='{.items[0].metadata.name}'
  register: gnb_pod_name_result
  until: gnb_pod_name_result.stdout != ""
  retries: 30
  delay: 5
  changed_when: false

- name: Set gnb_pod_name fact
  ansible.builtin.set_fact:
    gnb_pod_name: "{{ gnb_pod_name_result.stdout }}"
    
- name: Wait for gNB to connect to AMF
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} exec {{ gnb_pod_name }} -c gnb-logs --
    grep -c "Connection to AMF.*was established" /var/log/gnb.log
  register: amf_connected
  until: amf_connected.stdout | int >= 1
  retries: 60
  delay: 5
  changed_when: false