---

- name: Load common variables
  include_vars:
    file: "../../common/defaults/main.yml"

- name: Uninstall existing srsran-gnb release if present
  shell: >
    helm list -n {{ ran_ns }} -a -q |
    grep -w "^srsran-gnb$" | wc -l
  register: gnb_release_exists
  changed_when: false
  failed_when: false

- name: Uninstall srsran-gnb
  shell: helm uninstall srsran-gnb -n {{ ran_ns }} --no-hooks
  when: gnb_release_exists.stdout | trim | int > 0
  failed_when: false

- name: Deploy srsRAN gNB (only when not rfsim)
  when: rru != 'rfsim'
  block:

    - name: Set initial retry facts
      ansible.builtin.set_fact:
        gnb_startup_success: false
        max_attempts: 2

    - name: Deploy and Monitor srsRAN gNB
      block:
        - name: "Attempt gNB deployment (Attempt {{ item }})"
          include_tasks: deploy_with_check.yml
          loop: "{{ range(1, max_attempts + 1) | list }}"
          when: not gnb_startup_success

      rescue:
        - name: Final failure message
          ansible.builtin.fail:
            msg: "gNB failed to start properly on both IP addresses."
          when: not gnb_startup_success

    - name: Confirm success
      ansible.builtin.debug:
        msg: "srsRAN gNB is running successfully!"
      when: gnb_startup_success

- name: Restart Open5GS AMF to clear stale gNB contexts
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ core }}"
    name: open5gs-amf
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
  when: core == 'open5gs' and rru == 'rfsim'

- name: Wait for AMF pod to be ready
  ansible.builtin.command: >
    {{ kubectl_bin }} wait --for=condition=Ready pod
    -l app=open5gs-amf
    -n {{ core_ns }}
    --timeout=60s
  changed_when: false
  when: core == 'open5gs' and rru == 'rfsim'

- name: Wait for AMF to complete SCTP initialization
  ansible.builtin.command: >
    {{ kubectl_bin }} logs
    -n {{ core_ns }}
    -l app=open5gs-amf
    -c amf
    --since=30s
  register: amf_log
  until: "'AMF initialize...done' in amf_log.stdout"
  retries: 20
  delay: 3
  changed_when: false
  when: core == 'open5gs' and rru == 'rfsim'

- name: Deploy srsRAN gNB using Helm
  when: rru == 'rfsim'
  kubernetes.core.helm:
    name: srsran-gnb
    chart_ref: "{{ [repo_dest_abs, 'charts', 'srsran-gnb'] | path_join }}"
    release_namespace: "{{ ran_ns }}"
    values_files:
      - "{{ values_file }}"
    state: present
    wait: False # True # FAlse for debug
    atomic: True
    timeout: 180s