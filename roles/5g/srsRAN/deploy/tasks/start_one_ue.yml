---
- name: "Start ue{{ item.index }} in tmux window"
  ansible.builtin.command: >
    {{ kubectl_bin }} -n {{ ran_ns }} exec {{ ue_pod_name }} --
    /bin/sh -lc "
      tmux list-windows -t ran | grep -q 'ue{{ item.index }}' \
        && tmux kill-window -t ran:ue{{ item.index }} || true;
      tmux new-window -t ran -n ue{{ item.index }} \
        'bash -lc \"/srsran/config/start_ue.sh {{ item.index }} 2>&1 | tee /var/log/ue{{ item.index }}.log\"'
    "
  changed_when: true
  failed_when: false

- name: "Sleep 20s after ue{{ item.index }}"
  ansible.builtin.pause:
    seconds: 20
    prompt: "Sleeping 20s after ue{{ item.index }} before next UE..."
  when: not is_last_ue | bool
