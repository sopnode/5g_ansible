---
# roles/5g/srsRAN/csi/tasks/main.yaml
# CSI Logger v1.0.0.18 : UL (binary per-RNTI) + DL (CSV per-RNTI)
# Flow: pod → RAN node → visualizer → plots → Duckburg → Mac

# ─────────────────────────────────────────────────────────────
# SETUP
# ─────────────────────────────────────────────────────────────

- name: CSI Logger - Initialize directories on RAN node
  block:
    - name: Create CSI output directory
      file:
        path: "/home/{{ ansible_user }}/csi_output"
        state: directory
        mode: '0755'
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Create CSI plots directory
      file:
        path: "/home/{{ ansible_user }}/csi_output/plots"
        state: directory
        mode: '0755'
      delegate_to: "{{ groups['ran_node'][0] }}"
  tags: ['csi', 'csi-setup']

- name: CSI Logger - Install Python dependencies on RAN node
  block:
    - name: Check Python packages
      command: python3 -c "import matplotlib, numpy"
      register: python_check
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Install Python packages if missing
      shell: |
        pip3 install --user matplotlib numpy 2>/dev/null || \
        pip3 install matplotlib numpy 2>/dev/null || true
      when: python_check.rc != 0
      delegate_to: "{{ groups['ran_node'][0] }}"
  tags: ['csi', 'csi-setup']

- name: CSI Logger - Copy visualizer to RAN node
  copy:
    src: csi_visualizer.py
    dest: "/home/{{ ansible_user }}/csi_output/csi_visualizer.py"
    mode: '0755'
  delegate_to: "{{ groups['ran_node'][0] }}"
  tags: ['csi', 'csi-setup']

# ─────────────────────────────────────────────────────────────
# FETCH : pod → RAN node
# ─────────────────────────────────────────────────────────────

- name: CSI Logger - Fetch CSI data from Kubernetes pod
  block:
    - name: Wait for gNB pod to be ready
      shell: |
        kubectl get pods -n {{ k8s_namespace }} \
          -l app=srsran \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo ""
      register: gnb_pod_result
      retries: 30
      delay: 2
      until: gnb_pod_result.stdout != ""
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Set gNB pod name
      set_fact:
        gnb_pod: "{{ gnb_pod_result.stdout }}"

    - name: List UL CSI files in pod
      shell: |
        kubectl exec -n {{ k8s_namespace }} {{ gnb_pod }} -c gnb \
          -- ls /tmp/csi_data_0x*.bin 2>/dev/null || echo ""
      register: ul_files_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: List DL CSI files in pod
      shell: |
        kubectl exec -n {{ k8s_namespace }} {{ gnb_pod }} -c gnb \
          -- ls /tmp/csi_dl_0x*.csv 2>/dev/null || echo ""
      register: dl_files_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Display found CSI files
      debug:
        msg: |
          UL files: {{ ul_files_result.stdout_lines | default([]) }}
          DL files: {{ dl_files_result.stdout_lines | default([]) }}

    - name: Copy UL CSI binary files from pod to RAN node
      shell: |
        for f in $(kubectl exec -n {{ k8s_namespace }} {{ gnb_pod }} -c gnb \
          -- ls /tmp/csi_data_0x*.bin 2>/dev/null); do
          fname=$(basename $f)
          kubectl cp {{ k8s_namespace }}/{{ gnb_pod }}:${f} \
            /home/{{ ansible_user }}/csi_output/${fname} -c gnb
          echo "Copied UL: ${fname}"
        done
      register: ul_copy_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Copy DL CSI CSV files from pod to RAN node
      shell: |
        for f in $(kubectl exec -n {{ k8s_namespace }} {{ gnb_pod }} -c gnb \
          -- ls /tmp/csi_dl_0x*.csv 2>/dev/null); do
          fname=$(basename $f)
          kubectl cp {{ k8s_namespace }}/{{ gnb_pod }}:${f} \
            /home/{{ ansible_user }}/csi_output/${fname} -c gnb
          echo "Copied DL: ${fname}"
        done
      register: dl_copy_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Display copy results
      debug:
        msg: |
          UL copy: {{ ul_copy_result.stdout_lines | default([]) }}
          DL copy: {{ dl_copy_result.stdout_lines | default([]) }}

    - name: List all CSI files on RAN node
      find:
        paths: "/home/{{ ansible_user }}/csi_output"
        patterns:
          - "csi_data_0x*.bin"
          - "csi_dl_0x*.csv"
      register: csi_files_on_ran
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Display CSI files on RAN node
      debug:
        msg: |
          {{ csi_files_on_ran.matched }} CSI files on RAN node:
          {% for f in csi_files_on_ran.files %}
          - {{ f.path }} ({{ (f.size / 1024) | round(1) }} KB)
          {% endfor %}

  when: csi_logger_enabled | default(false)
  tags: ['csi', 'csi-fetch']

# ─────────────────────────────────────────────────────────────
# VISUALIZE : generate plots on RAN node
# ─────────────────────────────────────────────────────────────

- name: CSI Logger - Generate UL plots (per RNTI)
  block:
    - name: Find UL binary files
      find:
        paths: "/home/{{ ansible_user }}/csi_output"
        patterns: "csi_data_0x*.bin"
      register: ul_bin_files
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Generate UL plots for each RNTI
      shell: |
        python3 /home/{{ ansible_user }}/csi_output/csi_visualizer.py \
          {{ item.path }} \
          --output /home/{{ ansible_user }}/csi_output/plots \
          --slot {{ csi_plot_slot | default(0) }} \
          --prb  {{ csi_plot_prb  | default(0) }}
      loop: "{{ ul_bin_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: ul_viz_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Display UL visualizer output
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ ul_viz_result.results }}"
      loop_control:
        label: "{{ item.item.path | basename }}"
      when: ul_viz_result.results is defined

  when:
    - csi_logger_enabled | default(false)
    - csi_files_on_ran.matched | default(0) | int > 0
  tags: ['csi', 'csi-visualize']

- name: CSI Logger - Generate DL plots (per RNTI)
  block:
    - name: Find DL CSV files
      find:
        paths: "/home/{{ ansible_user }}/csi_output"
        patterns: "csi_dl_0x*.csv"
      register: dl_csv_files
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Generate DL plots for each RNTI
      shell: |
        python3 /home/{{ ansible_user }}/csi_output/csi_visualizer.py \
          {{ item.path }} \
          --dl \
          --output /home/{{ ansible_user }}/csi_output/plots
      loop: "{{ dl_csv_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: dl_viz_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Display DL visualizer output
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ dl_viz_result.results }}"
      loop_control:
        label: "{{ item.item.path | basename }}"
      when: dl_viz_result.results is defined

    - name: Generate DL multi-UE overview plot
      shell: |
        python3 /home/{{ ansible_user }}/csi_output/csi_visualizer.py \
          --dl-dir /home/{{ ansible_user }}/csi_output \
          --output  /home/{{ ansible_user }}/csi_output/plots
      register: dl_multi_result
      failed_when: false
      delegate_to: "{{ groups['ran_node'][0] }}"
      when: dl_csv_files.matched | int > 1

    - name: Display multi-UE plot result
      debug:
        msg: "{{ dl_multi_result.stdout_lines }}"
      when:
        - dl_csv_files.matched | int > 1
        - dl_multi_result is defined

  when:
    - csi_logger_enabled | default(false)
    - csi_files_on_ran.matched | default(0) | int > 0
  tags: ['csi', 'csi-visualize']

- name: CSI Logger - Verify generated plots
  block:
    - name: Find all generated PNG files
      find:
        paths: "/home/{{ ansible_user }}/csi_output/plots"
        patterns: "*.png"
      register: all_plots
      delegate_to: "{{ groups['ran_node'][0] }}"

    - name: Display plot summary
      debug:
        msg: |
          ✅ Generated {{ all_plots.matched }} plots:
          {% for f in all_plots.files | sort(attribute='path') %}
          - {{ f.path | basename }}
          {% endfor %}
  when: csi_logger_enabled | default(false)
  tags: ['csi', 'csi-visualize']

# ─────────────────────────────────────────────────────────────
# COPY : RAN node → Duckburg
# ─────────────────────────────────────────────────────────────

- name: CSI Logger - Copy results to Duckburg
  block:
    - name: Create local LOGS directory on Duckburg
      file:
        path: "{{ playbook_dir }}/LOGS/csi"
        state: directory
        recurse: yes
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Sync plots and CSV from RAN node to Duckburg
      synchronize:
        src: "/home/{{ ansible_user }}/csi_output/"
        dest: "{{ playbook_dir }}/LOGS/csi/"
        mode: pull
        delete: no
        rsync_opts:
          - "--include=plots/"
          - "--include=plots/*.png"
          - "--include=*.csv"
          - "--include=csi_visualizer.py"
          - "--exclude=*.bin"
          - "--exclude=*"
      delegate_to: localhost

    - name: Find files copied to Duckburg
      find:
        paths: "{{ playbook_dir }}/LOGS/csi"
        patterns:
          - "*.png"
          - "*.csv"
        recurse: yes
      register: duckburg_files
      delegate_to: localhost

    - name: Display results on Duckburg
      debug:
        msg: |
          ✅ CSI results on Duckburg ({{ duckburg_files.matched }} files):
          {% for f in duckburg_files.files | sort(attribute='path') %}
          - {{ f.path | replace(playbook_dir + '/LOGS/csi/', '') }}
          {% endfor %}

          📥 To fetch to your Mac:
          scp -P 10022 -r turletti@duckburg.net.in.tum.de:{{ playbook_dir }}/LOGS/csi ~/Downloads/

  when: csi_logger_enabled | default(false)
  tags: ['csi', 'csi-copy']

# ─────────────────────────────────────────────────────────────
# SUMMARY
# ─────────────────────────────────────────────────────────────

- name: CSI Logger - Summary
  debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════╗
      ║         CSI VISUALIZATION COMPLETE - v1.0.0.18              ║
      ║                                                              ║
      ║  UL plots (per RNTI):                                        ║
      ║    ul_magnitude_slot*_prb*.png                               ║
      ║    ul_phase_slot*_prb*.png                                   ║
      ║    ul_constellation_slot*_prb*.png                           ║
      ║    ul_heatmap_slot*.png                                      ║
      ║    ul_timeline_prb*.png                                      ║
      ║                                                              ║
      ║  DL plots (per RNTI):                                        ║
      ║    dl_cqi_<rnti>.png       ← CQI timeline                   ║
      ║    dl_ri_<rnti>.png        ← RI timeline                    ║
      ║    dl_cqi_hist_<rnti>.png  ← CQI histogram                  ║
      ║    dl_cqi_ri_<rnti>.png    ← CQI+RI combined                ║
      ║    dl_cqi_all_ues.png      ← multi-UE overview              ║
      ║                                                              ║
      ║  DL CSV data (per RNTI):                                     ║
      ║    csi_dl_0x<rnti>.csv                                       ║
      ║                                                              ║
      ║  Location: {{ playbook_dir }}/LOGS/csi/
      ╚══════════════════════════════════════════════════════════════╝
  tags: ['csi', 'csi-copy']

# ─────────────────────────────────────────────────────────────
# CLEANUP (optional)
# ─────────────────────────────────────────────────────────────

- name: CSI Logger - Cleanup
  block:
    - name: Remove CSI files from pod
      shell: |
        kubectl exec -n {{ k8s_namespace }} {{ gnb_pod }} -c gnb \
          -- rm -f /tmp/csi_data_0x*.bin /tmp/csi_dl_0x*.csv /tmp/csi_debug.log
      delegate_to: "{{ groups['ran_node'][0] }}"
      when: csi_cleanup_remote | default(false)

    - name: Remove CSI binaries from RAN node (keep plots and CSV)
      find:
        paths: "/home/{{ ansible_user }}/csi_output"
        patterns: "*.bin"
      register: bin_files
      delegate_to: "{{ groups['ran_node'][0] }}"
      when: csi_cleanup_ran_binary | default(false)

    - name: Delete binary files from RAN node
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ bin_files.files | default([]) }}"
      delegate_to: "{{ groups['ran_node'][0] }}"
      when: csi_cleanup_ran_binary | default(false)
  tags: ['csi', 'csi-cleanup']