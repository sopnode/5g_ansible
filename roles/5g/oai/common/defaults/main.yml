---
dir_oai: "{{ ansible_env.HOME }}/oai"
repo_dest: "{{ dir_oai }}/oai5g-rru"
prefix_oai5g: "sopnode/oai5g-rru"
repo_oai5g_rru: "https://github.com/{{ prefix_oai5g }}.git"
tag_oai5g_rru: "ovs" # "main"

repo_oai_cn5g_fed: "https://gitlab.eurecom.fr/turletti/charts.git"
tag_oai_cn5g_fed: "main"

conf: "{{ hostvars[groups['faraday'][0]].conf }}"
prepare_demo_script: "{{ dir_oai }}/prepare-demo-oai.sh"
demo_oai_script: "{{ dir_oai }}/demo-oai.sh"
charts_base: "{{ repo_dest }}/charts"

yq_version: "v4.45.1"
yq_bin_path: "/usr/local/bin/yq"
yq_url: "https://github.com/mikefarah/yq/releases/download/{{ yq_version }}/yq_linux_amd64"
