---
# CSI Logging Visualization Setup
# WARNING: OAI must be built with CSI patches and libcsi_logging already linked
# This role only sets up the Python visualization environment

- name: Create CSI output directory
  file:
    path: "/data/csi"
    state: directory
    mode: '0777'
  become: true

- name: Copy CSI visualization script
  copy:
    src: csi_visualizer_oai.py
    dest: "/usr/local/bin/csi_visualizer_oai.py"
    mode: '0755'
  become: true

- name: Install Python dependencies for CSI visualization
  package:
    name:
      - python3-numpy
      - python3-matplotlib
    state: present
  become: true

- name: Create convenience symlink
  file:
    src: /usr/local/bin/csi_visualizer_oai.py
    dest: /usr/local/bin/csi_viz
    state: link
  become: true
  ignore_errors: true

- name: CSI visualization configured
  debug:
    msg: |
      CSI visualization ready
      Usage: csi_visualizer_oai.py /data/csi/csi_per_rb.csv
      Or:    csi_viz /data/csi/csi_per_rb.csv --realtime
