---
# Run Uplink test on UE
- name: Debug iPerf parameters
  debug:
    msg: |
      UE: {{ current_ue }}
      Bind IP: {{ ue_ip }}
      Server IP: {{ target_server }}
      Port: {{ iperf_port }}
      Duration: {{ duration }}s

- name: Run iperf tests from {{ current_ue }} via faraday
  shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ current_ue }} \
    "mkdir -p {{ log_dir }} &&
    (nohup /usr/local/bin/snmp_stats.sh {{ duration }} {{ log_dir }}/snmp.log > /dev/null 2>&1 &) &&
    iperf3 -p {{ iperf_port }} -B {{ ue_ip }} -c {{ target_server }} -t {{ duration }} -J --get-server-output {{ extra_args }} > {{ log_dir }}/iperf.json 2>&1 &&
    sleep {{ sleep }}"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: ue_ip is defined and ue_ip != ""
  loop: "{{ iperf_scenarios }}"
  loop_control:
    loop_var: scenario
  vars:
    direction: "{{ scenario.direction }}"
    protocol: "{{ scenario.protocol }}"
    extra_args: "{{ scenario.extra_args }}"
    log_dir: "/tmp/iperf_logs/protocol={{ protocol }}/ue_count=1/direction={{ direction }}"
