---
# Run Uplink test on UE
- name: Debug iPerf parameters (async)
  debug:
    msg: |
      UE List: {{ valid_ue_list }}
      IP List: {{ ue_ips }}
      Server IP: {{ target_server }}
      Duration: {{ duration }}s
      Extra Args: {{ extra_args }}

- name: Run iperf tests from {{ current_ue }}
  shell: >
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ current_ue }}
    "mkdir -p {{ log_dir }} &&
    sleep {{ pre_sleep }} &&
    nohup /usr/local/bin/snmp_stats.sh {{ test_duration }} {{ log_dir }}/snmp.log > /dev/null 2>&1 &
    iperf3 -p {{ iperf_port }} -B {{ ue_ip }} -c {{ target_server }} -t {{ test_duration }} -J --get-server-output {{ extra_args }} > {{ log_dir }}/iperf.json"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: ue_ip is defined and ue_ip != ""
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
    index_var: ue_index
  vars:
    ue_ip: "{{ ue_ips[current_ue] }}"
    iperf_port: "{{ 5201 + ue_index }}"
    pre_sleep: "{{ async_stagger * ue_index }}"
    test_duration: "{{ (duration | int) - (pre_sleep | int) }}"
    log_dir: "/tmp/iperf_logs/protocol={{ protocol }}/ue_count={{ ue_count }}/direction={{ direction }}"
  async: "{{ (duration | int) + 30 }}"
  poll: 0
  register: iperf_jobs

- name: Wait for async jobs to finish
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  loop: "{{ iperf_jobs.results }}"
  loop_control:
    label: "{{ item.ansible_job_id }}"
  retries: "{{ (duration | int * 2) // 2 }}"
  delay: 2

- name: Cleanup async job files
  async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  loop: "{{ iperf_jobs.results }}"

- pause:
    seconds: "{{ sleep }}"