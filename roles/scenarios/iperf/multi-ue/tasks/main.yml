---
- name: Define variables
  set_fact:
    tcp_bandwidth: "0" # 0 == unlimited
    udp_bandwidth: "100M"

- name: Define iperf_scenarios
  set_fact:
    iperf_scenarios:
      - {protocol: "tcp", direction: "up", extra_args: "-b {{ tcp_bandwidth }}"}
      - {protocol: "tcp", direction: "down", extra_args: "-b {{ tcp_bandwidth }} -R"}
      - {protocol: "udp", direction: "up", extra_args: "-u -b {{ udp_bandwidth }}"}
      - {protocol: "udp", direction: "down", extra_args: "-u -b {{ udp_bandwidth }} -R"}

- name: Set defaults and initialize ue_ips dictionary
  set_fact:
    ue_ips: {}
    ignore_task_errors: true
    target_server: "{{ target_server_ip | default(hostvars[groups['core_node'][0]].ip) }}"
    duration: "{{ iperf_duration | default(30) }}"
    sleep: "{{ iperf_sleep | default(5) }}"

- name: Define timestamp
  set_fact:
    timestamp: "{{ '%Y-%m-%d-%H-%M-%S' | strftime(ansible_date_time.epoch) }}"

- name: Define results path
  set_fact:
    results_dir: "{{ playbook_dir }}/../results/{{ timestamp }}"

- name: Connect all qhat UEs sequentially
  include_tasks: connect_ue.yml
  loop: "{{ groups['qhats'] }}"
  loop_control:
    loop_var: current_ue
    index_var: ue_index
  vars:
    iperf_port: "{{ 5201 + ue_index }}"
    ignore_task_errors: true

- name: Filter out UEs without IP
  set_fact:
    valid_ue_list: >-
      {{
        groups['qhats']
        | select('in', ue_ips.keys())
        | list
      }}
  register: ue_filter_result

- name: Warn about UEs without IP
  debug:
    msg: "Warning: UE {{ item }} has no IP and will be skipped in iperf tests"
  loop: "{{ groups['qhats'] | difference(valid_ue_list) }}"
  when: (groups['qhats'] | difference(valid_ue_list)) | length > 0

- name: Create local log directories
  ansible.builtin.file:
    path: "{{ results_dir }}/ue={{ current_ue }}/"
    state: directory
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
  delegate_to: localhost

- name: Copy inventory file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../inventory/default/hosts.ini"
    dest: "{{ results_dir }}/hosts.ini"
  delegate_to: localhost

- name: Execute iperf tests for all connected UEs individually
  include_tasks: iperf_execution.yml
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
    index_var: ue_index
  vars:
    ue_count: 1
    ue_ip: "{{ ue_ips[current_ue] }}"
    iperf_port: "{{ 5201 + ue_index }}"
    # duration: "{{ iperf_duration | default(30) }}"
    ignore_task_errors: true
    # sleep: 2

- name: Execute iperf tests for all connected UEs simultaneously
  include_tasks: iperf_execution_async.yml
  loop: "{{ iperf_scenarios }}"
  loop_control:
    loop_var: scenario
  vars:
    ue_count: "{{ valid_ue_list|length }}"
    direction: "{{ scenario.direction }}"
    protocol: "{{ scenario.protocol }}"
    extra_args: "{{ scenario.extra_args }}"
    # duration: "{{ iperf_duration | default(30) }}"
    ignore_task_errors: true
    # sleep: 2

- name: Archive logs
  community.general.archive:
    path: /tmp/iperf_logs/
    dest: /tmp/iperf_logs.tar.gz
    format: gz
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
  delegate_to: "{{ current_ue }}"

- name: Fetch archived logs
  ansible.builtin.fetch:
    src: /tmp/iperf_logs.tar.gz
    dest: "{{ results_dir }}/{{ current_ue }}_logs.tar.gz"
    flat: yes
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
  delegate_to: "{{ current_ue }}"

- name: Extract logs locally
  ansible.builtin.unarchive:
    src: "{{ results_dir }}/{{ current_ue }}_logs.tar.gz"
    dest: "{{ results_dir }}/ue={{ current_ue }}/"
    remote_src: false
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
  delegate_to: localhost

- name: Remove archive after extraction
  ansible.builtin.file:
    path: "{{ results_dir }}/{{ current_ue }}_logs.tar.gz"
    state: absent
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
  delegate_to: localhost