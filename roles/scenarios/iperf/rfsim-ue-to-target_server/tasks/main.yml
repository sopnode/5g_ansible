---
- name: Set defaults
  set_fact:
    duration: "{{ iperf_duration | default(30) }}"
    sleep: "{{ iperf_sleep | default(5) }}"
    # Use target_server_ip if provided, else core_node IP
    target_server: "{{ target_server_ip | default(hostvars[groups['core_node'][0]].ip) }}"
    target_server_name: "{{ target_server_host | default(hostvars[groups['core_node'][0]]) }}"
    core_ns: "{{ core }}"
    valid_ues: []
    free5gc_srsran: "{{ core == 'free5gc' and ran == 'srsRAN' }}"
    open5gs_srsran: "{{ core == 'open5gs' and ran == 'srsRAN' }}"
    oai_srsran: "{{ core == 'oai' and ran == 'srsRAN' }}"
    single_pod_srsran: "{{ (core == 'free5gc' or core == 'open5gs') and ran == 'srsRAN' }}"
    ue_name: >-
      {{ 'srsran-ue-srsran-ue' if ran == 'srsRAN'
         else 'oai-nr-ue' if ran == 'oai'
         else 'ueransim-ue' }}
    tun_name: >-
      {{ 'tun_srsue1' if ran == 'srsRAN'
         else 'oaitun_ue1' if ran == 'oai'
         else 'uesimtun0' }}

- name: Detect N3 interface
  shell: "ip link show n3br >/dev/null 2>&1 && echo n3br || echo cbr0"
  register: n3_dev_detect
  changed_when: false

- name: Set N3 device
  set_fact:
    n3_dev: "{{ n3_dev_detect.stdout }}"

- name: Load active 5G profile
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
    name: fiveg
  when: open5gs_srsran | bool

- name: Display RFSIM iperf configuration
  debug:
    msg: |
      ✓ RFSIM UE-to-Server Configuration:
        Target Server IP: {{ target_server }}
        Core Namespace: {{ core_ns }}
        RAN: {{ ran }}
        Duration: {{ duration }}s
        Sleep: {{ sleep }}s

# ============================================================
# Get UE pods
# ============================================================

- name: Get all pods in namespace
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ core_ns }}"
  register: all_pods

- name: Filter UE pods by name
  set_fact:
    ue_resources: "{{ all_pods.resources | selectattr('metadata.name', 'search', '^' + ue_name) | list }}"

# ============================================================
# Install iperf3 (on all UE pods)
# ============================================================

- name: Force Install iperf3 (YUM then APT)
  shell: |
    kubectl exec -n {{ core_ns }} {{ item.metadata.name }} -- bash -c "
    if ! command -v iperf3 &> /dev/null; then
      if command -v yum &> /dev/null; then
        yum install -y -q iperf3 iproute
      elif command -v apt-get &> /dev/null; then
        apt-get update -qq && apt-get install -y -qq iperf3 iproute2
      else
        echo 'No package manager found' && exit 1
      fi
    fi
    command -v iperf3"
  loop: "{{ ue_resources }}"
  loop_control:
    label: "Installing iperf3 on {{ item.metadata.name }}"
  register: install_check
  failed_when: install_check.rc != 0

# ============================================================
# Build valid_ues - free5gc+srsRAN
# ============================================================

- name: Get tun IPs from single UE pod (free5gc+srsRAN)
  shell: |
    kubectl exec -n {{ core_ns }} {{ ue_resources[0].metadata.name }} -- bash -c "
    for i in \$(seq 1 {{ nb_ues }}); do
      ip -4 addr show tun_srsue\${i} 2>/dev/null \
        | awk -v tun=\"tun_srsue\${i}\" '/inet / {print tun, \$2}'
    done"
  register: free5gc_tun_raw
  changed_when: false
  when: free5gc_srsran | bool

- name: Build valid_ues (free5gc+srsRAN)
  set_fact:
    valid_ues: "{{ valid_ues + [{'pod': ue_resources[0].metadata.name,
                                 'ip': item.split()[1] | regex_replace('/.*', ''),
                                 'tun': item.split()[0]}] }}"
  loop: "{{ free5gc_tun_raw.stdout_lines | default([]) }}"
  when:
    - free5gc_srsran | bool
    - item | trim != ''

# ============================================================
# Build valid_ues - open5gs+srsRAN
# ============================================================

- name: Get tun IPs from single UE pod (open5gs+srsRAN)
  shell: |
    kubectl exec -n {{ core_ns }} {{ ue_resources[0].metadata.name }} -- bash -c "
    for i in \$(seq 1 {{ nb_ues }}); do
      ip -4 addr show tun_srsue\${i} 2>/dev/null \
        | awk -v tun=\"tun_srsue\${i}\" '/inet / {print tun, \$2}'
    done"
  register: open5gs_tun_raw
  changed_when: false
  when: open5gs_srsran | bool

- name: Build valid_ues (open5gs+srsRAN)
  set_fact:
    valid_ues: "{{ valid_ues + [{
      'pod': ue_resources[0].metadata.name,
      'ip': item.split()[1] | regex_replace('/.*', ''),
      'tun': item.split()[0],
      'slice': fiveg.ues['uesim01'].slice if item.split()[0] == 'tun_srsue1'
               else fiveg.ues['uesim02'].slice if item.split()[0] == 'tun_srsue2'
               else fiveg.ues['uesim03'].slice
    }] }}"
  loop: "{{ open5gs_tun_raw.stdout_lines | default([]) }}"
  when:
    - open5gs_srsran | bool
    - item | trim != ''

# ============================================================
# Configure MTU and routes
# ============================================================

- name: Configure UE MTU to 1350
  shell: |
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- \
    ip link set dev {{ item.tun }} mtu 1350
  loop: "{{ valid_ues }}"
  loop_control:
    label: "Setting MTU 1350 on {{ item.pod }} ({{ item.tun }})"
  failed_when: false


# ============================================================
# OAI ROUTING
# ============================================================

- name: Add UE/UPF routing on iperf target node
  become: true
  shell: |
    ip route replace 12.1.0.0/16 via 192.168.3.202
  when: oai_srsran | bool
  delegate_to: "{{ target_server_name }}"
  
# ============================================================
# OPEN5GS ROUTING
# ============================================================

- name: UPF + slice routing configuration (open5gs + srsRAN)
  block:

    - name: Define UPF mapping (open5gs+srsRAN)
      set_fact:
        upf_map:
          upf1:
            ip: "10.10.3.1"
          upf2:
            ip: "10.10.3.2"

    - name: Build slice-to-UPF mapping
      set_fact:
        slice_upf_map:
          slice1: upf1
          slice2: upf2

    - name: Add routes to UPFs via N3 device
      become: true
      shell: |
        ip route add {{ item.ip }} dev {{ n3_dev }} 2>/dev/null || true
      loop:
        - "{{ upf_map.upf1 }}"
        - "{{ upf_map.upf2 }}"
      delegate_to: "{{ target_server_name }}"

    - name: Add UE routes per slice via correct UPF
      become: true
      shell: |
        ip route add {{ item.ip }} via {{ upf_map[slice_upf_map[item.slice]].ip }} dev {{ n3_dev }} 2>/dev/null || true
      loop: "{{ valid_ues }}"
      delegate_to: "{{ target_server_name }}"

    - name: Add routes for UE subnet per slice via correct UPF
      become: true
      shell: |
        ip route add {{ item.ip_prefix }}.0/24 via {{ upf_map[slice_upf_map[item.name]].ip }} dev {{ n3_dev }} 2>/dev/null || true
      loop: "{{ fiveg.slices }}"
      delegate_to: "{{ target_server_name }}"

  when: open5gs_srsran | bool

# ============================================================
# iperf uplink
# ============================================================

- name: Run iperf uplink with temporary UE route
  shell: |
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- ip route add {{ target_server }} dev {{ item.tun }} 2>/dev/null || true
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- iperf3 -B {{ item.ip }} -c {{ target_server }} -p {{ 5201 + idx }} -t {{ duration }}
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- ip route del {{ target_server }} dev {{ item.tun }} 2>/dev/null || true
  loop: "{{ valid_ues }}"
  loop_control:
    index_var: idx
  ignore_errors: yes
  when: open5gs_srsran | bool

- name: Run iperf uplink
  shell: >
    kubectl exec -n {{ core_ns }} {{ item.pod }} --
    iperf3 -B {{ item.ip }}
    -c {{ target_server }}
    -p {{ 5201 + idx }}
    -t {{ duration }}
  loop: "{{ valid_ues }}"
  loop_control:
    index_var: idx
  ignore_errors: yes
  when: not open5gs_srsran | bool

- pause:
    seconds: 1

# ============================================================
# iperf downlink
# ============================================================

- name: Run iperf downlink with temporary UE route
  shell: |
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- ip route add {{ target_server }} dev {{ item.tun }} 2>/dev/null || true
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- iperf3 -B {{ item.ip }} -c {{ target_server }} -p {{ 5201 + idx }} -t {{ duration }} -R
    kubectl exec -n {{ core_ns }} {{ item.pod }} -- ip route del {{ target_server }} dev {{ item.tun }} 2>/dev/null || true
  loop: "{{ valid_ues }}"
  loop_control:
    index_var: idx
  ignore_errors: yes
  when: open5gs_srsran | bool

- name: Run iperf downlink
  shell: >
    kubectl exec -n {{ core_ns }} {{ item.pod }} --
    iperf3 -B {{ item.ip }}
    -c {{ target_server }}
    -p {{ 5201 + idx }}
    -t {{ duration }} -R
  loop: "{{ valid_ues }}"
  loop_control:
    index_var: idx
  ignore_errors: yes
  when: not open5gs_srsran | bool
