---
- name: Include 5G profile variables
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
    name: fiveg

- name: Reset per-UE resolved IP
  set_fact:
    resolved_ue_ip: ""
    
- name: Detect whether this UE is a phone
  set_fact:
    is_phone: "{{ current_ue in (groups['phones'] | default([])) }}"

- name: "Get UPF IP for a specific UE"
  set_fact:
    upf_ip: >-
      {{
        (fiveg.slices
         | selectattr('name', 'equalto', fiveg.ues[current_ue].slice)
         | first).ip_prefix
      }}.1

- name: "Debug: Show UPF IP for current UE"
  debug:
    msg: "UE {{ current_ue }} → UPF IP = {{ upf_ip }}"

- name: Connect UE {{ current_ue }} to 5G network
  include_role:
    name: r2lab/ue/connect
  vars:
    ue_item: "{{ current_ue }}"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"


- name: "Phone post-connect: retrieve UE IP for {{ current_ue }}"
  when: is_phone
  block:
    - name: "Phone: resolve adb / ssh params + slice prefix for {{ current_ue }}"
      set_fact:
        phone_ssh: "{{ hostvars[current_ue].ansible_user | default('tester') }}@{{ hostvars[current_ue].ansible_host | default(current_ue) }}"
        adb_bin: "{{ hostvars[current_ue].adb_bin | default('adb') }}"
        adb_opts: "{{ ('-s ' ~ hostvars[current_ue].serial) if (hostvars[current_ue].serial is defined and (hostvars[current_ue].serial | string | length) > 0) else '' }}"
        ue_subnet_prefix: "{{ ((upf_ip | trim).split('.')[:-1]) | join('.') }}"

    - name: "Phone: wait for a cellular IPv4 in {{ ue_subnet_prefix }}.x on {{ current_ue }}"
      shell: >
        ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i /home/faraday/r2lab-embedded/mac-ssh-keys/macphone
        {{ phone_ssh }}
        '{{ adb_bin }} {{ adb_opts }} shell ip -o -4 addr show'
      register: phone_addr
      until: phone_addr.stdout is search('inet ' ~ (ue_subnet_prefix | regex_escape) ~ '.[0-9]+')
      retries: 15
      delay: 4
      changed_when: false
      ignore_errors: "{{ ignore_task_errors | default(false) }}"

    - name: "Phone: extract UE IP for {{ current_ue }}"
      set_fact:
        resolved_ue_ip: >-
          {{ (phone_addr.stdout
              | regex_search('inet ' ~ (ue_subnet_prefix | regex_escape) ~ '.[0-9]+'))
             | default('', true)
             | regex_replace('^inet ', '') }}

    - name: "Phone: report resolved IP for {{ current_ue }}"
      debug:
        msg: >-
          Phone {{ current_ue }} -> UE IP={{ resolved_ue_ip | default('NONE', true) }}
          (non-rooted phone, cannot add static route but ok since Android has already a route to {{ target_server }} )

- name: "Quectel post-connect for {{ current_ue }}"
  when: not is_phone
  block:
    - name: Retrieve wwan0 IP for {{ current_ue }}
      shell: |
        ssh -o ConnectTimeout=5 -o BatchMode=yes root@{{ current_ue }} \
        "ip -4 addr show wwan0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'"
      register: ue_ip_cmd
      until: ue_ip_cmd.stdout != ""
      retries: 5
      delay: 2
      changed_when: false
      ignore_errors: "{{ ignore_task_errors | default(false) }}"

    - name: Wait until wwan0 interface is fully up
      shell: ssh root@{{ current_ue }} "ip link show wwan0"
      register: wwan0_status
      retries: 10
      delay: 2
      until: "'UP' in wwan0_status.stdout"
      changed_when: false

    - name: Add route to {{ target_server }} via UPF IP when wwan0 is ready
      shell: |
        ssh -o BatchMode=yes root@{{ current_ue }} "
            ip route replace {{ upf_ip }} dev wwan0 &&
            ip route replace {{ target_server }} via {{ upf_ip }} &&
            ip route get {{ target_server }}
        "
      changed_when: false
      ignore_errors: true

    - name: "Quectel: set resolved IP for {{ current_ue }}"
      set_fact:
        resolved_ue_ip: "{{ ue_ip_cmd.stdout }}"


- name: Build dict ue_ips
  set_fact:
    ue_ips: "{{ ue_ips | default({}) | combine({ current_ue: resolved_ue_ip }) }}"
  when: resolved_ue_ip | default('') | length > 0
