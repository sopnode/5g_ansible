---
# Run Uplink test on UE
- name: Debug nuttcp parameters
  debug:
    msg: |
      UE: {{ current_ue }}
      Bind IP: {{ ue_ip }}
      Server IP: {{ target_server }}
      Data Port: {{ nuttcp_data_port }}
      Control Port: {{ nuttcp_control_port }}
      Duration: {{ duration }}s

- name: Run nuttcp tests from {{ current_ue }} via faraday
  shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ current_ue }} \
    "mkdir -p {{ log_dir }} &&
    (nohup /usr/local/bin/snmp_stats.sh {{ duration }} {{ log_dir }}/snmp.log > /dev/null 2>&1 &) &&
    /usr/bin/nuttcp -p {{ nuttcp_data_port }} -P {{ nuttcp_control_port }} -T {{ duration }} -i {{ extra_args }} {{ target_server }} > {{ log_dir }}/nuttcp.log 2>&1 &&
    sleep {{ sleep }}"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: ue_ip is defined and ue_ip != ""
  loop: "{{ nuttcp_scenarios }}"
  loop_control:
    loop_var: scenario
  vars:
    direction: "{{ scenario.direction }}"
    protocol: "{{ scenario.protocol }}"
    extra_args: "{{ scenario.extra_args }}"
    log_dir: "/tmp/nuttcp_logs/protocol={{ protocol }}/ue_count=1/direction={{ direction }}"
