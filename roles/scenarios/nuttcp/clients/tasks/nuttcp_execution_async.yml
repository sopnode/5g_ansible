---
# Run Uplink test on UE
- name: Debug nuttcp parameters (async)
  debug:
    msg: |
      UE List: {{ valid_ue_list }}
      IP List: {{ ue_ips }}
      Server IP: {{ target_server }}
      Duration: {{ duration }}s
      Extra Args: {{ extra_args }}

- name: Run nuttcp tests from {{ current_ue }} via faraday
  shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ current_ue }} \
    "mkdir -p {{ log_dir }} && sleep {{ pre_sleep }} && /usr/bin/nuttcp -p {{ nuttcp_data_port }} -P {{ nuttcp_control_port }} -T {{ (duration | int) - (pre_sleep | int) }} -i {{ extra_args }} {{ target_server }} > {{ log_dir }}/nuttcp.log"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: ue_ip is defined and ue_ip != ""
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
    index_var: ue_index
  async: "{{ (duration | int) + 30 }}"
  poll: 0
  register: nuttcp_jobs
  vars:
    ue_ip: "{{ ue_ips[current_ue] }}"
    nuttcp_data_port: "{{ 5000 + ue_index }}"
    nuttcp_control_port: "{{ 5500 + ue_index }}"
    pre_sleep: "{{ async_stagger * ue_index }}"
    log_dir: "/tmp/nuttcp_logs/protocol={{ protocol }}/ue_count={{ valid_ue_list|length }}/direction={{ direction }}"

- name: Wait for async jobs to finish
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  loop: "{{ nuttcp_jobs.results }}"
  loop_control:
    label: "{{ item.ansible_job_id }}"
  retries: "{{ (duration | int * 2) // 2 }}"
  delay: 2

- name: Cleanup async job files
  async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  loop: "{{ nuttcp_jobs.results }}"

- pause:
    seconds: "{{ sleep }}"