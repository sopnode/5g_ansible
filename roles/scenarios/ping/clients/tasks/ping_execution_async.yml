---
# Run Uplink test on UE
- name: Debug Ping parameters (async)
  debug:
    msg: |
      UE List: {{ valid_ue_list }}
      IP List: {{ ue_ips }}
      Server IP: {{ target_server }}
      Duration: {{ duration }}s
      Extra Args: {{ extra_args }}

- name: Run ping tests from {{ current_ue }} via faraday
  shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ current_ue }} \
    "mkdir -p {{ log_dir }} && sleep {{ pre_sleep }} && nohup /usr/local/bin/snmp_stats.sh {{ test_duration }} {{ log_dir }}/snmp.log > /dev/null 2>&1 & ping {{ target_server }} -I {{ ue_ip }} -4 -n -O -D -w {{ test_duration }} {{ extra_args }} > {{ log_dir }}/ping.log 2>&1"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: ue_ip is defined and ue_ip != ""
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
    index_var: ue_index
  async: "{{ (duration | int) + 30 }}"
  poll: 0
  register: ping_jobs
  vars:
    pre_sleep: "{{ async_stagger * ue_index }}"
    ue_ip: "{{ ue_ips[current_ue] }}"
    log_dir: "/tmp/ping_logs/protocol=ICMP/ue_count={{ ue_count }}/packet_size={{ packet_size }}"
    test_duration: "{{ (duration | int) - (pre_sleep | int) }}"

- name: Wait for async jobs to finish
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  loop: "{{ ping_jobs.results }}"
  loop_control:
    label: "{{ item.ansible_job_id }}"
  retries: "{{ (duration | int * 2) // 2 }}"
  delay: 2

- name: Cleanup async job files
  async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  loop: "{{ ping_jobs.results }}"

- pause:
    seconds: "{{ sleep }}"
