---
# ue stands for the UE name, defined in the inventory.
# mode (mbim|qmi) comes from the inventory host vars; defaults to mbim.

- name: Resolve UE connection mode
  set_fact:
    ue_mode: "{{ hostvars[ue].mode | default('mbim') }}"

# ---------------------------------------------------------------------------
# MBIM stop
# ---------------------------------------------------------------------------
- name: "MBIM: stop UE {{ ue }} via jump host"
  shell: ssh root@{{ ue }} 'stop.sh'
  delegate_to: faraday.inria.fr
  when: ue_mode == 'mbim'
  ignore_errors: true

# ---------------------------------------------------------------------------
# QMI stop: detach the modem (AT port /dev/ttyUSB2), independent of quectel-CM.
# ---------------------------------------------------------------------------
- name: "QMI: detach UE {{ ue }} via jump host"
  shell: ssh root@{{ ue }} 'python3 /usr/local/bin/ci_ctl_qtel.py /dev/ttyUSB2 detach'
  delegate_to: faraday.inria.fr
  when: ue_mode == 'qmi'
  ignore_errors: true

