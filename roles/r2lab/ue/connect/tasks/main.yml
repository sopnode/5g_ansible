---
# ue_item stands for the UE name, defined in the inventory.
# mode (mbim|qmi) comes from the inventory host vars; defaults to mbim.
#
# Every connectable UE (Quectel or phone) MUST be declared in fiveg.ues, so a
# single profile-presence gate covers both. Phones (hosts in the [phones]
# group) are handled by a dedicated sub-branch: the SSH target IS the Mac the
# handset is tethered to (ansible_host=macphoneN), and "connecting" the UE just
# means turning airplane mode OFF over adb. APN/RAT are not set here.

- name: START_UE_CONNECT
  ansible.builtin.meta: noop
  
- name: Load active 5G profile variables
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"
    name: fiveg

- name: Resolve UE connection mode
  set_fact:
    ue_mode: "{{ hostvars[ue_item].mode | default('mbim') }}"

- name: Detect whether this UE is a phone
  set_fact:
    is_phone: "{{ ue_item in (groups['phones'] | default([])) }}"

- name: "Skip {{ ue_item }} (not in 5G profile)"
  debug:
    msg: "UE {{ ue_item }} is not in fiveg.ues - skipping connect."
  when: fiveg.ues[ue_item] is not defined

- name: "Connect UE {{ ue_item }}"
  when: fiveg.ues[ue_item] is defined
  block:
    # --- Shared profile resolution (used by both branches) ---------------
    - name: Extract UE slice
      set_fact:
        current_ue_slice: "{{ fiveg.ues[ue_item].slice }}"

    - name: Extract DNN for slice
      set_fact:
        current_dnn: "{{ (fiveg.slices | selectattr('name', 'equalto', current_ue_slice) | map(attribute='dnn') | first) }}"

    - name: "Get UPF IP for this UE"
      set_fact:
        upf_ip: >-
          {{
            (fiveg.slices
             | selectattr('name', 'equalto', current_ue_slice)
             | first).ip_prefix
          }}.1

    - name: "Debug: Show mode and UPF IP for current UE"
      debug:
        msg: "UE {{ ue_item }} -> phone={{ is_phone }} mode={{ ue_mode }} UPF IP={{ upf_ip }}"

    # =====================================================================
    # PHONE bring-up (adb over the tethering Mac, same SSH path as the other
    # UEs -> no Python needed on the Mac). No wwan0/MBIM/QMI: the handset
    # attaches over the air and gets its IP from the UPF once the radio is on.
    # =====================================================================
    - name: "Phone bring-up for {{ ue_item }}"
      when: is_phone
      block:
        - name: "Phone: resolve adb / ssh parameters for {{ ue_item }}"
          set_fact:
            # ansible_user must be the macOS account that owns adb (e.g. 'tester').
            phone_ssh: "{{ hostvars[ue_item].ansible_user | default('tester') }}@{{ hostvars[ue_item].ansible_host | default(ue_item) }}"
            # Absolute adb path (ssh non-interactif -> minimal PATH on macOS).
            adb_bin: "{{ hostvars[ue_item].adb_bin | default('adb') }}"
            # serial= disambiguates several handsets sharing one Mac.
            adb_opts: "{{ ('-s ' ~ hostvars[ue_item].serial) if (hostvars[ue_item].serial is defined and (hostvars[ue_item].serial | string | length) > 0) else '' }}"

        - name: "Phone: check adb sees the handset on {{ ue_item }} ({{ phone_ssh }})"
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i /home/faraday/r2lab-embedded/mac-ssh-keys/macphone
            {{ phone_ssh }}
            '{{ adb_bin }} {{ adb_opts }} devices'
          register: adb_devices
          changed_when: false
          ignore_errors: "{{ ignore_task_errors | default(true) }}"

        - name: "Phone: assert a handset is in 'device' state on {{ ue_item }}"
          assert:
            that:
              - "adb_devices.stdout_lines | default([]) | select('search', 'device$') | list | length > 0"
            fail_msg: >-
              No handset in 'device' state for {{ ue_item }} via {{ phone_ssh }}.
              Check USB cable / `adb devices` on the Mac; set serial= if several
              phones share the host. adb output: {{ adb_devices.stdout | default('') | trim }}
          ignore_errors: "{{ ignore_task_errors | default(true) }}"

        # Optional clean re-attach (set phone_force_reattach=true), e.g. after
        # an APN/RAT change. Default = simple OFF.
        - name: "Phone: airplane mode ON (force re-attach) on {{ ue_item }}"
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i /home/faraday/r2lab-embedded/mac-ssh-keys/macphone
            {{ phone_ssh }}
            '{{ adb_bin }} {{ adb_opts }} shell cmd connectivity airplane-mode enable'
          changed_when: true
          ignore_errors: "{{ ignore_task_errors | default(true) }}"
          when: phone_force_reattach | default(false)

        - name: "Phone: settle before re-enabling the radio on {{ ue_item }}"
          ansible.builtin.pause:
            seconds: 3
          when: phone_force_reattach | default(false)

        - name: "Phone: airplane mode OFF (connect) on {{ ue_item }}"
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i /home/faraday/r2lab-embedded/mac-ssh-keys/macphone
            {{ phone_ssh }}
            '{{ adb_bin }} {{ adb_opts }} shell cmd connectivity airplane-mode disable'
          changed_when: true
          ignore_errors: "{{ ignore_task_errors | default(true) }}"

        - name: "Phone: verify airplane mode is OFF on {{ ue_item }}"
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i /home/faraday/r2lab-embedded/mac-ssh-keys/macphone
            {{ phone_ssh }}
            '{{ adb_bin }} {{ adb_opts }} shell settings get global airplane_mode_on'
          register: phone_apm
          until: "(phone_apm.stdout | default('') | trim) == '0'"
          retries: 5
          delay: 2
          changed_when: false
          ignore_errors: "{{ ignore_task_errors | default(true) }}"

        # Connectivity check now unconditional: upf_ip is always known.
        - name: "Phone: ping UPF {{ upf_ip }} from {{ ue_item }}"
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i /home/faraday/r2lab-embedded/mac-ssh-keys/macphone
            {{ phone_ssh }}
            '{{ adb_bin }} {{ adb_opts }} shell ping -c 1 -W 3 {{ upf_ip }}'
          register: phone_ping
          until: phone_ping.rc == 0
          retries: 15
          delay: 4
          changed_when: false
          failed_when: false

        - name: "Phone: connect result for {{ ue_item }}"
          debug:
            msg: >-
              UE {{ ue_item }} -> airplane_mode_on={{ phone_apm.stdout | default('?') | trim }}
              data={{ 'UP' if phone_ping.rc == 0 else 'not confirmed' }} (UPF {{ upf_ip }})

    # =====================================================================
    # QUECTEL bring-up (wwan0 via MBIM or QMI, then route to UPF).
    # =====================================================================
    - name: "Quectel bring-up for {{ ue_item }}"
      when: not is_phone
      block:
        - name: Check wwan0 connectivity on {{ ue_item }} by pinging UPF
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no
            root@{{ ue_item }}
            "ping -I wwan0 -c 1 -W 3 {{ upf_ip }} > /dev/null 2>&1 && echo up || echo down"
          register: check_wwan0
          changed_when: false
          ignore_errors: true

        - name: Set wwan0 reachability flag
          set_fact:
            wwan0_up: "{{ (check_wwan0.stdout | default('down')) == 'up' }}"

        - name: "Debug: wwan0 connectivity for {{ ue_item }}"
          debug:
            msg: "UE {{ ue_item }} -> wwan0={{ check_wwan0.stdout | default('unknown') }} UPF={{ upf_ip }}"

        # -----------------------------------------------------------------
        # MBIM bring-up
        # -----------------------------------------------------------------
        - name: "MBIM: stop.sh + start.sh on {{ ue_item }} if wwan0 not reachable"
          shell: >
            ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no
            root@{{ ue_item }}
            'stop.sh; start.sh -F {{ current_dnn }}'
          when:
            - ue_mode == 'mbim'
            - current_dnn is defined
            - not wwan0_up
          ignore_errors: "{{ ignore_task_errors | default(true) }}"

        # -----------------------------------------------------------------
        # QMI bring-up (Quectel-CM + ci_ctl_qtel.py). IP can take up to ~2 min.
        # -----------------------------------------------------------------
        - name: "QMI bring-up for {{ ue_item }}"
          when:
            - ue_mode == 'qmi'
            - not wwan0_up
          ignore_errors: "{{ ignore_task_errors | default(true) }}"
          block:
            - name: "QMI: ensure quectel-CM is running on {{ ue_item }}"
              # Absolute path: a non-interactive ssh has a minimal PATH and may
              # not find quectel-CM, so the background launch silently did nothing.
              shell: |
                ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ ue_item }} '
                  if pgrep -x quectel-CM >/dev/null 2>&1; then echo running; exit 0; fi
                  setsid /usr/local/bin/quectel-CM -s {{ current_dnn }} -4 </dev/null >/var/log/quectel-CM.log 2>&1 &
                  sleep 3
                  if pgrep -x quectel-CM >/dev/null 2>&1; then echo started; else echo FAILED; cat /var/log/quectel-CM.log 2>/dev/null; fi
                '
              register: cm_state
              until: "'running' in cm_state.stdout or 'started' in cm_state.stdout"
              retries: 10
              delay: 5
              changed_when: "'started' in cm_state.stdout"

            # The AT port index is NOT stable (ttyUSB2 vs ttyUSB3 across re-enum),
            # so probe for the port that answers AT instead of hardcoding it.
            - name: "QMI: detect AT port on {{ ue_item }}"
              shell: |
                ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ ue_item }} 'python3 -' <<'PYEOF'
                import glob, serial, sys
                for p in sorted(glob.glob('/dev/ttyUSB*')):
                    try:
                        s = serial.Serial(p, 115200, timeout=0.4)
                        s.write(b'AT\r'); r = s.read(64); s.close()
                        if b'OK' in r:
                            print(p); sys.exit(0)
                    except Exception:
                        pass
                sys.exit(1)
                PYEOF
              register: at_detect
              changed_when: false
              failed_when: false

            - name: "QMI: resolve AT port for {{ ue_item }}"
              # inventory at_port wins; otherwise use the probed port
              set_fact:
                qmi_at_port: "{{ hostvars[ue_item].at_port | default(at_detect.stdout | trim, true) }}"

            - name: "QMI: warn if no AT port found on {{ ue_item }}"
              debug:
                msg: "No AT port answered on {{ ue_item }} - skipping detach/wup."
              when: qmi_at_port | length == 0

            - name: "QMI: detach UE {{ ue_item }}"
              shell: >
                ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no
                root@{{ ue_item }}
                'python3 /usr/local/bin/ci_ctl_qtel.py {{ qmi_at_port }} detach'
              when: qmi_at_port | length > 0
              changed_when: false

            - name: "QMI: wake up (wup) UE {{ ue_item }}"
              shell: >
                ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no
                root@{{ ue_item }}
                'python3 /usr/local/bin/ci_ctl_qtel.py {{ qmi_at_port }} wup'
              when: qmi_at_port | length > 0
              changed_when: false

        # -----------------------------------------------------------------
        # Common: wait for IP / link, install route.
        # QMI needs a much longer window (up to ~2 min) to acquire an IP.
        # -----------------------------------------------------------------
        - name: Retrieve wwan0 IP for {{ ue_item }}
          shell: |
            ssh -o ConnectTimeout=5 -o BatchMode=yes root@{{ ue_item }} \
            "ip -4 addr show wwan0 | grep -oP '(?<=inet\s)\d+(\.(\d+)){3}'"
          register: ue_ip_cmd
          until: ue_ip_cmd.stdout != ""
          retries: "{{ 60 if ue_mode == 'qmi' else 5 }}"
          delay: 2
          changed_when: false
          ignore_errors: true

        - name: Wait until wwan0 interface is fully up
          shell: ssh root@{{ ue_item }} "ip link show wwan0"
          register: wwan0_status
          retries: 10
          delay: 2
          until: "'UP' in wwan0_status.stdout"
          changed_when: false
          ignore_errors: true
          when: ue_ip_cmd.stdout | default('') != ''

        - name: Add route to UPF IP when wwan0 is ready
          shell: |
            ssh -o BatchMode=yes root@{{ ue_item }} "ip route replace {{ upf_ip }} dev wwan0"
          changed_when: false
          ignore_errors: true
          when: ue_ip_cmd.stdout | default('') != ''
