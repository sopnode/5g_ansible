---
- name: RESTART_UE_SETUP
  ansible.builtin.meta: noop

- name: Load active 5G profile variables
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../group_vars/all/5g_profile_{{ fiveg_profile | default('default') }}.yaml"

- name: Assert 5G profile is loaded
  ansible.builtin.assert:
    that:
      - slices is defined
      - ues is defined

- name: Build UE lists
  set_fact:
    all_ues: "{{ (groups['qhats'] | default([])) + (groups['qfits'] | default([])) }}"

- name: Power OFF QHAT UEs
  shell: rhubarbe pdu off "{{ item }}"
  delegate_to: faraday.inria.fr
  async: 1800
  poll: 0
  failed_when: false
  changed_when: false
  loop: "{{ groups['qhats'] | default([]) }}"
  register: qhat_off_jobs

- name: Power OFF QFIT UEs
  shell: qfit off {{ groups['qfits'] | join(' ') }}
  delegate_to: faraday.inria.fr
  when: groups['qfits'] is defined and groups['qfits'] | length > 0
  failed_when: false
  changed_when: false

- pause:
    seconds: 20

- name: Power ON QHAT UEs
  shell: rhubarbe pdu on "{{ item }}"
  delegate_to: faraday.inria.fr
  async: 1800
  poll: 0
  loop: "{{ groups['qhats'] | default([]) }}"
  register: qhat_on_jobs

- name: Wait QHAT ON completion
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: qhat_on_status
  until: qhat_on_status.finished
  retries: 12
  delay: 5
  loop: "{{ qhat_on_jobs.results }}"

- name: Power ON QFIT UEs
  shell: qfit on {{ groups['qfits'] | join(' ') }}
  delegate_to: faraday.inria.fr
  when: groups['qfits'] is defined and groups['qfits'] | length > 0

- name: Ping UEs
  shell: "ping -c1 -W1 {{ item }}"
  delegate_to: faraday.inria.fr
  register: ping_results
  ignore_errors: true
  changed_when: false
  loop: "{{ all_ues }}"

- name: Build reachable UEs
  set_fact:
    reachable_ues: >-
      {{
        ping_results.results
        | selectattr('rc', 'defined')
        | selectattr('rc', 'equalto', 0)
        | map(attribute='item')
        | list
      }}

- name: SSH check
  wait_for:
    host: "{{ item }}"
    port: 22
    timeout: 20
  delegate_to: faraday.inria.fr
  register: ssh_results
  ignore_errors: true
  loop: "{{ reachable_ues }}"


- name: Compute failed UEs
  set_fact:
    failed_ues: "{{ all_ues | difference(reachable_ues) }}"

- name: Report failed UEs
  debug:
    msg: "UEs not reachable after boot: {{ failed_ues }}"
  when: failed_ues | length > 0


- name: Prepare qhat-init command
  vars:
    ue_slice_info: "{{ slices | selectattr('name', 'equalto', ues[item].slice) | first }}"
    qhat_command: >-
      qhat-init --mode={{ hostvars[item].mode | default('default') }}
      --dnn="{{ ue_slice_info.dnn }}"
      --nssai="{{ ue_slice_info.sst }}.{{ ue_slice_info.sd }}"
  debug:
    msg: "UE {{ item }} command: {{ qhat_command }}"
  loop: "{{ reachable_ues }}"

- name: Configure rmem buffers
  shell: |
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ item }} '
      sysctl -w net.core.rmem_max=62500000;
      sysctl -w net.core.rmem_default=62500000;
    '
  delegate_to: faraday.inria.fr
  loop: "{{ reachable_ues }}"
  when: rru in ['benetel1', 'benetel2']

- name: Init UEs
  shell: ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ item }} 'qhat-init; stop.sh'
  delegate_to: faraday.inria.fr
  async: 1800
  poll: 0
  loop: "{{ reachable_ues }}"
  register: set_ue_jobs

- name: Wait init completion
  async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ set_ue_jobs.results }}"
  register: job_result
  until: job_result.finished
  retries: 100
  delay: 10

- name: Run qhat-check
  shell: ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ item }} 'qhat-check'
  delegate_to: faraday.inria.fr
  loop: "{{ reachable_ues }}"
  register: check_results
  changed_when: false
  ignore_errors: true

- name: Display qhat-check
  debug:
    msg:
      - "UE: {{ item.item }}"
      - "{{ item.stdout_lines }}"
  loop: "{{ check_results.results }}"